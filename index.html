            SUBJECTS_15.forEach(sub => { res[sub] = row[dbMap[sub]]; });
            return res;
        }

            try {
                let allClassNamesSet = new Set();
                let confData = await supaFetch(`config_max_scores?select=*`);
                confData.forEach(c => { 
                    configList.push(c); 
                    if(c.grade_level) {
                        classTypeMap[fmtCls(c.grade_level)] = String(c.class_type || "").toUpperCase(); 
                        allClassNamesSet.add(c.grade_level.trim());
                    }

                teachData.forEach(t => {
                    let rawCls = String(t.homeroom_class || "").trim();
                    if(rawCls) {

                        allClassNamesSet.add(rawCls);

                if (availableMonths.length === 0) {
                    document.getElementById('t1-chartArea').innerHTML = `<div class="text-center p-10 border-2 border-dashed border-slate-300 rounded-xl"><p class="text-slate-500 font-bold text-lg">មិនទាន់មានទិន្នន័យប្រចាំខែ សម្រាប់ធ្វើការប្រៀបធៀបទេ!</p></div>`;

        async function linkTelegram(type) {
            if(!currentStudentInfo) return Swal.fire('បញ្ជាក់', 'សូមស្វែងរកសិស្សជាមុនសិន!', 'warning');
            const { value: username } = await Swal.fire({ title: `ភ្ជាប់ Telegram ${type==='Student'?'សិស្ស':'អាណាព្យាបាល'}`, input: 'text', inputPlaceholder: 'ឧទាហរណ៍: @sok_123', showCancelButton: true, confirmButtonText: 'ភ្ជាប់ឥឡូវនេះ' });
            if(!username) return;
            showLoading("កំពុងភ្ជាប់...");
            try {
                let existing = await supaFetch(`telegram_db?student_id=eq.${encodeURIComponent(currentStudentInfo.id)}`);
                let payload = { student_id: currentStudentInfo.id, student_name: currentStudentInfo.name };
                if (existing.length > 0) {
                    payload = existing[0];
                    let currentField = type === 'Student' ? payload.telegram_student : payload.telegram_parent;
                    if(currentField && !currentField.includes(username)) payload[type === 'Student' ? 'telegram_student' : 'telegram_parent'] = currentField + ";" + username;
                    else if(!currentField) payload[type === 'Student' ? 'telegram_student' : 'telegram_parent'] = username;
                } else { payload[type === 'Student' ? 'telegram_student' : 'telegram_parent'] = username; }

                let res = await fetch(`${SUPABASE_URL}/rest/v1/telegram_db?on_conflict=student_id`, { method: "POST", headers: { ...headers, "Prefer": "resolution=merge-duplicates" }, body: JSON.stringify([payload]) });
                hideLoading();
                if(res.ok) Swal.fire('ជោគជ័យ!', 'បានភ្ជាប់ប្រព័ន្ធ Telegram រួចរាល់!', 'success');
                else throw new Error("Update Failed");
            } catch(e) { hideLoading(); Swal.fire('បរាជ័យ!', e.message, 'error'); }
        }

                            let raw = String(s[sub]).trim(); let ms = cleanNum(gConf[dbMap[sub]])||50;
                            if(isNaN(cleanNum(raw)) || !raw || raw.toUpperCase() === "ABS" || raw.toUpperCase() === "ម.ថ") {
                                html += `<tr class="border-b border-slate-200"><td class="border-r border-slate-200">${idx++}</td><td class="col-left font-bold border-r border-slate-200 text-slate-800">${sub}</td><td class="border-r border-slate-200">${ms}</td><td class="text-red-500 font-bold border-r border-slate-200">${raw||'ម.ថ'}</td><td colspan="2">-</td></tr>`;
                            } else {
                                let sc = cleanNum(raw); let pct = Math.min((sc/ms)*100,100); let g = getGrd(pct);
                                html += `<tr class="border-b border-slate-200"><td class="border-r border-slate-200">${idx++}</td><td class="col-left font-bold border-r border-slate-200 text-slate-800">${sub}</td><td class="border-r border-slate-200">${ms}</td><td class="text-blue-700 font-black text-[13px] border-r border-slate-200">${sc}</td><td class="border-r border-slate-200"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${getBarCol(pct)}"></div></div></td><td class="font-black text-[13px] ${getGrdCol(g)}">${g}</td></tr>`;
                            }
                        }
                    });
                    html += `</tbody><tfoot><tr class="bg-slate-100 border-t-2 border-slate-300"><td colspan="2" class="col-left text-right font-bold text-[12px] py-2">ពិន្ទុសរុប</td><td class="font-bold text-gray-500">${maxTotal || '-'}</td><td class="font-black text-blue-700 text-[14px]">${s.Total || '-'}</td><td colspan="2" class="text-gray-400 text-[11px] italic">សមិទ្ធផលសិក្សាគិតជាភាគរយ</td></tr></tfoot></table>
                    <div class="signatures-container">${getStampHTML(s.DateSolar, s.DateLunar, tInfo)}</div></div>`;
                });

                renderArea.innerHTML = html;
                document.getElementById('internal-actions').classList.remove('hidden');
                hideLoading();
            } catch(e) { hideLoading(); Swal.fire('បរាជ័យ!', e.message, 'error'); }
        }

        // ==========================================
        // 📊 TAB 4: SCHOOL ADMIN REPORT
        // ==========================================
        async function executeAdminReport() {
            let period = document.getElementById('monthSelect').value;
            showLoading("កំពុងគណនារបាយការណ៍សាលាទាំងមូល...");
            try {
                let table = "student_scores"; let periodCol = "month_name";
                if (period.includes("ប្រចាំឆមាស")) { table = "semester_scores"; periodCol = "semester_name"; }
                else if (period === "ប្រចាំឆ្នាំ") { table = "annual_scores"; periodCol = "academic_year"; period = new Date().getFullYear().toString(); }

                let dbData = await supaFetch(`${table}?${periodCol}=eq.${encodeURIComponent(period)}&limit=5000`);
                let cData = dbData.map(r => mapDbToLegacy(r));

                const mode = document.getElementById('reportMode').value;
                const subjectFilter = document.getElementById('reportSubjectFilter').value;
                const classFilter = document.getElementById('reportClassFilter').value;

                document.getElementById('reportHeader').innerHTML = buildPrintHeader(`របាយការណ៍វិភាគលទ្ធផលសិក្សាសិស្ស<br><span class="text-[13px] font-bold text-indigo-700 mt-2 block tracking-widest uppercase">${mode === 'subject' ? `មុខវិជ្ជា៖ ${subjectFilter}` : `ថ្នាក់រៀន៖ ${classFilter}`} | ${period}</span>`);
                document.getElementById('adminPrintArea').classList.remove('hidden');
                document.getElementById('report-actions').classList.remove('hidden');
                
                const container = document.getElementById('analyticsContent');
                container.innerHTML = '';

                function renderAdminCard(title, dataArray, maxScore) {
                    let stats = { count:0, A:0, B:0, C:0, D:0, E:0, F:0, ABS:0 };
                    dataArray.forEach(s => {
                        let raw = String(s[subjectFilter] || s[title] || "").toUpperCase().trim(); 
                        let checkVal = mode === 'subject' ? raw : String(s[title]||"").toUpperCase().trim();
                        if(checkVal==="ABS"||checkVal==="A"||checkVal==="F"||checkVal==="អ"||checkVal==="ម.ថ"||!checkVal) { stats.ABS++; stats.count++; }
                        else { let sc = cleanNum(checkVal); if(!isNaN(sc)) { stats[getGrd(Math.min((sc/maxScore)*100, 100))]++; stats.count++; } }
                    });

                    if(stats.count === 0) return;
                    const tp = stats.count - stats.ABS; const pG = (v) => tp > 0 ? Math.round((v/tp)*100) : 0;
                    
                    let row = `<tr class="text-center text-[11px] border-b hover:bg-slate-50 transition">
                        <td class="col-left font-black w-[15%] text-slate-800 border-r border-slate-200">${title}</td>
                        <td class="font-black text-indigo-700 border-r border-slate-200 text-sm">${stats.count}</td>
                        <td class="text-red-600 font-bold border-r border-slate-200">${stats.A} <span class="text-[9px] text-slate-400">(${pG(stats.A)}%)</span></td>
                        <td class="text-pink-600 font-bold border-r border-slate-200">${stats.B} <span class="text-[9px] text-slate-400">(${pG(stats.B)}%)</span></td>
                        <td class="text-orange-600 font-bold border-r border-slate-200">${stats.C} <span class="text-[9px] text-slate-400">(${pG(stats.C)}%)</span></td>
                        <td class="text-green-600 font-bold border-r border-slate-200">${stats.D} <span class="text-[9px] text-slate-400">(${pG(stats.D)}%)</span></td>
                        <td class="text-blue-600 font-bold border-r border-slate-200">${stats.E} <span class="text-[9px] text-slate-400">(${pG(stats.E)}%)</span></td>
                        <td class="text-slate-800 font-bold border-r border-slate-200">${stats.F} <span class="text-[9px] text-slate-400">(${pG(stats.F)}%)</span></td>
                        <td class="text-slate-500 font-bold">${stats.ABS}</td>
                    </tr>`;
                    
                    container.innerHTML += `<div class="mb-4 shadow-sm border border-slate-200 rounded-xl overflow-hidden"><table class="c-table w-full"><thead><tr class="bg-slate-800 text-white text-[11px]"><th class="col-left border-r border-slate-700 py-2">${mode==='subject'?'ថ្នាក់':'មុខវិជ្ជា'}</th><th class="border-r border-slate-700">សរុប</th><th class="border-r border-slate-700">A</th><th class="border-r border-slate-700">B</th><th class="border-r border-slate-700">C</th><th class="border-r border-slate-700">D</th><th class="border-r border-slate-700">E</th><th class="border-r border-slate-700">F</th><th>អ.វ</th></tr></thead><tbody>${row}</tbody></table></div>`;
                }

                if (mode === 'subject') {
                    const levels =["ថ្នាក់ទី៧", "ថ្នាក់ទី៨", "ថ្នាក់ទី៩", "ថ្នាក់ទី១០", "ថ្នាក់ទី១១", "ថ្នាក់ទី១២", "កម្រិតថ្នាក់រួម"];
                    levels.forEach(lvl => {
                        let lvlData = lvl === "កម្រិតថ្នាក់រួម" ? cData : cData.filter(s => fmtCls(s.Grade).includes(fmtCls(lvl).replace('ថ្នាក់ទី','')));
                        if(lvlData.length > 0) renderAdminCard(lvl, lvlData, 50);
                    });
                } else {
                    let formattedFilter = fmtCls(classFilter);
                    let clsData = cData.filter(s => fmtCls(s.Grade) === formattedFilter);
                    if(clsData.length > 0) SUBJECTS_10.forEach(sub => renderAdminCard(sub, clsData, 50));
                }

                if(container.innerHTML === '') container.innerHTML = '<div class="p-10 text-center text-slate-400 font-bold text-lg border-2 border-dashed rounded-xl">មិនមានទិន្នន័យ</div>';
                hideLoading();
            } catch(e) { hideLoading(); Swal.fire('បរាជ័យ!', e.message, 'error'); }
        }

        // ==========================================
        // UTILS & EVENTS
        // ==========================================
        async function switchTab(tabId) {
            if (tabId === 'tab-internal' && !isInternalUnlocked) {
                const { value: pwd } = await Swal.fire({ title: 'លេខសម្ងាត់រដ្ឋបាល', input: 'password', confirmButtonText: 'ចូលប្រើប្រាស់', customClass: { title: 'swal2-title'} });
                if (pwd && pwd.trim() === INTERNAL_PWD) isInternalUnlocked = true; else return Swal.fire('ខុសលេខសម្ងាត់!', '', 'error');
            }
            if (tabId === 'tab-report' && !isReportUnlocked) {
                const { value: pwd } = await Swal.fire({ title: 'លេខសម្ងាត់របាយការណ៍', input: 'password', confirmButtonText: 'ចូលប្រើប្រាស់', customClass: { title: 'swal2-title'} });
                if (pwd && pwd.trim() === REPORT_PWD) isReportUnlocked = true; else return Swal.fire('ខុសលេខសម្ងាត់!', '', 'error');
            }
            
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('inactive'); });
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            let btn = document.getElementById('btn-' + tabId);
            btn.classList.add('active'); btn.classList.remove('inactive');
            document.getElementById(tabId).classList.add('active');
            
            if(tabId === 'tab-report') { document.getElementById('searchSection').classList.add('hidden'); } 
            else { 
                document.getElementById('searchSection').classList.remove('hidden'); 
                document.getElementById('inputContainer').classList.toggle('hidden', tabId === 'tab-internal');
                document.getElementById('classSelectContainer').classList.toggle('hidden', tabId !== 'tab-internal');
            }
        }

        function toggleReportMode() {
            let isSub = document.getElementById('reportMode').value === 'subject';
            document.getElementById('reportSubjectFilter').classList.toggle('hidden', !isSub);
            document.getElementById('reportClassFilter').classList.toggle('hidden', isSub);
        }

        function showLoading(text) { document.getElementById('loadingText').innerText = text; document.getElementById('loadingOverlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }
        
        function cleanNum(val) { if(val===null||val===""||val===undefined) return NaN; return parseFloat(String(val).replace(/[០-៩]/g, d => "0123456789"["០១២៣៤៥៦៧៨៩".indexOf(d)])); }
        function getGrd(p) { let x=Math.floor(p); if(x>=90) return "A"; if(x>=80) return "B"; if(x>=70) return "C"; if(x>=60) return "D"; if(x>=50) return "E"; return "F"; }
        function getBarCol(pct) { if(pct>=90) return "#059669"; if(pct>=80) return "#2563eb"; if(pct>=70) return "#d97706"; if(pct>=60) return "#7c3aed"; if(pct>=50) return "#db2777"; return "#ef4444"; }
        function getGrdCol(g) { if(g==='A') return 'text-red-600'; if(g==='B') return 'text-pink-600'; if(g==='C') return 'text-orange-600'; if(g==='D') return 'text-green-600'; if(g==='E') return 'text-blue-600'; return 'text-slate-800'; }
    </script>
</body>
