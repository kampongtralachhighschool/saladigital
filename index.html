    <style>
        :root { --primary-blue: #1e40af; --khmer-red: #dc2626; }

        .moul-font, .font-moul { font-family: 'Moul', serif; }
        .font-battambang { font-family: 'Battambang', cursive; }
        
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { background-color: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .tab-btn.inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        .print-area { background: white; margin: 20px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
        .portrait-page { width: 210mm; padding: 8mm 12mm; }
        .landscape-page { width: 297mm; padding: 10mm 15mm; }
        
        .sketch-summary { display: flex; justify-content: space-between; align-items: stretch; border: 1.5px solid #e2e8f0; border-radius: 12px; margin: 10px 0; padding: 8px 0; background: #ffffff; gap: 4px; flex-wrap: wrap;}
        .sketch-item { flex: 1; text-align: center; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 20%; padding: 4px;}
        .sketch-item:not(:last-child)::after { content: ""; position: absolute; right: 0; top: 10%; height: 80%; width: 1px; background-color: #e2e8f0; }
        .sketch-label { font-size: 11px; color: #64748b; font-weight: bold; margin-bottom: 2px; }
        .sketch-value { font-size: 20px; font-weight: 800; line-height: 1.2; }
        .rank-context { font-size: 9px; color: #64748b; font-weight: normal; margin-top: 2px; line-height: 1.3; }
        
        .c-table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 11px; }
        .c-table th, .c-table td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        .c-table th { background-color: #f8fafc; color: var(--primary-blue); font-weight: 700; height: 30px; }
        .subject-col { text-align: left; padding-left: 10px; font-weight: bold; font-size: 12px; width: 130px; }
        
        .progress-container { width: 100%; background-color: #f1f5f9; border-radius: 10px; height: 8px; overflow: hidden; display: inline-block; vertical-align: middle; }
        .progress-bar { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        
        .grade-A { color: #dc2626; font-weight: 900; } 
        .grade-B { color: #db2777; font-weight: 900; } 
        .grade-C { color: #ea580c; font-weight: 900; } 
        .grade-D { color: #16a34a; font-weight: 900; } 
        .grade-E { color: #2563eb; font-weight: 900; } 
        .grade-F { color: #334155; font-weight: 900; } 
        .result-pass { color: #059669; font-weight: 900;} .result-fail { color: #dc2626; font-weight: 900;}

        .trend-chart { display: flex; align-items: flex-end; justify-content: space-around; height: 180px; border-bottom: 2px solid #cbd5e1; border-left: 2px solid #cbd5e1; margin-top: 20px; padding: 10px 5px 0 5px; position: relative; }
        .trend-bar-wrapper { display: flex; flex-direction: column; align-items: center; width: 40px; height: 100%; justify-content: flex-end; z-index: 10;}
        .trend-bar { width: 24px; border-radius: 4px 4px 0 0; background-color: var(--primary-blue); transition: height 0.5s ease; position: relative; z-index: 10;}
        .trend-value { font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #475569; }
        .trend-label { font-size: 11px; font-weight: bold; color: #1e293b; margin-top: 8px; text-align: center; }
        .chart-grid { position: absolute; left: 0; right: 0; height: 1px; background-color: #e2e8f0; z-index: 0; }
        .print-bar-bg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        .analysis-box { background: #f0fdfa; border: 1px solid #ccfbf1; border-left: 4px solid #0d9488; padding: 10px; border-radius: 6px; margin-top: 15px; font-size: 11px; line-height: 1.6; color: #0f766e; }

        .stamp-container { position: relative; width: 160px; height: 100px; text-align: center; display: inline-block; }
        .stamp-text { position: relative; z-index: 20; }
        .stamp-img { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); max-width: 110px; max-height: 110px; z-index: 10; opacity: 0.85; mix-blend-mode: multiply; pointer-events: none; }
        .sign-img { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 100px; max-height: 50px; z-index: 30; pointer-events: none; }

        .page-break { page-break-before: always; }
        #pdfOffscreen { position: absolute; top: -9999px; left: -9999px; z-index: -10; background: white; }

        @media print {
            @page { size: A4 portrait; margin: 8mm; }
            @page landscape { size: A4 landscape; margin: 8mm; }
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-area { box-shadow: none; margin: 0; padding: 0; width: 100%; }
            tr { break-inside: avoid; page-break-inside: avoid; }
            .page-break { page-break-before: always; margin-top: 20px; }
            .landscape-page { page: landscape; }
            #pdfOffscreen { display: none; }
        }
    </style>
</head>

    <script>

        function cleanNum(val) {

        }

        function getGrd(percent) {
            let p = Math.floor(percent);

        async function fetchDatabase() {
            if(Object.keys(globalData).length > 0) return true; 
            showLoading("កំពុងទាញទិន្នន័យពី Server...");
            try {
                const res = await fetch(`${API_URL}?action=getAllData`);
                const sData = await res.json();
                
                if(sData.error) throw new Error(sData.error);
                if(!sData.scores) throw new Error("ទម្រង់ទិន្នន័យពី Server មិនត្រឹមត្រូវ (គ្មាន Scores Object)។ សូមឆែកមើល File B (Code.gs) ឡើងវិញ។");

                configList = Object.values(sData.configMax || {});
                configList.forEach(c => { if(c["កម្រិតថ្នាក់"]) classTypeMap[String(c["កម្រិតថ្នាក់"]).trim()] = String(c["ប្រភេទថ្នាក់"] || c["ប្រភេទ"] || "").toUpperCase(); });

                let homeSheet = sData.scores["Home"];
                if(homeSheet && homeSheet.length > 0) {
                    let hRow = homeSheet[0]; 
                    if(hRow["ឈ្មោះសាលា"]) homeData.schoolName = hRow["ឈ្មោះសាលា"];
                    let loc1 = hRow["មន្ទីរអប់រំ"] || "មន្ទីរអប់រំ យុវជន និងកីឡា";
                    let loc2 = hRow["ការិយាល័យអប់រំ"] || "";
                    homeData.location = loc2 ? `${loc1}<br>${loc2}` : loc1;
                    document.getElementById('schoolTitle').innerHTML = homeData.schoolName;
                }

                let exclude =["Config_MaxScores", "TeacherInfo", "គ្រូបន្ទុកថ្នាក់", "Bot_Logs", "Users", "Telegram_DB", "Home"];
                allPeriods = Object.keys(sData.scores).filter(k => !exclude.includes(k));

                if(allPeriods.length === 0) throw new Error("មិនមាន Sheet ខែ ឬ ឆមាស ណាមួយត្រូវបានរកឃើញទេ!");

                allPeriods.forEach(m => {
                    let raw = sData.scores[m];
                    if (raw && raw.length > 0) {
                        const unique =[]; const seen = new Set();
                        raw.forEach(item => {
                            let cln = { ...item }; delete cln._rowIndex;
                            let str = JSON.stringify(cln);
                            if (!seen.has(str)) { seen.add(str); unique.push(item); }
                        });
                        globalData[m] = unique;
                    } else { globalData[m] =[]; }
                });

                let tData = sData.scores["TeacherInfo"] || sData.scores["គ្រូបន្ទុកថ្នាក់"] ||[];
                tData.forEach(t => {
                    let cls = String(t["ថ្នាក់"] || "").trim();
                    let tKeys = Object.keys(t);
                    let signUrl = t["ហត្ថលេខា"] || t["Signature"] || t[tKeys[3]] || ""; 
                    if(cls) {
                        teacherMap[cls] = { name: t["ឈ្មោះគ្រូ"]||"", phone: t["លេខទូរសព្ទ"]||"", sign: signUrl };
                        allClassNames.push(cls);
                    }
                });
                
                allClassNames = [...new Set(allClassNames)].sort();

                // Dropdowns
                let moSelect = document.getElementById('monthSelect');
                let optHtml = `<optgroup label="ប្រចាំខែ">`;[...semConfig.sem1, ...semConfig.sem2].forEach(m => { if(allPeriods.includes(m)) optHtml += `<option value="${m}">${m}</option>`; });
                optHtml += `</optgroup><optgroup label="ប្រឡងឆមាស">`;
                if(allPeriods.includes("ប្រឡងឆមាសទី១")) optHtml += `<option value="ប្រឡងឆមាសទី១">ប្រឡងឆមាសទី១</option>`;
                if(allPeriods.includes("ប្រឡងឆមាសទី២")) optHtml += `<option value="ប្រឡងឆមាសទី២">ប្រឡងឆមាសទី២</option>`;
                optHtml += `</optgroup><optgroup label="សរុប">`;
                if(allPeriods.includes("ប្រចាំឆមាសទី១")) optHtml += `<option value="ប្រចាំឆមាសទី១">ប្រចាំឆមាសទី១</option>`;
                if(allPeriods.includes("ប្រចាំឆមាសទី២")) optHtml += `<option value="ប្រចាំឆមាសទី២">ប្រចាំឆមាសទី២</option>`;
                if(allPeriods.includes("ប្រចាំឆ្នាំ")) optHtml += `<option value="ប្រចាំឆ្នាំ">ប្រចាំឆ្នាំ</option>`;
                optHtml += `</optgroup>`;
                moSelect.innerHTML = optHtml;
                
                let clsOptions = allClassNames.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('classSelect').innerHTML = clsOptions;

                hideLoading(); return true;
            } catch(e) {
                hideLoading(); showError(e.message); return false;
            }
        }

        // AUTO-CALCULATION ENGINE (STUDENT)
        // ==========================================
        function calculateSheetScoreNormal(row, gConf) {
            if(!row) return { total:0, max:0, avg:0, percent:0, grade:'F', valid: false };
            let tS = 0, tM = 0, vC = 0;
            SUBJECTS_15.forEach(s => { 
                let raw = String(row[s] || "").toUpperCase();
                if(raw !== "" && raw !== "ABS" && raw !== "A" && raw !== "F" && raw !== "អ" && raw !== "ម.ថ") {
                    let sc=cleanNum(row[s]); 
                    if(!isNaN(sc)){ tS+=sc; tM+=(cleanNum(gConf[s])||50); vC++; } 
                }
            });
            if(vC === 0) return { total:0, max:0, avg:0, percent:0, grade:'F', valid: false };
            let pct = tM>0 ? (tS/tM)*100 : 0;
            return { total:tS, max:tM, avg: pct/2, percent:pct, grade: getGrd(pct), valid: true };
        }

        function calculateSheetScoreBac2(row, gConf, sGrade) {
            if(!row) return { total:0, max:0, avg:0, percent:0, grade:'F', valid: false };
            let track = classTypeMap[sGrade] || "";
            let tS = 0, tM = 0, vC = 0;
            let cSubjs = track.includes("SC") ?["គណិតវិទ្យា","ភាសាខ្មែរ","រូបវិទ្យា","គីមីវិទ្យា","ជីវវិទ្យា","ប្រវត្តិវិទ្យា"] :["ភាសាខ្មែរ","គណិតវិទ្យា","សីលធម៌ពលរដ្ឋ","ប្រវត្តិវិទ្យា","ភូមិវិទ្យា","ផែនដីវិទ្យា"];
            
            cSubjs.forEach(s => { 
                let raw = String(row[s] || "").toUpperCase();
                if(raw !== "" && raw !== "ABS" && raw !== "A" && raw !== "F" && raw !== "អ" && raw !== "ម.ថ") {
                    let sc=cleanNum(row[s]); 
                    if(!isNaN(sc)){ tS+=sc; tM+=(cleanNum(gConf[s])||50); vC++; } 
                }
            });
            
            if(vC === 0) return { total:0, max:0, avg:0, percent:0, grade:'F', valid: false, engVal:'-' };
            
            let eng = cleanNum(row["ភាសាអង់គ្លេស"]); if(!isNaN(eng) && eng>=26) tS+=(eng-25);
            let pct = tM>0 ? (tS/tM)*100 : 0;
            return { total:tS, max:tM, avg: pct/2, percent:pct, grade: getGrd(pct), valid: true, engVal: isNaN(eng)?'-':eng };
        }

        function calculateStudent(id, sGrade, period) {
            let gConf = configList.find(c => c["កម្រិតថ្នាក់"]?.toString().trim() === sGrade) || {};
            let isUpper = sGrade.includes("១១") || sGrade.includes("11") || sGrade.includes("១២") || sGrade.includes("12");
            let track = classTypeMap[sGrade] || "";
            let isBac2 = isUpper && (track.includes("SC") || track.includes("SS"));
            let isTab1 = period.includes("_N"); 
            if(isTab1) { isBac2 = false; period = period.replace("_N", ""); }

            if(period === "ប្រចាំឆ្នាំ") {
                let s1 = calcSem(id, 1, gConf, isBac2, sGrade); let s2 = calcSem(id, 2, gConf, isBac2, sGrade);
                let fAvg = (s1.avg>0 && s2.avg>0) ? (s1.avg+s2.avg)/2 : (s1.avg>0 ? s1.avg : s2.avg);
                return { s1Avg: s1.avg, s2Avg: s2.avg, avg: fAvg, percent: fAvg*2, grade: getGrd(fAvg*2), isBac2, valid: fAvg>0 };
            }
            if(period.includes("ឆមាស")) return calcSem(id, period.includes("១")?1:2, gConf, isBac2, sGrade);

            return isBac2 ? calculateSheetScoreBac2(globalData[period]?.find(x=>x.ID==id), gConf, sGrade) : calculateSheetScoreNormal(globalData[period]?.find(x=>x.ID==id), gConf);
        }

        function calcSem(id, sNum, gConf, isBac2, sGrade) {
            let mList = sNum===1 ? semConfig.sem1 : semConfig.sem2;
            let eSheet = sNum===1 ? "ប្រឡងឆមាសទី១" : "ប្រឡងឆមាសទី២";
            let ex = isBac2 ? calculateSheetScoreBac2(globalData[eSheet]?.find(x=>x.ID==id), gConf, sGrade) : calculateSheetScoreNormal(globalData[eSheet]?.find(x=>x.ID==id), gConf);
            
            let mTot = 0, mC = 0;
            mList.forEach(m => { 
                let ms = isBac2 ? calculateSheetScoreBac2(globalData[m]?.find(x=>x.ID==id), gConf, sGrade) : calculateSheetScoreNormal(globalData[m]?.find(x=>x.ID==id), gConf); 
                if(ms.valid){ mTot+=ms.avg; mC++; } 
            });
            let moAvg = mC>0 ? mTot/mC : 0;
            let fAvg = (ex.valid && moAvg>0) ? (ex.avg+moAvg)/2 : (ex.valid ? ex.avg : moAvg);
            return { exTot: ex.total, exAvg: ex.avg, moAvg: moAvg, avg: fAvg, percent: fAvg*2, grade: getGrd(fAvg*2), isBac2, valid: fAvg>0 };
        }

        function prepPeriodData(period) {
            if(processedStudentsCache[period]) return processedStudentsCache[period];
            
            let allStus = new Map();
            // Using a specific period sheet if possible to only get students active in that period,
            // but for Annual/Sem we need to look across multiple sheets.
            let sheetsToScan = period.includes("ប្រចាំ") || period.includes("ឆមាស") ? allPeriods : [period.replace("_N","")];
            
            sheetsToScan.forEach(m => {
                if(globalData[m]) {
                    globalData[m].forEach(s => { if(s.ID && s.Grade) allStus.set(s.ID, s); });
                }
            });

            let pData =[];
            allStus.forEach((s, id) => {
                let stats = calculateStudent(id, String(s.Grade).trim(), period);
                pData.push({ base: s, stats: stats });
            });

            pData.sort((a,b) => b.stats.avg - a.stats.avg);
            let sR = 1, pS = null;
            pData.forEach((s, i) => { 
                if(!s.stats.valid) s.sRank = "ម.ថ";
                else { if(s.stats.avg !== pS){ sR = i+1; pS=s.stats.avg;} s.sRank = sR; }
            });

            let classGroups = {};
            pData.forEach(s => { let g = String(s.base.Grade).trim(); if(!classGroups[g]) classGroups[g]=[]; classGroups[g].push(s); });
            
            for(let g in classGroups) {
                classGroups[g].sort((a,b) => b.stats.avg - a.stats.avg);
                let cR = 1, cpS = null;
                classGroups[g].forEach((s, i) => { 
                    if(!s.stats.valid) s.cRank = "ម.ថ";
                    else { if(s.stats.avg !== cpS){ cR = i+1; cpS=s.stats.avg;} s.cRank = cR; }
                });
            }

            processedStudentsCache[period] = { all: pData, classes: classGroups };
            return processedStudentsCache[period];
        }

        async function executeSearch() {
            let activeTab = document.querySelector('.tab-content.active').id;
            if(activeTab === 'tab-internal') return; // Handled separately

            let q = document.getElementById('searchInput').value.trim().toLowerCase();
            let period = document.getElementById('monthSelect').value;
            
            if(!q) return alert("សូមបញ្ចូលអត្តលេខសិស្ស!");
            if(!(await fetchDatabase())) return;

            showLoading("កំពុងគណនា...");
            
            let allStus = new Map();
            Object.values(globalData).forEach(sh => { if(sh) sh.forEach(s => { if(s.ID) allStus.set(s.ID, s); }) });
            
            let targetId = null;
            allStus.forEach((v, k) => { if(String(k).toLowerCase()==q || String(v.Name).toLowerCase().includes(q)) targetId = k; });

            if(!targetId) { hideLoading(); return showError("រកមិនឃើញសិស្ស!"); }

            // Force normal calc for Tab 1
            let pData = prepPeriodData(period + "_N"); 
            let pStu = pData.all.find(x => x.base.ID == targetId);

            if(!pStu) { hideLoading(); return showError(`សិស្សនេះគ្មានពិន្ទុក្នុង ${period} ទេ!`); }

            document.getElementById('single-view-area').innerHTML = buildStudentTab1Html(pStu, period);
            document.getElementById('single-view-area').classList.remove('hidden');
            document.getElementById('t1-actions').classList.remove('hidden');
            document.getElementById('t1-actions').classList.add('flex');

            // --- TAB 3 BAC 2 ---
            let isUpper = pStu.base.Grade.includes("១១") || pStu.base.Grade.includes("12") || pStu.base.Grade.includes("១២");
            if (isUpper && !period.includes("ឆមាស") && period !== "ប្រចាំឆ្នាំ") {
                let track = classTypeMap[String(pStu.base.Grade).trim()] || "";

                    let pDataB2 = prepPeriodData(period); // Auto bac2

                }
            } else {
                document.getElementById('t3-capture-area').classList.add('hidden');
                document.getElementById('t3-actions').classList.add('hidden');
            }

            hideLoading();

            let cSubjs = track.includes("SC") ?["គណិតវិទ្យា","ភាសាខ្មែរ","រូបវិទ្យា","គីមីវិទ្យា","ជីវវិទ្យា","ប្រវត្តិវិទ្យា"] :["ភាសាខ្មែរ","គណិតវិទ្យា","សីលធម៌ពលរដ្ឋ","ប្រវត្តិវិទ្យា","ភូមិវិទ្យា","ផែនដីវិទ្យា"];
            let t3Html = ""; let idx=1;
            let rData = globalData[period]?.find(x=>x.ID==s.ID)||{};

            cSubjs.forEach(sub => {
                let raw = String(rData[sub]||"").toUpperCase();
                if(raw !== "" && raw !== "ABS" && raw !== "A" && raw !== "F" && raw !== "អ" && raw !== "ម.ថ") {
                    let sc = cleanNum(rData[sub]); let ms = cleanNum(gConf[sub])||50;
                    if(!isNaN(sc)){ 
                        let pct = Math.min((sc/ms)*100,100); let g = getGrd(pct);
                        t3Html += `<tr><td>${idx++}</td><td class="subject-col">${sub}</td><td>${ms}</td><td class="text-blue-700">${sc}</td><td class="font-bold ${getGrdCol(g)}">${g}</td></tr>`; 
                    }
                } else if(raw) {
                    t3Html += `<tr><td>${idx++}</td><td class="subject-col">${sub}</td><td>${cleanNum(gConf[sub])||50}</td><td class="text-red-500 font-bold">${raw}</td><td class="text-gray-400">-</td></tr>`;
                }
            });

            if(st.engVal !== '-') {
                let b = st.engVal >= 26 ? st.engVal - 25 : 0; let g = getGrd((st.engVal/50)*100);
                t3Html += `<tr class="bg-emerald-50 italic"><td>${idx++}</td><td class="subject-col text-emerald-700">អង់គ្លេស (Bonus)</td><td>50</td><td class="text-emerald-700">${st.engVal} (+${b})</td><td class="font-bold ${getGrdCol(g)}">${g}</td></tr>`;
            }

            document.getElementById('t3-tableArea').innerHTML = `<table class="c-table mt-4"><thead><tr class="bg-yellow-50 text-yellow-800"><th class="w-10">ល.រ</th><th class="w-48 text-left pl-2">មុខវិជ្ជា (គោល)</th><th class="w-24">អតិបរមា</th><th class="w-24">ពិន្ទុ</th><th class="w-16">និទ្ទេស</th></tr></thead><tbody>${t3Html}</tbody></table>`;
            document.getElementById('t3-signatures').innerHTML = getStampHTML(dateS, dateL, tInfo.sign);

            document.getElementById('t3-capture-area').classList.remove('hidden');
            document.getElementById('t3-actions').classList.remove('hidden');
            document.getElementById('t3-actions').classList.add('flex');
            
            switchTab('tab-bac2'); 
        }

        // ==========================================
        // ADMIN INTERNAL REPORTS (TAB 2)
        // ==========================================
        async function generateInternalReport(type) {
            let period = document.getElementById('monthSelect').value;
            let cls = document.getElementById('classSelect').value;
            if(!period || !cls) return alert("សូមជ្រើសរើសខែ និងថ្នាក់!");
            
            if(!(await fetchDatabase())) return;
            showLoading("កំពុងទាញទិន្នន័យថ្នាក់ " + cls);
            
            let renderArea = document.getElementById('internal-render-area');
            
            // Generate Data
            let pData = prepPeriodData(period);
            let cStudents = pData.classes[cls] ||[];

            if(cStudents.length === 0) { hideLoading(); return alert("គ្មានទិន្នន័យសម្រាប់ថ្នាក់នេះក្នុងខែនេះទេ!"); }

            if(type === 'honor') {
                let top5 = cStudents.filter(s => s.cRank !== "ម.ថ" && s.cRank <= 5);
                if(top5.length === 0) { hideLoading(); return alert("គ្មានសិស្សជាប់ចំណាត់ថ្នាក់ទេ។"); }
                renderArea.innerHTML = `<div class="print-area landscape-page">${buildHonorHtml(cls, top5, cStudents, period)}</div>`;
            }
            else if(type === 'ranking') {
                renderArea.innerHTML = `<div class="print-area portrait-page">${buildRankingHtml(cls, cStudents, period)}</div>`;
            }
            hideLoading();
        }

        function buildHonorHtml(cName, top5, allInClass, period) {
            let tInfo = teacherMap[cName] || {};
            let isBac2 = (cName.includes("១១")||cName.includes("11")||cName.includes("១២")||cName.includes("12")) && (classTypeMap[cName]?.includes("SC") || classTypeMap[cName]?.includes("SS"));
            let subjs = isBac2 ? (classTypeMap[cName].includes("SC")?["គណិតវិទ្យា","ភាសាខ្មែរ","រូបវិទ្យា","គីមីវិទ្យា","ជីវវិទ្យា","ប្រវត្តិវិទ្យា","ភាសាអង់គ្លេស"]:["ភាសាខ្មែរ","គណិតវិទ្យា","សីលធម៌ពលរដ្ឋ","ប្រវត្តិវិទ្យា","ភូមិវិទ្យា","ផែនដីវិទ្យា","ភាសាអង់គ្លេស"]) : SUBJECTS_15;
            
            let gConf = configList.find(c => c["កម្រិតថ្នាក់"]?.toString().trim() === cName) || {};
            
            let aSubjs = subjs.filter(sub => allInClass.some(s => !isNaN(cleanNum(s.base[sub]))));

            let html = `
                <div class="h-full flex flex-col justify-between">
                <div>
                ${buildHeaderHTML(`🏆 តារាងកិត្តិយសប្រចាំ ${period} 🏆`, `ថ្នាក់ទី ${cName} | គ្រូបន្ទុកថ្នាក់៖ ${tInfo.name}`)}
                <table class="c-table mt-4 text-[10px]"><thead><tr class="bg-yellow-100 text-yellow-900"><th class="w-8">លេខ</th><th class="text-left pl-2">ឈ្មោះសិស្ស</th><th class="w-8">ភេទ</th>
            `;
            aSubjs.forEach(s => html += `<th>${s.substring(0,5)}</th>`);
            html += `<th>មធ្យមភាគ</th><th>និទ្ទេស</th></tr></thead><tbody class="font-bold text-center">`;

            top5.forEach(s => {
                let rowCls = s.cRank === 1 ? "bg-yellow-50 text-blue-900" : "text-slate-800";
                html += `<tr class="${rowCls}"><td>${s.cRank}</td><td class="text-left pl-2 text-[11px]">${s.base.Name}</td><td>${s.base.Gender}</td>`;
                
                aSubjs.forEach(sub => {
                    let raw = String(s.base[sub]||"").toUpperCase().trim();
                    if(raw === "ABS" || raw === "A" || raw === "F" || raw === "អ" || raw === "ម.ថ" || !raw) {
                        html += `<td class="text-red-500">${raw||'ម.ថ'}</td>`;
                    } else {
                        let sc = cleanNum(s.base[sub]); let ms = cleanNum(gConf[sub])||50;
                        if(isNaN(sc)) html += `<td class="text-red-500">ម.ថ</td>`;
                        else {
                            let grd = getGrd((sc/ms)*100);
                            if(isBac2 && sub==="ភាសាអង់គ្លេស") { let b = sc>=26?sc-25:0; html += `<td>${sc}<br><span class="text-[8px] text-gray-500">(+${b})</span></td>`; }
                            else html += `<td>${sc} <span class="text-[8px] ${getGradeColorClass(grd)}">(${grd})</span></td>`;
                        }
                    }
                });
                
                let dispS = isBac2 && !period.includes("ឆមាស") && period!=="ប្រចាំឆ្នាំ" ? (s.stats.total.toFixed(2)) : s.stats.avg.toFixed(2);
                html += `<td class="text-blue-600 text-[12px]">${dispS}</td><td class="font-black ${getGrdCol(s.stats.grade)} text-[12px]">${s.stats.grade}</td></tr>`;
            });
            html += `</tbody></table>`;

            // Summary
            let gC = {A:0, B:0, C:0, D:0, E:0, F:0}; let gF = {A:0, B:0, C:0, D:0, E:0, F:0};
            allInClass.forEach(s => { if(s.stats.valid && gC[s.stats.grade]!==undefined) { gC[s.stats.grade]++; if(isFem(s.base.Gender)) gF[s.stats.grade]++; } });
            let tot = allInClass.filter(s=>s.stats.valid).length; let tABC = gC.A+gC.B+gC.C; let tDEF = gC.D+gC.E+gC.F;
            let pctABC = tot > 0 ? (tABC/tot)*100 : 0; let pctDEF = tot > 0 ? (tDEF/tot)*100 : 0;

            html += `
                <div class="mt-8 grid grid-cols-3 gap-6 items-center">
                    <div class="col-span-2">
                        <p class="text-sm font-bold text-blue-900 mb-2">📊 សរុបលទ្ធផលប្រចាំថ្នាក់ (អ្នកមានចំណាត់ថ្នាក់ ${tot} នាក់) ៖</p>
                        <table class="c-table w-full">
                            <thead><tr class="bg-slate-100"><th>និទ្ទេស</th><th class="text-red-600">A</th><th class="text-pink-600">B</th><th class="text-orange-600">C</th><th class="text-green-600">D</th><th class="text-blue-600">E</th><th class="text-slate-800">F</th></tr></thead>
                            <tbody class="font-bold text-center">
                                <tr><td class="text-left pl-2">សិស្សសរុប</td><td class="text-red-600">${gC.A}</td><td class="text-pink-600">${gC.B}</td><td class="text-orange-600">${gC.C}</td><td class="text-green-600">${gC.D}</td><td class="text-blue-600">${gC.E}</td><td class="text-slate-800">${gC.F}</td></tr>
                                <tr class="text-gray-500"><td>សិស្សស្រី</td><td>${gF.A}</td><td>${gF.B}</td><td>${gF.C}</td><td>${gF.D}</td><td>${gF.E}</td><td>${gF.F}</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="col-span-1 bg-slate-50 border p-4 rounded-xl text-center">
                        <p class="text-[10px] font-bold mb-1 text-gray-600">សិស្សជាប់ (A-C) ទល់នឹង ធ្លាក់/មធ្យម (D-F)</p>
                        <div class="w-full h-4 bg-slate-200 rounded-full overflow-hidden flex print-bar-bg">
                            <div class="h-full bg-emerald-500 print-bar-bg" style="width: ${pctABC}%"></div>
                            <div class="h-full bg-red-500 print-bar-bg" style="width: ${pctDEF}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold mt-1">
                            <span class="text-emerald-700">ជាប់: ${Math.round(pctABC)}%</span>
                            <span class="text-red-700">ធ្លាក់: ${Math.round(pctDEF)}%</span>
                        </div>
                    </div>
                </div>
            </div>`;

            let latestS = allInClass[0]?.base;
            let dateS = latestS ? latestS.DateSolar : '.......................';
            let dateL = latestS ? latestS.DateLunar : '.......................';
            html += getStampHTML(dateS, dateL, tInfo.sign) + `</div>`;
            return html;
        }

        function buildRankingHtml(cName, allInClass, period) {
            let tInfo = teacherMap[cName] || {};
            let isBac2 = (cName.includes("១១")||cName.includes("11")||cName.includes("១២")||cName.includes("12")) && (classTypeMap[cName]?.includes("SC") || classTypeMap[cName]?.includes("SS"));
            let subjs = isBac2 ? (classTypeMap[cName].includes("SC")?["គណិតវិទ្យា","ភាសាខ្មែរ","រូបវិទ្យា","គីមីវិទ្យា","ជីវវិទ្យា","ប្រវត្តិវិទ្យា","ភាសាអង់គ្លេស"]:["ភាសាខ្មែរ","គណិតវិទ្យា","សីលធម៌ពលរដ្ឋ","ប្រវត្តិវិទ្យា","ភូមិវិទ្យា","ផែនដីវិទ្យា","ភាសាអង់គ្លេស"]) : SUBJECTS_15;
            let gConf = configList.find(c => c["កម្រិតថ្នាក់"]?.toString().trim() === cName) || {};
            let aSubjs = subjs.filter(sub => allInClass.some(s => !isNaN(cleanNum(s.base[sub]))));

            let html = `
                <div class="h-full flex flex-col justify-between">
                <div>
                ${buildHeaderHTML(`តារាងចំណាត់ថ្នាក់សិស្សប្រចាំ ${period}`, `ថ្នាក់ទី ${cName} | សិស្សសរុប៖ ${allInClass.length} នាក់`)}
                <table class="c-table text-[9px] mt-4 w-full" style="table-layout: auto;"><thead><tr class="bg-blue-50 text-blue-900"><th class="w-6">ល.រ</th><th class="text-left pl-1">ឈ្មោះ</th><th>ភេទ</th>`;
            
            aSubjs.forEach(s => html += `<th>${s.substring(0,4)}</th>`);
            html += `<th>មធ្យម</th><th>និទ្ទេស</th><th>ចំណាត់ថ្នាក់</th></tr></thead><tbody class="font-bold text-center">`;

            allInClass.forEach((s, i) => {
                html += `<tr><td class="text-gray-500">${i+1}</td><td class="text-left pl-1 whitespace-nowrap">${s.base.Name}</td><td class="text-gray-500">${s.base.Gender}</td>`;
                aSubjs.forEach(sub => {
                    let raw = String(s.base[sub]||"").toUpperCase().trim();
                    if(raw === "ABS" || raw === "A" || raw === "F" || raw === "អ" || raw === "ម.ថ" || !raw) {
                        html += `<td class="text-red-500">${raw||'ម.ថ'}</td>`;
                    } else {
                        let sc = cleanNum(s.base[sub]); let ms = cleanNum(gConf[sub])||50;
                        if(isNaN(sc)) html += `<td class="text-red-500">ម.ថ</td>`;
                        else {
                            let grd = getGrd((sc/ms)*100);
                            html += `<td>${sc}<span class="text-[7px] block ${getGradeColorClass(grd)}">${grd}</span></td>`;
                        }
                    }
                });
                let dispS = isBac2 && !period.includes("ឆមាស") && period!=="ប្រចាំឆ្នាំ" ? s.stats.total.toFixed(2) : s.stats.avg.toFixed(2);
                let cRCls = s.cRank === "ម.ថ" ? "text-red-600 text-[10px]" : "text-red-600 text-sm";
                html += `<td class="text-blue-700">${s.stats.valid ? dispS : 0}</td><td class="font-black ${getGrdCol(s.stats.grade)}">${s.stats.grade}</td><td class="${cRCls}">${s.cRank}</td></tr>`;
            });
            html += `</tbody></table></div>`;

            let latestS = allInClass[0]?.base;
            let dateS = latestS ? latestS.DateSolar : '.......................';
            let dateL = latestS ? latestS.DateLunar : '.......................';
            html += getStampHTML(dateS, dateL, tInfo.sign) + `</div>`;
            return html;
        }

        async function bulkDownloadPDF(type) {
            let period = document.getElementById('adminPeriodSelect').value;
            let cls = document.getElementById('adminClassSelect').value;
            if(!period) return alert("សូមរើសខែ!");
            if(!(await fetchDatabase())) return;

            showLoading("កំពុងបង្កើត PDF...", "អាចចំណាយពេលយូរ...");
            await new Promise(r => setTimeout(r, 500));

            let offscreen = document.getElementById('pdfOffscreen');
            offscreen.innerHTML = '';
            
            let opt = { margin: 0, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4' } };

            try {
                if (type === 'tracking') {
                    if(!cls) throw new Error("សូមរើសថ្នាក់!");
                    let pData = prepPeriodData(period + "_N"); 
                    let cStudents = pData.classes[cls];
                    if(!cStudents || cStudents.length===0) throw new Error("គ្មានទិន្នន័យសិស្ស!");
                    
                    let bigHtml = '';
                    cStudents.forEach((stu, i) => {
                        bigHtml += buildStudentTab1Html(stu, period);
                    });
                    offscreen.innerHTML = bigHtml;
                    opt.filename = `សៀវភៅតាមដាន_${cls}_${period}.pdf`;
                    opt.jsPDF.orientation = 'portrait';
                } 
                else if (actionType === 'honor') {
                    let pData = prepPeriodData(period); 
                    let bigHtml = '';
                    let classes = Object.keys(pData.classes).sort();
                    classes.forEach((cName, i) => {
                        let stus = pData.classes[cName];
                        let top5 = stus.filter(s => s.cRank !== "ម.ថ" && s.cRank <= 5);
                        if(top5.length > 0) {
                            bigHtml += `<div class="html2pdf__page-break landscape-page" style="height:210mm;">${buildHonorHtml(cName, top5, stus, period)}</div>`;
                        }
                    });
                    if(!bigHtml) throw new Error("គ្មានសិស្សជាប់ចំណាត់ថ្នាក់!");
                    offscreen.innerHTML = bigHtml;
                    opt.filename = `តារាងកិត្តិយស_គ្រប់ថ្នាក់_${period}.pdf`;
                    opt.jsPDF.orientation = 'landscape';
                }
                else if (actionType === 'ranking') {
                    let pData = prepPeriodData(period); 
                    let bigHtml = '';
                    let classes = Object.keys(pData.classes).sort();
                    classes.forEach((cName, i) => {
                        let stus = pData.classes[cName];
                        if(stus.length > 0) {
                            bigHtml += `<div class="html2pdf__page-break portrait-page" style="height:297mm;">${buildRankingHtml(cName, stus, period)}</div>`;
                        }
                    });
                    offscreen.innerHTML = bigHtml;
                    opt.filename = `តារាងចំណាត់ថ្នាក់_គ្រប់ថ្នាក់_${period}.pdf`;
                    opt.jsPDF.orientation = 'portrait';
                }

                await html2pdf().set(opt).from(offscreen).save();
            } catch(e) {
                showError(e.message);
            }
            
            offscreen.innerHTML = '';
            hideLoading();
        }
    </script>
