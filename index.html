<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងការសិក្សា - វិទ្យាល័យ ហ៊ុន សែន កំពង់ត្រឡាច</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Moul&family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary-blue: #1e40af; --khmer-red: #dc2626; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f1f5f9; color: #1e293b; }
        .moul-font, .font-moul { font-family: 'Moul', serif; }
        .font-battambang { font-family: 'Battambang', cursive; }
        
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { background-color: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .tab-btn.inactive { background-color: white; color: #64748b; border-color: #cbd5e1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        .print-area { background: white; margin: 0 auto; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .portrait-page { width: 210mm; padding: 8mm 12mm; }
        .landscape-page { width: 297mm; padding: 10mm 15mm; }
        
        .sketch-summary { display: flex; justify-content: space-between; border: 1.5px solid #e2e8f0; border-radius: 12px; margin: 10px 0; padding: 8px 0; background: #ffffff; flex-wrap: wrap;}
        .sketch-item { flex: 1; text-align: center; position: relative; min-width: 20%; padding: 4px;}
        .sketch-item:not(:last-child)::after { content: ""; position: absolute; right: 0; top: 10%; height: 80%; width: 1px; background-color: #e2e8f0; }
        .sketch-label { font-size: 11px; color: #64748b; font-weight: bold; margin-bottom: 2px; }
        .sketch-value { font-size: 20px; font-weight: 800; line-height: 1.2; }
        .rank-context { font-size: 9px; color: #64748b; margin-top: 2px; line-height: 1.3; }
        
        .c-table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 11px; }
        .c-table th, .c-table td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        .c-table th { background-color: #f8fafc; color: var(--primary-blue); font-weight: 700; height: 30px; }
        .subject-col { text-align: left; padding-left: 10px; font-weight: bold; font-size: 12px; }
        
        .progress-container { width: 100%; background-color: #f1f5f9; border-radius: 10px; height: 8px; overflow: hidden; display: inline-block; vertical-align: middle; }
        .progress-bar { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        
        /* MoEYS Standard Colors */
        .grade-A { color: #dc2626; font-weight: 900; } /* Red */
        .grade-B { color: #db2777; font-weight: 900; } /* Pink */
        .grade-C { color: #ea580c; font-weight: 900; } /* Orange */
        .grade-D { color: #16a34a; font-weight: 900; } /* Green */
        .grade-E { color: #2563eb; font-weight: 900; } /* Blue */
        .grade-F { color: #334155; font-weight: 900; } /* Dark Slate/Black */
        
        .result-pass { color: #059669; font-weight: 900;} .result-fail { color: #dc2626; font-weight: 900;}

        .stamp-container { position: relative; width: 160px; height: 100px; text-align: center; display: inline-block; }
        .stamp-text { position: relative; z-index: 20; }
        .stamp-img { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); max-width: 110px; max-height: 110px; z-index: 10; opacity: 0.85; mix-blend-mode: multiply; pointer-events: none; }
        .sign-img { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 100px; max-height: 50px; z-index: 30; pointer-events: none; }

        .html2pdf__page-break { page-break-after: always; margin-top: 10px; }
        #pdfOffscreen { position: absolute; top: -9999px; left: -9999px; z-index: -10; background: white; }
        .print-bar-bg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        @media print {
            @page { size: A4 portrait; margin: 8mm; }
            @page landscape { size: A4 landscape; margin: 8mm; }
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-area { box-shadow: none; margin: 0; padding: 0; }
            tr { break-inside: avoid; page-break-inside: avoid; }
            .landscape-page { page: landscape; }
        }
    </style>
</head>
<body class="p-2 md:p-4">

    <!-- Navigation -->
    <div class="max-w-5xl mx-auto mb-6 flex flex-wrap justify-center gap-3 no-print mt-4">
        <button onclick="switchTab('tab-student')" id="btn-tab-student" class="tab-btn active px-5 py-2 rounded-full font-bold border-2 shadow-sm text-sm">លទ្ធផលសិស្ស</button>
        <button onclick="switchTab('tab-honor')" id="btn-tab-honor" class="tab-btn inactive px-5 py-2 rounded-full font-bold border-2 shadow-sm text-sm text-yellow-600 border-yellow-200">🏆 តារាងកិត្តិយស</button>
        <button onclick="switchTab('tab-admin')" id="btn-tab-admin" class="tab-btn inactive px-5 py-2 rounded-full font-bold border-2 shadow-sm text-sm bg-slate-800 text-white border-slate-800">រដ្ឋបាល (Admin)</button>
    </div>

    <!-- Search Section -->
    <div id="searchSection" class="max-w-4xl mx-auto my-6 no-print px-4">
        <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-blue-600">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">ការវាយតម្លៃ</label>
                    <select id="monthSelect" class="w-full p-3 rounded-xl bg-gray-50 border outline-none font-bold text-sm">
                        <optgroup label="ប្រចាំខែ" id="opt-months"></optgroup>
                        <optgroup label="ប្រឡងឆមាស"><option value="ប្រឡងឆមាសទី១">ប្រឡងឆមាសទី១</option><option value="ប្រឡងឆមាសទី២">ប្រឡងឆមាសទី២</option></optgroup>
                        <optgroup label="សរុប"><option value="ប្រចាំឆ្នាំ">ប្រចាំឆ្នាំ</option></optgroup>
                    </select>
                </div>
                
                <div class="space-y-1" id="inputContainer">
                    <label class="text-xs font-bold text-gray-500">អត្តលេខ ឬឈ្មោះសិស្ស</label>
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" class="w-full p-3 rounded-xl bg-gray-50 border outline-none font-bold text-sm" placeholder="ស្វែងរកទីនេះ...">
                        <button onclick="startScanner()" class="bg-gray-100 p-3 rounded-xl border hover:bg-gray-200 text-blue-600"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M0 .5A.5.5 0 0 1 .5 0h3a.5.5 0 0 1 0 1H1v2.5a.5.5 0 0 1-1 0v-3Zm12 0a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0V1h-2.5a.5.5 0 0 1-.5-.5ZM.5 12a.5.5 0 0 1 .5.5V15h2.5a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5v-3a.5.5 0 0 1 .5-.5Zm15 0a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1 0-1H15v-2.5a.5.5 0 0 1 .5-.5ZM4 4h1v1H4V4Z"/><path d="M7 2H2v5h5V2ZM3 3h3v3H3V3Zm2 8H4v1h1v-1Z"/><path d="M7 9H2v5h5V9Zm-4 1h3v3H3v-3Zm8-6h1v1h-1V4Z"/><path d="M9 2h5v5H9V2Zm1 1v3h3V3h-3ZM8 8v2h1v1H8v1h2v-2h1v2h1v-1h2v-1h-3V8H8Zm2 2H9V9h1v1Zm4 2h-1v1h-2v1h3v-2Zm-4 2v-1H8v1h2Z"/></svg></button>
                    </div>
                </div>
                <div class="space-y-1 hidden" id="classSelectContainer">
                    <label class="text-xs font-bold text-gray-500">ជ្រើសរើសថ្នាក់</label>
                    <select id="classSelect" class="w-full p-3 rounded-xl bg-gray-50 border outline-none font-bold text-sm"></select>
                </div>

                <div>
                    <button onclick="executeSearch()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 shadow-md">ឆែកមើលទិន្នន័យ</button>
                </div>
            </div>
            <div id="qr-reader" class="mt-4 hidden w-full overflow-hidden rounded-xl border-2 border-dashed"></div>
        </div>
    </div>

    <!-- UI View -->
    <div id="tab-student" class="tab-content active">
        <div id="single-view-area" class="print-area portrait-page hidden"></div>
        <div id="t1-actions" class="no-print mt-6 border-t pt-6 hidden flex-col items-center gap-4 mb-10 max-w-4xl mx-auto">
            <button onclick="downloadPDF('t1-capture-area', 'លទ្ធផល', 'portrait')" class="bg-emerald-600 text-white px-10 py-3 rounded-2xl font-bold shadow-lg hover:bg-emerald-700">ទាញយក PDF</button>
            <div class="flex flex-col md:flex-row gap-4 w-full">
                <button onclick="linkTelegram('Student')" class="flex-1 bg-sky-500 text-white py-3 rounded-xl font-bold shadow-md">ភ្ជាប់ Telegram សិស្ស</button>
                <button onclick="linkTelegram('Parent')" class="flex-1 bg-indigo-500 text-white py-3 rounded-xl font-bold shadow-md">ភ្ជាប់ Telegram អាណាព្យាបាល</button>
            </div>
        </div>
    </div>

    <div id="tab-honor" class="tab-content hidden">
        <div id="honor-capture-area" class="print-area print-landscape hidden landscape-page"></div>
        <div id="honor-actions" class="no-print mt-6 border-t pt-6 hidden flex-col items-center gap-4 mb-10 max-w-4xl mx-auto">
            <button onclick="downloadPDF('honor-capture-area', 'តារាងកិត្តិយស', 'landscape')" class="bg-yellow-600 text-black px-10 py-3 rounded-2xl font-bold shadow-lg hover:bg-yellow-500">ទាញយក PDF</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="tab-admin" class="tab-content hidden max-w-5xl mx-auto px-2">
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="bg-slate-800 p-6 text-white text-center">
                <h2 class="moul-font text-xl mb-2">ប្រព័ន្ធគ្រប់គ្រង និងទាញយករបាយការណ៍រួម</h2>
            </div>
            
            <div class="p-6 grid md:grid-cols-2 gap-8">
                <div class="space-y-4 border-r pr-6">
                    <h3 class="font-bold text-lg text-slate-700 border-b pb-2">១. កំណត់លក្ខខណ្ឌ</h3>
                    <div>
                        <label class="text-xs font-bold text-gray-500">ការវាយតម្លៃ</label>
                        <select id="adminPeriodSelect" class="w-full p-3 rounded-xl bg-gray-50 border outline-none font-bold text-sm">
                            <optgroup label="ប្រចាំខែ" id="admin-opt-months"></optgroup>
                            <optgroup label="ប្រឡងឆមាស"><option value="ប្រឡងឆមាសទី១">ប្រឡងឆមាសទី១</option><option value="ប្រឡងឆមាសទី២">ប្រឡងឆមាសទី២</option></optgroup>
                            <optgroup label="សរុប"><option value="ប្រចាំឆ្នាំ">ប្រចាំឆ្នាំ</option></optgroup>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">ថ្នាក់រៀន</label>
                        <select id="adminClassSelect" class="w-full p-3 rounded-xl bg-gray-50 border outline-none font-bold text-sm"></select>
                    </div>
                </div>

                <div class="space-y-3">
                    <h3 class="font-bold text-lg text-slate-700 border-b pb-2">២. ជម្រើសរបាយការណ៍ (PDF)</h3>
                    <button onclick="bulkDownload('tracking')" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold shadow-sm">📄 ទាញយកសៀវភៅតាមដាន (១ថ្នាក់)</button>
                    <button onclick="bulkDownload('honor')" class="w-full bg-yellow-500 text-slate-900 p-3 rounded-xl font-bold shadow-sm">🏆 ទាញយកតារាងកិត្តិយស (គ្រប់ថ្នាក់)</button>
                    <button onclick="bulkDownload('ranking')" class="w-full bg-purple-600 text-white p-3 rounded-xl font-bold shadow-sm">📊 ទាញយកតារាងចំណាត់ថ្នាក់ (គ្រប់ថ្នាក់)</button>
                </div>
            </div>

            <div class="bg-slate-50 p-6 border-t border-slate-200">
                <h3 class="font-bold text-slate-700 mb-4">⚙️ ការកំណត់ខែក្នុងឆមាស (ប្រព័ន្ធគណនាអូតូ)</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div id="sem1Checkboxes" class="space-y-1 text-xs font-bold text-slate-700"></div>
                    <div id="sem2Checkboxes" class="space-y-1 text-xs font-bold text-slate-700"></div>
                </div>
                <button onclick="saveAdminConfig()" class="mt-4 bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold">រក្សាទុកការកំណត់</button>
            </div>
        </div>
    </div>

    <div id="pdfOffscreen"></div>
    <div id="loadingOverlay" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-50">
        <div class="text-center bg-white p-8 rounded-3xl max-w-sm w-full mx-4">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-blue-900 font-black text-lg" id="loadingText">កំពុងដំណើរការ...</p>
            <p class="text-gray-500 text-xs mt-2" id="loadingSubText">សូមរង់ចាំបន្តិច</p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyew0jReOlN-LbCSwXbSiCWg8GkXt6LXxKtpD2joosbPDH07cc1zflDU4qc_fYCp3fH/exec"; 
        const TELEGRAM_BOT_USERNAME = "kampongtralach_bot";
        const ADMIN_PWD = "H@nm@m64"; 

        const PRINCIPAL_STAMP_URL = "https://drive.google.com/uc?export=view&id=1NaZuWB5GIQ_e472ZgBzFBIp0uxkxfW7T"; 
        const PRINCIPAL_SIGN_URL = ""; 

        const SUBJECTS_15 =["ភាសាខ្មែរ", "សីលធម៌ពលរដ្ឋ", "ប្រវត្តិវិទ្យា", "ភូមិវិទ្យា", "គណិតវិទ្យា", "រូបវិទ្យា", "គីមីវិទ្យា", "ជីវវិទ្យា", "ផែនដីវិទ្យា", "ភាសាអង់គ្លេស", "កីឡា", "កសិកម្ម", "បច្ចេកវិទ្យា", "បំណិន", "សុខភាព"];
        const allPossibleMonths =["វិច្ឆិកា", "ធ្នូ", "មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា"];
        
        let globalData = {}; let configList =[]; let classTypeMap = {}; let teacherMap = {}; let allClassNames =[];
        let semConfig = JSON.parse(localStorage.getItem('kths_sem_config')) || { sem1:['វិច្ឆិកា', 'ធ្នូ', 'មករា', 'កុម្ភៈ'], sem2:['មីនា', 'មេសា', 'ឧសភា', 'មិថុនា', 'កក្កដា'] };
        let processedStudentsCache = {}; 

        window.addEventListener('DOMContentLoaded', () => {
            renderMonthDropdown(); renderAdminCheckboxes();
            const params = new URLSearchParams(window.location.search);
            if (params.get('id') || params.get('stuId')) {
                document.getElementById('searchInput').value = params.get('id') || params.get('stuId');
                if(params.get('month')) document.getElementById('monthSelect').value = params.get('month');
                setTimeout(() => { executeSearch(); }, 500); 
            }
            fetchDatabase(); 
        });

        function switchTab(tabId) {
            if (tabId === 'tab-admin' && prompt("លេខសម្ងាត់ (Admin)៖") !== ADMIN_PWD) return;
            document.querySelectorAll('.tab-btn').forEach(btn => { btn.classList.remove('active'); btn.classList.add('inactive');});
            document.querySelectorAll('.tab-content').forEach(tab => { tab.classList.add('hidden'); });
            
            let actBtn = document.getElementById('btn-' + tabId);
            if(actBtn) { actBtn.classList.add('active'); actBtn.classList.remove('inactive'); }
            document.getElementById(tabId).classList.remove('hidden');
            
            document.getElementById('searchSection').classList.toggle('hidden', tabId === 'tab-admin');
            document.getElementById('inputContainer').classList.toggle('hidden', tabId === 'tab-honor');
            document.getElementById('classSelectContainer').classList.toggle('hidden', tabId !== 'tab-honor');
        }

        function renderMonthDropdown() {
            let s1 = document.getElementById('opt-months');
            let s2 = document.getElementById('admin-opt-months');
            s1.innerHTML = ''; s2.innerHTML = '';
            [...semConfig.sem1, ...semConfig.sem2].forEach(m => { 
                let opt = `<option value="${m}">${m}</option>`;
                s1.innerHTML += opt; s2.innerHTML += opt; 
            });
        }

        function renderAdminCheckboxes() {
            let s1Div = document.getElementById('sem1Checkboxes');
            let s2Div = document.getElementById('sem2Checkboxes');
            s1Div.innerHTML = ''; s2Div.innerHTML = '';
            allPossibleMonths.forEach(m => {
                let c1 = semConfig.sem1.includes(m) ? 'checked' : '';
                let c2 = semConfig.sem2.includes(m) ? 'checked' : '';
                s1Div.innerHTML += `<label class="flex items-center gap-1"><input type="checkbox" value="${m}" ${c1}> ${m}</label>`;
                s2Div.innerHTML += `<label class="flex items-center gap-1"><input type="checkbox" value="${m}" ${c2}> ${m}</label>`;
            });
        }

        function saveAdminConfig() {
            let sem1 = Array.from(document.getElementById('sem1Checkboxes').querySelectorAll('input:checked')).map(i => i.value);
            let sem2 = Array.from(document.getElementById('sem2Checkboxes').querySelectorAll('input:checked')).map(i => i.value);
            semConfig = { sem1, sem2 };
            localStorage.setItem('kths_sem_config', JSON.stringify(semConfig));
            renderMonthDropdown();
            alert("រក្សាទុកជោគជ័យ!");
        }

        function showLoading(text, subtext="") {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingSubText').innerText = subtext;
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

        async function fetchDatabase() {
            if(Object.keys(globalData).length > 0) return true; 
            showLoading("កំពុងទាញទិន្នន័យមេ...", "សូមរង់ចាំប្រមាណ ៥-១០ វិនាទី");
            try {
                const res = await fetch(`${API_URL}?action=getAllData`);
                const serverData = await res.json();
                if(serverData.error) throw new Error(serverData.error);

                configList = Object.values(serverData.configMax || {});
                configList.forEach(c => { if(c["កម្រិតថ្នាក់"]) classTypeMap[c["កម្រិតថ្នាក់"].toString().trim()] = (c["ប្រភេទថ្នាក់"] || c["ប្រភេទ"] || "").toString().toUpperCase(); });

                let sheetsToFetch =[...allPossibleMonths, "ប្រឡងឆមាសទី១", "ប្រឡងឆមាសទី២", "ប្រចាំឆ្នាំ"];

                    if(cls) {

        // Calculation Helpers
        function clean(v) { if(!v) return NaN; return parseFloat(v.toString().trim().replace(/[០-៩]/g, d=>"0123456789"["០១២៣៤៥៦៧៨៩".indexOf(d)])); }
        function getGrd(pct) { let p = Math.floor(pct); if(p>=90) return 'A'; if(p>=80) return 'B'; if(p>=70) return 'C'; if(p>=60) return 'D'; if(p>=50) return 'E'; return 'F'; }
        function getBarCol(pct) { if(pct>=90) return '#dc2626'; if(pct>=80) return '#c026d3'; if(pct>=70) return '#f97316'; if(pct>=60) return '#16a34a'; if(pct>=50) return '#2563eb'; return '#1e293b'; }
        function getGrdCol(g) { if(g==='A') return 'text-red-600'; if(g==='B') return 'text-fuchsia-600'; if(g==='C') return 'text-orange-600'; if(g==='D') return 'text-green-600'; if(g==='E') return 'text-blue-600'; return 'text-slate-800'; }
        function isFem(g) { let s = String(g).trim().toLowerCase(); return s==='ស្រី'||s==='f'||s==='ស'; }

        // Normal calculation: average = (total / max) * 50
        function calculateSheetScoreNormal(row, gConf) {
            if(!row) return { total:0, max:0, avg:0, percent:0, grade:'F', valid: false };
            let tS = 0, tM = 0, vC = 0;
            SUBJECTS_15.forEach(s => { 
                let raw = String(row[s]).toUpperCase();
                if(raw !== "ABS" && raw !== "A" && raw !== "F" && raw !== "អ") {
                    let sc=clean(row[s]); 
                    if(!isNaN(sc)){ tS+=sc; tM+=(clean(gConf[s])||50); vC++; } 
                }
            });
            if(vC === 0) return { total:0, max:0, avg:0, percent:0, grade:'F', valid: false };
            let pct = tM>0 ? (tS/tM)*100 : 0;
            return { total:tS, max:tM, avg: pct/2, percent:pct, grade: getGrd(pct), valid: true };
        }

        // Bac2 calculation (6 core + eng bonus)
        function calculateSheetScoreBac2(row, gConf, sGrade) {
            if(!row) return { total:0, max:0, avg:0, percent:0, grade:'F', valid: false };
            let track = classTypeMap[sGrade] || "";
            let tS = 0, tM = 0, vC = 0;
            let cSubjs = track.includes("SC") ?["គណិតវិទ្យា","ភាសាខ្មែរ","រូបវិទ្យា","គីមីវិទ្យា","ជីវវិទ្យា","ប្រវត្តិវិទ្យា"] :["ភាសាខ្មែរ","គណិតវិទ្យា","សីលធម៌ពលរដ្ឋ","ប្រវត្តិវិទ្យា","ភូមិវិទ្យា","ផែនដីវិទ្យា"];
            
            cSubjs.forEach(s => { 
                let raw = String(row[s]).toUpperCase();
                if(raw !== "ABS" && raw !== "A" && raw !== "F" && raw !== "អ") {
                    let sc=clean(row[s]); 
                    if(!isNaN(sc)){ tS+=sc; tM+=(clean(gConf[s])||50); vC++; } 
                }
            });
            
            if(vC === 0) return { total:0, max:0, avg:0, percent:0, grade:'F', valid: false, engVal:'-' };
            
            let eng = clean(row["ភាសាអង់គ្លេស"]); if(!isNaN(eng) && eng>=26) tS+=(eng-25);
            let pct = tM>0 ? (tS/tM)*100 : 0;
            return { total:tS, max:tM, avg: pct/2, percent:pct, grade: getGrd(pct), valid: true, engVal: isNaN(eng)?'-':eng };
        }

        function calculateStudent(id, sGrade, period) {
            let gConf = configList.find(c => c["កម្រិតថ្នាក់"]?.toString().trim() === sGrade) || {};
            let isUpper = sGrade.includes("១១") || sGrade.includes("12") || sGrade.includes("១២");
            let track = classTypeMap[sGrade] || "";
            let isBac2 = isUpper && (track.includes("SC") || track.includes("SS"));
            let isTab1 = period.includes("_N"); // Force normal calc for Tab 1
            if(isTab1) { isBac2 = false; period = period.replace("_N", ""); }

            if(period === "ប្រចាំឆ្នាំ") {
                let s1 = calcSem(id, 1, gConf, isBac2, sGrade); let s2 = calcSem(id, 2, gConf, isBac2, sGrade);
                let fAvg = (s1.avg>0 && s2.avg>0) ? (s1.avg+s2.avg)/2 : (s1.avg>0 ? s1.avg : s2.avg);
                return { s1Avg: s1.avg, s2Avg: s2.avg, avg: fAvg, percent: fAvg*2, grade: getGrd(fAvg*2), isBac2, valid: fAvg>0 };
            }
            if(period.includes("ឆមាស")) return calcSem(id, period.includes("១")?1:2, gConf, isBac2, sGrade);

            return isBac2 ? calculateSheetScoreBac2(globalData[period]?.find(x=>x.ID==id), gConf, sGrade) : calculateSheetScoreNormal(globalData[period]?.find(x=>x.ID==id), gConf);
        }

        function calcSem(id, sNum, gConf, isBac2, sGrade) {
            let mList = sNum===1 ? semConfig.sem1 : semConfig.sem2;
            let eSheet = sNum===1 ? "ប្រឡងឆមាសទី១" : "ប្រឡងឆមាសទី២";
            let ex = isBac2 ? calculateSheetScoreBac2(globalData[eSheet]?.find(x=>x.ID==id), gConf, sGrade) : calculateSheetScoreNormal(globalData[eSheet]?.find(x=>x.ID==id), gConf);
            
            let mTot = 0, mC = 0;
            mList.forEach(m => { 
                let ms = isBac2 ? calculateSheetScoreBac2(globalData[m]?.find(x=>x.ID==id), gConf, sGrade) : calculateSheetScoreNormal(globalData[m]?.find(x=>x.ID==id), gConf); 
                if(ms.valid){ mTot+=ms.avg; mC++; } 
            });
            let moAvg = mC>0 ? mTot/mC : 0;
            let fAvg = (ex.valid && moAvg>0) ? (ex.avg+moAvg)/2 : (ex.valid ? ex.avg : moAvg);
            return { exTot: ex.total, exAvg: ex.avg, moAvg: moAvg, avg: fAvg, percent: fAvg*2, grade: getGrd(fAvg*2), isBac2, valid: fAvg>0 };
        }

        function prepPeriodData(period) {
            if(processedStudentsCache[period]) return processedStudentsCache[period];
            
            let allStus = new Map();
            Object.values(globalData).forEach(sh => { if(sh) sh.forEach(s => { if(s.ID && s.Grade) allStus.set(s.ID, s); }) });

            let pData =[];
            allStus.forEach((s, id) => {
                let stats = calculateStudent(id, String(s.Grade).trim(), period);
                pData.push({ base: s, stats: stats });
            });

            // Calculate Ranks (Only rank those with valid > 0 avg)
            pData.sort((a,b) => b.stats.avg - a.stats.avg);
            let sR = 1, pS = null;
            pData.forEach((s, i) => { 
                if(!s.stats.valid) s.sRank = "ម.ថ";
                else { if(s.stats.avg !== pS){ sR = i+1; pS=s.stats.avg;} s.sRank = sR; }
            });

            let classGroups = {};
            pData.forEach(s => { let g = String(s.base.Grade).trim(); if(!classGroups[g]) classGroups[g]=[]; classGroups[g].push(s); });
            
            for(let g in classGroups) {
                classGroups[g].sort((a,b) => b.stats.avg - a.stats.avg);
                let cR = 1, cpS = null;
                classGroups[g].forEach((s, i) => { 
                    if(!s.stats.valid) s.cRank = "ម.ថ";
                    else { if(s.stats.avg !== cpS){ cR = i+1; cpS=s.stats.avg;} s.cRank = cR; }
                });
            }

            processedStudentsCache[period] = { all: pData, classes: classGroups };
            return processedStudentsCache[period];
        }

        async function executeStudentSearch() {
            let q = document.getElementById('searchInput').value.trim();
            let period = document.getElementById('monthSelect').value;
            if(!q) return alert("បញ្ជាក់អត្តលេខ!");
            if(!(await fetchDatabase())) return;

            showLoading("កំពុងគណនា...");
            
            let allStus = new Map();
            Object.values(globalData).forEach(sh => { if(sh) sh.forEach(s => { if(s.ID) allStus.set(s.ID, s); }) });
            
            let targetId = null;
            allStus.forEach((v, k) => { if(String(k)==q || String(v.Name).includes(q)) targetId = k; });

            if(!targetId) { hideLoading(); return alert("រកមិនឃើញសិស្ស!"); }

            // Force normal calc for Tab 1
            let pData = prepPeriodData(period + "_N");

            document.getElementById('t1-actions').classList.remove('hidden');
            document.getElementById('t1-actions').classList.add('flex');

            // --- TAB 3 BAC 2 ---
            let isUpper = pStu.base.Grade.includes("១១") || pStu.base.Grade.includes("12") || pStu.base.Grade.includes("១២");
            if (isUpper && !period.includes("ឆមាស") && period !== "ប្រចាំឆ្នាំ") {
                let track = classTypeMap[String(pStu.base.Grade).trim()] || "";
                if(track.includes("SC") || track.includes("SS")) {
                    let pDataB2 = prepPeriodData(period); // Auto bac2
                    let pbStu = pDataB2.all.find(x => x.base.ID == targetId);

        async function bulkDownload(actionType) {
            if(!(await fetchDatabase())) return;
            let period = document.getElementById('adminPeriodSelect').value;
            let cls = document.getElementById('adminClassSelect').value;
            
            showLoading("កំពុងរៀបចំឯកសារ PDF...", "អាចចំណាយពេល ១-២ នាទី អាស្រ័យលើទំហំទិន្នន័យ");
            await new Promise(r => setTimeout(r, 500)); 

            let offscreen = document.getElementById('pdfOffscreen');
            offscreen.innerHTML = '';

                if (actionType === 'tracking') {

                    let bigHtml = '';
                    cStudents.forEach((stu, i) => {
                        bigHtml += buildStudentTab1Html(stu, period);
                    });
                    offscreen.innerHTML = bigHtml;
                    opt.filename = `សៀវភៅតាមដាន_${cls}_${period}.pdf`;
                    opt.jsPDF.orientation = 'portrait';
                } 
                else if (actionType === 'honor') {
                    let pData = prepPeriodData(period); 
                    let bigHtml = '';
                    let classes = Object.keys(pData.classes).sort();
                    classes.forEach((cName, i) => {
                        let stus = pData.classes[cName];
                        let top5 = stus.filter(s => s.cRank !== "ម.ថ" && s.cRank <= 5);
                        if(top5.length > 0) {
                            bigHtml += buildHonorHtml(cName, top5, stus, period);
                        }
                    });
                    if(!bigHtml) throw new Error("គ្មានសិស្សជាប់ចំណាត់ថ្នាក់!");
                    offscreen.innerHTML = bigHtml;
                    opt.filename = `តារាងកិត្តិយស_គ្រប់ថ្នាក់_${period}.pdf`;
                    opt.jsPDF.orientation = 'landscape';
                }
                else if (actionType === 'ranking') {
                    let pData = prepPeriodData(period); 
                    let bigHtml = '';
                    let classes = Object.keys(pData.classes).sort();
                    classes.forEach((cName, i) => {
                        let stus = pData.classes[cName];
                        if(stus.length > 0) {
                            bigHtml += buildRankingHtml(cName, stus, period);
                        }
                    });
                    offscreen.innerHTML = bigHtml;
                    opt.filename = `តារាងចំណាត់ថ្នាក់_គ្រប់ថ្នាក់_${period}.pdf`;
                    opt.jsPDF.orientation = 'portrait';
                }

                await html2pdf().set(opt).from(offscreen).save();
            } catch(e) {
                alert(e.message);
            }
            
            offscreen.innerHTML = '';
            hideLoading();
        }

                        else {
                            let grd = getGrd((sc/ms)*100);
                            if(isBac2 && sub==="ភាសាអង់គ្លេស") { let b = sc>=26?sc-25:0; html += `<td>${sc}<br><span class="text-[8px] text-gray-500">(+${b})</span></td>`; }
                            else html += `<td>${sc} <span class="text-[8px] ${getGradeColorClass(grd)}">(${grd})</span></td>`;
                        }
                    }
                });
                
                let displayScore = isBac2 && !period.includes("ឆមាស") && period!=="ប្រចាំឆ្នាំ" ? (s.stats.total.toFixed(2)) : s.stats.avg.toFixed(2);
                html += `<td class="text-blue-600 text-[12px]">${displayScore}</td><td class="font-black ${getGrdCol(s.stats.grade)} text-[12px]">${s.stats.grade}</td></tr>`;
            });
            html += `</tbody></table>`;

            // Summary Stats
            let gC = {A:0, B:0, C:0, D:0, E:0, F:0}; let gF = {A:0, B:0, C:0, D:0, E:0, F:0};
            allInClass.forEach(s => { if(s.stats.valid && gC[s.stats.grade]!==undefined) { gC[s.stats.grade]++; if(isFem(s.base.Gender)) gF[s.stats.grade]++; } });
            let tot = allInClass.filter(s=>s.stats.valid).length; let tABC = gC.A+gC.B+gC.C; let tDEF = gC.D+gC.E+gC.F;
            let pctABC = tot > 0 ? (tABC/tot)*100 : 0; let pctDEF = tot > 0 ? (tDEF/tot)*100 : 0;

            html += `
                <div class="mt-8 grid grid-cols-3 gap-6 items-center">
                    <div class="col-span-2">
                        <p class="text-sm font-bold text-blue-900 mb-2">📊 សរុបលទ្ធផលប្រចាំថ្នាក់ (អ្នកមានចំណាត់ថ្នាក់ ${tot} នាក់) ៖</p>
                        <table class="c-table w-full">
                            <thead><tr class="bg-slate-100"><th>និទ្ទេស</th><th class="text-red-600">A</th><th class="text-pink-600">B</th><th class="text-orange-600">C</th><th class="text-green-600">D</th><th class="text-blue-600">E</th><th class="text-slate-800">F</th></tr></thead>
                            <tbody class="font-bold text-center">
                                <tr><td class="text-left pl-2">សិស្សសរុប</td><td class="text-red-600">${gC.A}</td><td class="text-pink-600">${gC.B}</td><td class="text-orange-600">${gC.C}</td><td class="text-green-600">${gC.D}</td><td class="text-blue-600">${gC.E}</td><td class="text-slate-800">${gC.F}</td></tr>
                                <tr><td class="text-left pl-2 text-gray-500">សិស្សស្រី</td><td class="text-gray-500">${gF.A}</td><td class="text-gray-500">${gF.B}</td><td class="text-gray-500">${gF.C}</td><td class="text-gray-500">${gF.D}</td><td class="text-gray-500">${gF.E}</td><td class="text-gray-500">${gF.F}</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="col-span-1 bg-slate-50 border p-4 rounded-xl text-center">
                        <p class="text-xs font-bold text-gray-500 mb-2">ជាប់ (A-C) ទល់នឹង មធ្យម/ធ្លាក់ (D-F)</p>
                        <div class="w-full h-4 bg-red-100 rounded-full overflow-hidden flex print-bar-bg">
                            <div class="h-full bg-emerald-500 print-bar-bg" style="width: ${pctABC}%"></div>
                            <div class="h-full bg-red-500 print-bar-bg" style="width: ${pctDEF}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold mt-1">
                            <span class="text-emerald-700">ជាប់: ${Math.round(pctABC)}%</span>
                            <span class="text-red-700">ធ្លាក់: ${Math.round(pctDEF)}%</span>
                        </div>
                    </div>
                </div>
            `;
            html += `</div>`; // Close content div

            // Date processing
            let latestM = period;
            if(period === "ប្រចាំឆ្នាំ" || period.includes("ឆមាស")) {
                let mList = [...semConfig.sem1, ...semConfig.sem2];
                for(let i=mList.length-1; i>=0; i--) {
                    if(globalData[mList[i]]?.find(x=>String(x.Grade).trim()===cName)) { latestM = mList[i]; break; }
                }
            }
            let latestS = globalData[latestM]?.find(i => String(i.Grade).trim() === cName);
            let dateS = latestS ? latestS.DateSolar : '.......................';
            let dateL = latestS ? latestS.DateLunar : '.......................';

            html += getStampHTML(dateS, dateL, tInfo.sign);
            html += `</div>`;
            return html;
        }

        function buildRankingHtml(cName, allInClass, period) {
            let tInfo = teacherMap[cName] || {};
            let isBac2 = (cName.includes("១១")||cName.includes("11")||cName.includes("១២")||cName.includes("12")) && (globalClassTypeMap[cName]?.includes("SC") || globalClassTypeMap[cName]?.includes("SS"));
            let subjs = isBac2 ? (globalClassTypeMap[cName].includes("SC")?["គណិតវិទ្យា","ភាសាខ្មែរ","រូបវិទ្យា","គីមីវិទ្យា","ជីវវិទ្យា","ប្រវត្តិវិទ្យា","ភាសាអង់គ្លេស"]:["ភាសាខ្មែរ","គណិតវិទ្យា","សីលធម៌ពលរដ្ឋ","ប្រវត្តិវិទ្យា","ភូមិវិទ្យា","ផែនដីវិទ្យា","ភាសាអង់គ្លេស"]) : SUBJECTS_15;
            let gConf = configList.find(c => c["កម្រិតថ្នាក់"]?.toString().trim() === cName) || {};
            let aSubjs = subjs.filter(sub => allInClass.some(s => !isNaN(clean(s.base[sub]))));

            let html = `
                <div class="portrait-page page-break-after: always; background:white; min-height: 290mm; display:flex; flex-direction:column; justify-content:space-between;">
                <div>
                ${buildHeaderHTML(`តារាងចំណាត់ថ្នាក់សិស្សប្រចាំ ${period}`, `ថ្នាក់ទី ${cName} | សិស្សសរុប៖ ${allInClass.length} នាក់`)}
                <table class="c-table text-[9px] mt-4 w-full" style="table-layout: auto;"><thead><tr class="bg-blue-50 text-blue-900"><th class="w-6">ល.រ</th><th class="text-left pl-1">ឈ្មោះ</th><th>ភេទ</th>`;
            
            aSubjs.forEach(s => html += `<th>${s.substring(0,4)}</th>`);
            html += `<th>មធ្យម</th><th>និទ្ទេស</th><th>ចំណាត់ថ្នាក់</th></tr></thead><tbody class="font-bold text-center">`;

            allInClass.forEach((s, i) => {
                html += `<tr><td class="text-gray-500">${i+1}</td><td class="text-left pl-1 whitespace-nowrap">${s.base.Name}</td><td class="text-gray-500">${s.base.Gender}</td>`;
                aSubjs.forEach(sub => {
                    let raw = String(s.base[sub]).toUpperCase();
                    if(raw === "ABS" || raw === "A" || raw === "F" || raw === "អ" || s.base[sub] === undefined || s.base[sub] === "") {
                        html += `<td class="text-red-500">ម.ថ</td>`;
                    } else {
                        let sc = clean(s.base[sub]); let ms = clean(gConf[sub])||50;
                        if(isNaN(sc)) html += `<td class="text-red-500">ម.ថ</td>`;
                        else {
                            let grd = getGrd((sc/ms)*100);
                            html += `<td>${sc}<span class="text-[7px] block ${getGradeColorClass(grd)}">${grd}</span></td>`;
                        }
                    }
                });
                
                let dispS = isBac2 && !period.includes("ឆមាស") && period!=="ប្រចាំឆ្នាំ" ? s.stats.total.toFixed(2) : s.stats.avg.toFixed(2);
                let cRCls = s.cRank === "ម.ថ" ? "text-red-600 text-[10px]" : "text-red-600 text-sm";
                html += `<td class="text-blue-700">${s.stats.valid ? dispS : 0}</td><td class="font-black ${getGrdCol(s.stats.grade)}">${s.stats.grade}</td><td class="${cRCls}">${s.cRank}</td></tr>`;
            });
            html += `</tbody></table></div>`;

            // Date processing
            let latestM = period;
            if(period === "ប្រចាំឆ្នាំ" || period.includes("ឆមាស")) {
                let mList = [...semConfig.sem1, ...semConfig.sem2];
                for(let i=mList.length-1; i>=0; i--) {
                    if(globalData[mList[i]]?.find(x=>String(x.Grade).trim()===cName)) { latestM = mList[i]; break; }
                }
            }
            let latestS = globalData[latestM]?.find(i => String(i.Grade).trim() === cName);
            let dateS = latestS ? latestS.DateSolar : '.......................';
            let dateL = latestS ? latestS.DateLunar : '.......................';

            html += getStampHTML(dateS, dateL, tInfo.sign);
            html += `</div>`;
            return html;
        }

        // Single Download Helpers
        function downloadSinglePDF() {
            html2pdf().set({
                margin: 0, filename: `លទ្ធផល_${document.getElementById('t1-resName').innerText}.pdf`,
                image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] }
            }).from(document.getElementById('single-view-area')).save();
        }
    </script>
</body>
</html>
