        async function supaFetchAll(endpoint) {
            let allData =[]; let offset = 0; const limit = 1000; let keepFetching = true;

                if (data.length > 0) {

                    offset += limit;

                    keepFetching = false; 
                }
                if (data.length < limit) keepFetching = false; 
            }
            return allData;
        }

        function getSubjectRank(studentId, subKey, classData) {
            let validScores = classData.map(s => ({ id: s.student_id, score: cleanNum(s[subKey]) })).filter(s => !isNaN(s.score)).sort((a, b) => b.score - a.score);
            let rank = 1;
            for(let i=0; i<validScores.length; i++) {
                if(i > 0 && validScores[i].score < validScores[i-1].score) rank = i + 1;
                if(validScores[i].id === studentId) return rank;
            }
            return '-';
        }

            let selectedCheckboxes = document.querySelectorAll('.chk-class:checked');

            if(selectedClasses.length === 0) return Swal.fire('បញ្ជាក់', 'សូមជ្រើសរើសយ៉ាងហោចណាស់មួយថ្នាក់!', 'warning');

            let period = rawPeriod.replace("ប្រចាំខែ ", "").replace("លទ្ធផល", "").trim();
            let table = period.includes("ប្រចាំឆមាស") ? "semester_scores" : (period === "ប្រចាំឆ្នាំ" ? "annual_scores" : "student_scores");
            let pCol = period.includes("ប្រចាំឆមាស") ? "semester_name" : (period === "ប្រចាំឆ្នាំ" ? "academic_year" : "month_name");

            showLoading("កំពុងទាញទិន្នន័យពី Database...", `ថ្នាក់ដែលរើស: ${selectedClasses.length}`);

            try {
                // 1. Fetch ALL records for the requested Period and Year
                let allPeriodData = await supaFetchAll(`${table}?${pCol}=eq.${encodeURIComponent(reqPeriod)}&academic_year=eq.${encodeURIComponent(academicYear)}`);
                
                // 2. Filter based on Selected Classes AND Filter by Grade
                let validData = allPeriodData.filter(s => {
                    let matchClass = selectedClasses.includes(String(s.grade).trim().toUpperCase());
                    if (!matchClass) return false;

                    // 🌟 ដំណើរការ Filter តាមនិទ្ទេស
                    if (gradeFilter === 'ALL') return true;

                    let stuGrade = String(s.grade_result || s.final_result || '').trim().toUpperCase();
                    
                    if (gradeFilter === 'ម.ថ') {
                        // បើសិនគ្មាននិទ្ទេស ឬ គ្មាន Rank ចាត់ទុកជា ម.ថ / គ្មានចំណាត់ថ្នាក់
                        return stuGrade === 'ម.ថ' || stuGrade === '' || !s.class_rank;

                        if (avg >= 80) intro = `អបអរសាទរ! លទ្ធផលសិក្សារបស់ <span class="font-bold">${sName}</span> ស្ថិតក្នុងកម្រិត <b class="text-blue-700">ល្អប្រសើរ</b>។ ការតាំងចិត្តរបស់អ្នកពិតជាគួរឱ្យកោតសរសើរ។`;
                        else if (avg >= 65) intro = `លទ្ធផលសិក្សារបស់ <span class="font-bold">${sName}</span> ស្ថិតក្នុងកម្រិត <b class="text-green-700">ល្អបង្គួរ</b>។ ប្អូនអាចធ្វើបានល្អជាងនេះទៀត ប្រសិនបើបន្ថែមការយកចិត្តទុកដាក់។`;
                        else if (avg >= 50) intro = `លទ្ធផលសិក្សារបស់ <span class="font-bold">${sName}</span> ស្ថិតក្នុងកម្រិត <b class="text-orange-600">មធ្យម</b>។ សូមបង្កើនការយកចិត្តទុកដាក់លើការសិក្សាបន្ថែមទៀត។`;
                        else intro = `លទ្ធផលសិក្សារបស់ <span class="font-bold">${sName}</span> ស្ថិតក្នុងកម្រិត <b class="text-red-600">ត្រូវខិតខំបន្ថែមជាបន្ទាន់</b>។ សូមកុំបាក់ទឹកចិត្ត ហើយចាប់ផ្តើមរៀនសូត្រឡើងវិញ។`;

                        if (strengths.length > 0 && weaknesses.length > 0) subAnalysis = `ប្អូនមានភាពលេចធ្លោលើមុខវិជ្ជា ${strText}។ ទន្ទឹមនឹងនេះ មុខវិជ្ជាដែលត្រូវប្រឹងបន្ថែមគឺ ${wkText}។`;
                        else if (strengths.length > 0) subAnalysis = `ភាពលេចធ្លោរបស់ប្អូនគឺមុខវិជ្ជា ${strText}។ សូមរក្សាសន្ទុះនេះ!`;
                        else if (weaknesses.length > 0) subAnalysis = `បញ្ហាចម្បងរបស់ប្អូនគឺប្រឈមមុខនឹងការលំបាកលើមុខវិជ្ជា ${wkText} សូមប្រឹងប្រែងបន្ថែម។`;

                        aiFeedbackHTML = `
                            <div class="ai-feedback-box">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-lg leading-none">🤖</span>
                                    <p class="font-black text-indigo-900 text-[11px] uppercase m-0">ការវិភាគ (AI Analysis)៖</p>
                                </div>
                                <div class="ai-text-content"><p>${intro} ${subAnalysis}</p></div>
                            </div>`;

                        let sigHtml = getStampHTML(dbS.date_solar, dbS.date_lunar, tInfo);

                        // 🌟 PUTTING IT ALL TOGETHER AS 1 STRICT PAGE
                        let pageHtml = `
                            <div class="print-area">
                                <div class="content-wrapper">${headerHtml}${summaryHtml}${tableHtml}${aiFeedbackHTML}</div>
                                ${sigHtml}
                            </div>
                        `;
                        finalHTML += pageHtml;
                    }
                }

                document.getElementById('results-container').innerHTML = finalHTML;
                document.getElementById('results-container').classList.remove('hidden');
                document.getElementById('btnPrint').classList.remove('hidden');
                
                hideLoading();
                Swal.fire('រួចរាល់', `បានរៀបចំសិស្សសរុប ${processedCount} នាក់។ លោកគ្រូអាចចុច Print បានហើយ។`, 'success');
            } catch (e) { 
                hideLoading(); 
                Swal.fire('បរាជ័យ!', e.message, 'error'); 
            }
        }
    </script>
</body>
</html>
