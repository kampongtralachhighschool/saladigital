        const getGrdCol = (g) => g==='A'?'text-red-600':g==='B'?'text-pink-600':g==='C'?'text-orange-600':g==='D'?'text-green-600':g==='E'?'text-blue-600':'text-slate-800';

        function showLoading() { document.getElementById('loadingOverlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

        async function supaFetch(endpoint) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { headers });
            if (!res.ok) throw new Error("Network Error");
            return await res.json();
        }

        async function fetchInitialData() {
            try {
                let confRes = await supaFetch(`config_max_scores?select=*`);
                if(Array.isArray(confRes)) {
                    confRes.forEach(c => { 
                        if(c.grade_level) configMap[cleanKey(c.grade_level)] = c; 
                    });
                }
                let teachRes = await supaFetch(`teacher_info?select=*`);
                if(Array.isArray(teachRes)) {
                    teachRes.forEach(t => { 
                        if(t.homeroom_class) {
                            teacherMap[cleanKey(t.homeroom_class)] = { 
                                name: t.teacher_name || 'មិនមានឈ្មោះ', 
                                sign: getDriveImgUrl(t.signature_link) 
                            }; 
                        }
                    });
                }
            } catch(e) { console.error("Init Error", e); }
        }

        async function ensureConfigLoaded() {
            if (Object.keys(configMap).length === 0 || Object.keys(teacherMap).length === 0) {
                await fetchInitialData();
            }
        }

        function mapDbToLegacy(row) {
            let res = { ID: row.student_id, Name: row.student_name, Gender: row.gender, Grade: row.grade, DOB: row.dob||'', DateSolar: row.date_solar||'', DateLunar: row.date_lunar||'', Total: row.total_score || row.exam_total_score || 0, Average: row.average || row.semester_average || row.annual_average || 0, Rank: row.class_rank, "ចំណាត់ថ្នាក់ក្នុងសាលា": row.school_rank, Grade_Result: row.grade_result || row.final_result || 'F' };
            SUBJECTS_15.forEach(sub => { res[sub] = row[dbMap[sub]]; });
            return res;
        }

        async function executeSearch() {
            let q = document.getElementById('searchInput').value.trim();

            if(!q) return Swal.fire('បញ្ជាក់', 'សូមបញ្ចូលអត្តលេខ ឬឈ្មោះសិស្សជាមុនសិន!', 'warning');
            
            localStorage.setItem('kpt_last_search_id', q);
            localStorage.setItem('kpt_last_search_month', period);
            showLoading();
            
            await ensureConfigLoaded();

            let table = period.includes("ប្រចាំឆមាស") ? "semester_scores" : (period === "ប្រចាំឆ្នាំ" ? "annual_scores" : "student_scores");
            let pCol = period.includes("ប្រចាំឆមាស") ? "semester_name" : (period === "ប្រចាំឆ្នាំ" ? "academic_year" : "month_name");
            let reqPeriod = period === "ប្រចាំឆ្នាំ" ? new Date().getFullYear().toString() : period;

            try {
                let data = await supaFetch(`${table}?${pCol}=eq.${encodeURIComponent(reqPeriod)}&or=(student_id.eq.${encodeURIComponent(q)},student_name.ilike.%25${encodeURIComponent(q)}%25)&limit=1`);
                
                if(!data || data.length === 0) {
                    hideLoading(); return Swal.fire('រកមិនឃើញ!', `មិនមានទិន្នន័យរបស់សិស្ស [${q}] សម្រាប់ ${period} ទេ!`, 'error');

                else if (period.includes("ប្រឡងឆមាសទី២")) { dynamicTitle = "លទ្ធផលសិក្សារបស់សិស្សប្រឡងឆមាសលើកទី២"; } 
                else if (period.includes("ប្រចាំឆមាសទី១")) { dynamicTitle = "លទ្ធផលសិក្សារបស់សិស្សប្រចាំឆមាសទី១"; } 
                else if (period.includes("ប្រចាំឆមាសទី២")) { dynamicTitle = "លទ្ធផលសិក្សារបស់សិស្សប្រចាំឆមាសទី២"; } 
                else if (period.includes("ប្រចាំឆ្នាំ")) { dynamicTitle = "លទ្ធផលសិក្សារបស់សិស្សប្រចាំឆ្នាំ"; }

                        </div>

                document.getElementById('t1-summaryArea').innerHTML = `
                    <div class="summary-item"><p class="s-title">មធ្យមភាគ</p><p class="s-value">${s.Average}</p></div>
                    <div class="summary-item"><p class="s-title">ចំណាត់ថ្នាក់ក្នុងថ្នាក់</p><p class="s-value text-red-600">${s.Rank||'-'}</p></div>

                    <div class="summary-item"><p class="s-title">និទ្ទេសរួម</p><p class="s-value ${getGrdCol(s.Grade_Result)}">${s.Grade_Result || 'F'}</p></div>

                let tRows = ""; let idx=1; let maxTotal = 0;

                document.getElementById('t1-tableArea').innerHTML = `<table class="c-table"><thead><tr class="bg-slate-50"><th class="w-8 border-r border-slate-200">ល.រ</th><th class="col-left w-48 border-r border-slate-200">មុខវិជ្ជា</th><th class="w-20 border-r border-slate-200">អតិបរមា</th><th class="w-24 border-r border-slate-200">ពិន្ទុ</th><th class="w-32 border-r border-slate-200">ភាគរយ</th><th class="w-16">និទ្ទេស</th></tr></thead><tbody>${tRows}</tbody><tfoot><tr class="bg-slate-100 border-t-2 border-slate-300"><td colspan="2" class="col-left text-right font-bold py-2">ពិន្ទុសរុប</td><td class="font-bold text-gray-600">${maxTotal || '-'}</td><td class="text-blue-700 font-black text-lg">${s.Total || '-'}</td><td colspan="2" class="text-gray-400 text-[10px] italic">សមិទ្ធផលសិក្សាគិតជាភាគរយ</td></tr></tfoot></table>`;
                document.getElementById('t1-signatures').innerHTML = getStampHTML(s.DateSolar, s.DateLunar, tInfo);
                
                // P2 Build (ប្រៀបធៀប)

                document.getElementById('t1-p2-header').innerHTML = buildPrintHeader(`តារាងប្រៀបធៀបលទ្ធផលសិក្សាតាមមុខវិជ្ជាប្រចាំខែ`);

                let availableMonths =["វិច្ឆិកា", "ធ្នូ", "មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា"].filter(m => histData.some(d => d.month_name === m));

                if (availableMonths.length === 0) {
                    document.getElementById('t1-chartArea').innerHTML = `<div class="text-center p-10 border-2 border-dashed rounded-xl"><p class="text-slate-500 font-bold">មិនទាន់មានទិន្នន័យប្រចាំខែ សម្រាប់ធ្វើការប្រៀបធៀបទេ!</p></div>`;

            if(!username) return;
            showLoading();
            try {
                let resGet = await fetch(`${SUPABASE_URL}/rest/v1/telegram_db?student_id=eq.${encodeURIComponent(currentStudentInfo.id)}`, { headers });
                let existing = await resGet.json();
                
                let payload = { student_id: currentStudentInfo.id, student_name: currentStudentInfo.name };
                if (existing.length > 0) {
                    payload = existing[0];
                    let currentField = type === 'Student' ? payload.telegram_student : payload.telegram_parent;
                    if(currentField && !currentField.includes(username)) payload[type === 'Student' ? 'telegram_student' : 'telegram_parent'] = currentField + ";" + username;
                    else if(!currentField) payload[type === 'Student' ? 'telegram_student' : 'telegram_parent'] = username;
                } else { payload[type === 'Student' ? 'telegram_student' : 'telegram_parent'] = username; }

                let res = await fetch(`${SUPABASE_URL}/rest/v1/telegram_db?on_conflict=student_id`, { method: "POST", headers: { ...headers, "Prefer": "resolution=merge-duplicates" }, body: JSON.stringify([payload]) });
                hideLoading();
                if(res.ok) Swal.fire('ជោគជ័យ!', 'បានភ្ជាប់ប្រព័ន្ធ Telegram រួចរាល់!', 'success');
                else throw new Error("Update Failed");
            } catch(e) { hideLoading(); Swal.fire('បរាជ័យ!', e.message, 'error'); }
        }
    </script>
</body>
</html>
