        // Text-to-Speech Function
        function speakAIText() {
            if (!currentSpeechText) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // បញ្ឈប់សំឡេងចាស់បើមាន
                let utterance = new SpeechSynthesisUtterance(currentSpeechText);
                utterance.lang = 'km-KH'; // កំណត់ភាសាខ្មែរ
                utterance.rate = 0.9; // ល្បឿនអាន
                
                // ព្យាយាមរកសំឡេង Google បើមាន
                let voices = window.speechSynthesis.getVoices();
                let khmerVoice = voices.find(voice => voice.lang.includes('km') || voice.lang.includes('KM'));
                if(khmerVoice) utterance.voice = khmerVoice;

                window.speechSynthesis.speak(utterance);
            } else {
                Swal.fire('សុំទោស', 'ទូរស័ព្ទឬកម្មវិធីរបស់អ្នកមិនគាំទ្រមុខងារអានសំឡេងទេ!', 'info');
            }
        }

        // Calculate Rank Locally
        function getSubjectRank(studentId, subKey, classData) {
            let validScores = classData
                .map(s => ({ id: s.student_id, score: cleanNum(s[subKey]) }))
                .filter(s => !isNaN(s.score))
                .sort((a, b) => b.score - a.score);

            let rank = 1;
            for(let i=0; i<validScores.length; i++) {
                if(i > 0 && validScores[i].score < validScores[i-1].score) rank = i + 1;
                if(validScores[i].id === studentId) return rank;
            }
            return '-';
        }

                            let d = histMap[m];
                            if(d && d[sub] && !isNaN(cleanNum(d[sub]))) {
                                let sc = cleanNum(d[sub]); let pct = Math.min((sc/maxS)*100, 100); let g = getGrd(pct);
                                tb += `<td class="font-black border-r border-slate-200 ${getGrdCol(g)} text-[11px]">${sc} <span class="text-[9px] text-slate-400 font-bold">(${g})</span></td>`;
                            } else tb += `<td class="text-slate-300 border-r border-slate-200">-</td>`;
                        });
                        tb += `</tr>`;
                    });
                    tb += `</tbody></table>`;

                    // =====================================
                    // 🧠 ប្រព័ន្ធវិភាគ និងប្រឹក្សាដោយ AI (P2)
                    // =====================================
                    let aiAnalysisHtml = "";
                    if(availablePeriods.length >= 2) {
                        let lastPeriod = availablePeriods[availablePeriods.length - 1];
                        let prevPeriod = availablePeriods[availablePeriods.length - 2];
                        let dLast = histMap[lastPeriod];
                        let dPrev = histMap[prevPeriod];

                        let improved =[];
                        let declined = [];
                        let stable = [];
                        let warnings =[];

                        SUBJECTS_10.forEach(sub => {
                            if(dLast[sub] && dPrev[sub]) {
                                let s1 = cleanNum(dPrev[sub]);
                                let s2 = cleanNum(dLast[sub]);
                                let maxS = 50; if(dbMap[sub] && gConf[dbMap[sub]]) maxS = cleanNum(gConf[dbMap[sub]]);

                                if(!isNaN(s1) && !isNaN(s2)) {
                                    if(s2 > s1) improved.push(sub);
                                    else if(s2 < s1) {
                                        declined.push(sub);
                                        if(s2 < (maxS/2)) warnings.push(sub);
                                    }
                                    else stable.push(sub);
                                }
                            }
                        });

                        let diffAvg = (cleanNum(dLast.Average) - cleanNum(dPrev.Average)).toFixed(2);
                        
                        let aiText = `<div class="flex items-center gap-2 mb-2"><span class="text-xl">🤖</span><p class="font-black text-blue-900 text-[12px] uppercase">ការវិភាគចំណុចប្រែប្រួល (AI Analysis)：</p></div>`;
                        aiText += `<div class="text-[11px] text-slate-700 leading-relaxed text-justify px-2">`;

                        if(diffAvg > 0) {
                            aiText += `ធៀបនឹង <b>${prevPeriod}</b> មធ្យមភាគរបស់ប្អូនសម្រាប់ <b>${lastPeriod}</b> ឃើញថាមានការកើនឡើង <b>+${diffAvg}</b> ពិន្ទុ 📈។ លទ្ធផលនេះបង្ហាញពីការខិតខំប្រឹងប្រែងយ៉ាងពិតប្រាកដ លោកគ្រូអ្នកគ្រូសូមកោតសរសើរ! `;
                        } else if(diffAvg < 0) {
                            aiText += `ធៀបនឹង <b>${prevPeriod}</b> មធ្យមភាគរបស់ប្អូនសម្រាប់ <b>${lastPeriod}</b> ឃើញថាមានការថយចុះ <b>${diffAvg}</b> ពិន្ទុ 📉។ សូមកុំទាន់បាក់ទឹកចិត្ត នេះគ្រាន់តែជាការជំពប់ជើងបន្តិចបន្តួចប៉ុណ្ណោះ។ `;
                        } else {
                            aiText += `ធៀបនឹង <b>${prevPeriod}</b> មធ្យមភាគរបស់ប្អូនសម្រាប់ <b>${lastPeriod}</b> គឺរក្សាបានថេរ ⚖️។ `;
                        }

                        if(improved.length > 0) {
                            aiText += `<br><br>🌟 <b>ចំណុចខ្លាំង៖</b> ប្អូនធ្វើបានល្អខ្លាំងដោយមានការរីកចម្រើនពិន្ទុលើមុខវិជ្ជា <span class="text-green-600 font-bold">${improved.join(', ')}</span>។ `;
                        }
                        if(declined.length > 0) {
                            aiText += `<br>⚠️ <b>ចំណុចត្រូវពង្រឹង៖</b> ទន្ទឹមនឹងនេះ មុខវិជ្ជាដែលមានការថយចុះពិន្ទុមាន <span class="text-orange-600 font-bold">${declined.join(', ')}</span>។ `;
                        }
                        if(warnings.length > 0) {
                            aiText += `<span class="text-red-600 font-bold underline">ជាពិសេសត្រូវប្រុងប្រយ័ត្នខ្ពស់លើមុខវិជ្ជា ${warnings.join(', ')} ព្រោះពិន្ទុប្អូនស្ថិតក្នុងកម្រិតប្រកាសអាសន្ន។</span> `;
                        }

                        aiText += `<br><br>💡 <b>យោបល់ប្រឹក្សា៖</b> `;
                        if(warnings.length > 0 || diffAvg < 0) {
                            aiText += `លោកគ្រូអ្នកគ្រូសូមលើកទឹកចិត្តឲ្យប្អូនកុំបោះបង់។ សូមចំណាយពេលរំលឹកមេរៀនឡើងវិញឲ្យបានច្រើន សាកសួរលោកគ្រូអ្នកគ្រូ ឬរៀនជុំគ្នាជាមួយមិត្តភក្តិ។ យើងជឿជាក់ថាប្អូនពិតជាអាចស្តារលទ្ធផលឡើងវិញបាននៅពេលបន្ទាប់!`;
                        } else {
                            aiText += `លទ្ធផលរបស់ប្អូនកំពុងដើរលើផ្លូវត្រូវហើយ។ សូមរក្សាវិន័យនៃការសិក្សានេះជាបន្តទៀត កុំធ្វេសប្រហែសឲ្យសោះ ក្តីជោគជ័យដ៏ធំកំពុងរង់ចាំប្អូននៅខាងមុខ!`;
                        }
                        aiText += `</div>`;

                        aiAnalysisHtml = `<div class="mt-4 p-4 border-2 border-dashed border-blue-300 bg-blue-50/50 rounded-xl">${aiText}</div>`;
                    } else {
                        aiAnalysisHtml = `<div class="mt-4 p-3 text-center border border-slate-200 bg-slate-50 text-[10px] text-slate-500 rounded-xl">មិនទាន់មានទិន្នន័យគ្រប់គ្រាន់សម្រាប់ប្រព័ន្ធធ្វើការវិភាគប្រៀបធៀបនៅឡើយទេ (ត្រូវការយ៉ាងតិច ២ ខែ/ឆមាស)។</div>`;
                    }

                    document.getElementById('t1-comparisonTableContainer').innerHTML = tb + aiAnalysisHtml;
                }
                
                document.getElementById('t1-p2-signatures').innerHTML = getStampHTML(dbS.date_solar, dbS.date_lunar, tInfo);

                document.getElementById('results-container').classList.remove('hidden');
                document.getElementById('t1-actions').classList.remove('hidden');
                document.getElementById('t1-actions').classList.add('flex');
                hideLoading();
            } catch (e) { hideLoading(); Swal.fire('បរាជ័យ!', e.message, 'error'); }
        }

        // Telegram Logic Redirect
        function linkTelegram(type) {
            if(!currentStudentInfo) return Swal.fire('បញ្ជាក់', 'សូមស្វែងរកសិស្សជាមុនសិន!', 'warning');
            
            let payload = `${type}_${currentStudentInfo.id}`;
            let botUrl = `https://t.me/${TELEGRAM_BOT_USERNAME}?start=${payload}`;
            
            Swal.fire({
                title: 'ភ្ជាប់ Telegram',
                text: 'ប្រព័ន្ធនឹងបើកកម្មវិធី Telegram របស់អ្នក ហើយបញ្ជូនទៅកាន់ Bot របស់សាលាដើម្បីភ្ជាប់លេខសម្គាល់ដោយស្វ័យប្រវត្តិ។',
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'បើក Telegram',
                cancelButtonText: 'បោះបង់'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.open(botUrl, '_blank');
                }
            });
        }
    </script>
