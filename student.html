        async function supaFetchAll(endpoint) {
            let allData =[]; let offset = 0; const limit = 1000; let keepFetching = true;
            const separator = endpoint.includes('?') ? '&' : '?';
            while (keepFetching) {
                const url = `${SUPABASE_URL}/rest/v1/${endpoint}${separator}limit=${limit}&offset=${offset}`;
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error("Network Error");
                const data = await res.json();
                if (data.length > 0) { allData = allData.concat(data); offset += limit; } else { keepFetching = false; }
                if (data.length < limit) { keepFetching = false; }
            }
            return allData;
        }

            let rank = 1;
            for(let i=0; i<validScores.length; i++) {
                if(i > 0 && validScores[i].score < validScores[i-1].score) rank = i + 1;

                    } else { aiAnalysisHtml = `<div class="mt-4 p-3 text-center border border-slate-200 bg-slate-50 text-[10px] text-slate-500 rounded-xl">មិនទាន់មានទិន្នន័យគ្រប់គ្រាន់សម្រាប់ប្រព័ន្ធធ្វើការវិភាគប្រៀបធៀបនៅឡើយទេ (ត្រូវការយ៉ាងតិច ២ ខែ/ឆមាស)។</div>`; }

                    document.getElementById('t1-comparisonTableContainer').innerHTML = tb + aiAnalysisHtml;
                }
                
                document.getElementById('t1-p2-signatures').innerHTML = getStampHTML(dbS.date_solar, dbS.date_lunar, tInfo);
                document.getElementById('results-container').classList.remove('hidden'); document.getElementById('t1-actions').classList.remove('hidden'); document.getElementById('t1-actions').classList.add('flex');
                
                generateCaptcha(); 
                document.getElementById('captchaInput').value = '';
                hideLoading();
            } catch (e) { hideLoading(); generateCaptcha(); Swal.fire('បរាជ័យ!', e.message, 'error'); }
        }

        function linkTelegram(type) { if(!currentStudentInfo) return Swal.fire('បញ្ជាក់', 'សូមស្វែងរកសិស្សជាមុនសិន!', 'warning'); let payload = `${type}_${currentStudentInfo.id}`; let botUrl = `https://t.me/${TELEGRAM_BOT_USERNAME}?start=${payload}`; window.open(botUrl, '_blank'); }
    </script>
