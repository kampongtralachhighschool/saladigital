        async function supaFetch(endpoint) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { headers });
            if (!res.ok) throw new Error("Network Error");
            return await res.json();
        }

        async function fetchInitialData() {
            try {
                let confRes = await supaFetch(`config_max_scores?select=*`);
                confRes.forEach(c => { if(c.grade_level) configMap[cleanKey(c.grade_level)] = c; });

                let teachRes = await supaFetch(`teacher_info?select=*`);
                teachRes.forEach(t => {

                });
            } catch(e) { console.error("Init Error", e); }
        }

            if (Object.keys(configMap).length === 0 || Object.keys(teacherMap).length === 0) await fetchInitialData();

        // 🌟 Calculate Subject Rank locally (since we fetch the whole class)
        function getSubjectRank(studentId, subKey, classData) {
            let validScores = classData
                .map(s => ({ id: s.student_id, score: cleanNum(s[subKey]) }))
                .filter(s => !isNaN(s.score))
                .sort((a, b) => b.score - a.score);

            let rank = 1;
            for(let i=0; i<validScores.length; i++) {
                if(i > 0 && validScores[i].score < validScores[i-1].score) rank = i + 1;
                if(validScores[i].id === studentId) return rank;
            }
            return '-';
        }

                            sRankHtml = `<td class="font-black text-red-600">${r}</td>`;
                        }

                        if(raw.toUpperCase() === "ABS" || raw.toUpperCase() === "ម.ថ" || isNaN(cleanNum(raw))) {
                            tRows += `<tr><td>${idx++}</td><td class="col-left font-bold text-slate-800">${sub}</td><td>${ms}</td><td class="text-red-500 font-bold">${raw}</td>${sRankHtml}<td colspan="2">-</td></tr>`;
                        } else {
                            let sc = cleanNum(raw); let pct = Math.min((sc/ms)*100,100); let g = getGrd(pct);
                            tRows += `<tr><td>${idx++}</td><td class="col-left font-bold text-slate-800">${sub}</td><td>${ms}</td><td class="text-blue-700 font-bold text-[13px]">${sc}</td>${sRankHtml}<td><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${getBarCol(pct)}"></div></div></td><td class="font-bold text-[13px] ${getGrdCol(g)}">${g}</td></tr>`;
                            
                            if(pct >= 80) strengths.push(sub);
                            if(pct <= 50) weaknesses.push(sub);
                        }
                    }
                });
                
                let totScore = dbS.total_score || dbS.exam_total_score || 0;
                let tFootColspan = showSubRank ? 3 : 2;
                document.getElementById('t1-tableArea').innerHTML = `<table class="c-table"><thead>${tHeaders}</thead><tbody>${tRows}</tbody><tfoot><tr class="bg-slate-100 border-t-2 border-slate-300"><td colspan="2" class="col-left text-right font-bold py-2">ពិន្ទុសរុប</td><td class="font-bold text-gray-600">${maxTotal || '-'}</td><td class="text-blue-700 font-black text-lg">${totScore}</td><td colspan="${tFootColspan}" class="text-gray-400 text-[10px] italic">សមិទ្ធផលសិក្សាគិតជាភាគរយ</td></tr></tfoot></table>`;
                
                // 🌟 AI Feedback Box
                let sMapped = mapDbToLegacy(dbS);
                let aiFeedbackHTML = generateAIFeedback(type, sMapped, strengths, weaknesses);
                document.getElementById('t1-ai-feedback').innerHTML = aiFeedbackHTML;

                document.getElementById('t1-signatures').innerHTML = getStampHTML(dbS.date_solar, dbS.date_lunar, tInfo);
                
                // =====================================
                // P2 Build (ប្រៀបធៀប - Update for All Types)
                // =====================================
                let histDataRaw = await supaFetch(`student_scores?student_id=eq.${encodeURIComponent(dbS.student_id)}&academic_year=eq.${encodeURIComponent(academicYear)}`);
                let semDataRaw = await supaFetch(`semester_scores?student_id=eq.${encodeURIComponent(dbS.student_id)}&academic_year=eq.${encodeURIComponent(academicYear)}`);
                
                document.getElementById('t1-p2-header').innerHTML = buildPrintHeader(`តារាងប្រៀបធៀបលទ្ធផលសិក្សាតាមមុខវិជ្ជា`);
                document.getElementById('t1-p2-header').innerHTML += `<div class="student-info-box" style="border-left-color:#eab308; background: linear-gradient(90deg, #fefce8 0%, transparent 100%);"><div><p>ឈ្មោះ ៖ <span class="moul-font text-blue-800" style="font-size:13px;">${dbS.student_name}</span></p></div><div><p>ថ្នាក់ទី ៖ <span>${dbS.grade}</span></p></div></div>`;

                let targetPeriods =["វិច្ឆិកា", "ធ្នូ", "មករា", "កុម្ភៈ", "ប្រឡងឆមាសទី១", "ប្រចាំឆមាសទី១", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "ប្រឡងឆមាសទី២", "ប្រចាំឆមាសទី២"];
                let histMap = {}; 
                
                histDataRaw.forEach(r => { let tRes = { Average: r.average||0 }; SUBJECTS_10.forEach(sub => { tRes[sub] = r[dbMap[sub]]; }); histMap[r.month_name] = tRes; });
                semDataRaw.forEach(r => { let tRes = { Average: r.exam_average || r.semester_average || 0 }; SUBJECTS_10.forEach(sub => { tRes[sub] = r[dbMap[sub]]; }); histMap[r.semester_name] = tRes; });

                let availablePeriods = targetPeriods.filter(p => histMap[p]);

                if (availablePeriods.length === 0) {
                    document.getElementById('t1-chartArea').innerHTML = `<div class="text-center p-10 border-2 border-dashed rounded-xl"><p class="text-slate-500 font-bold">មិនទាន់មានទិន្នន័យប្រៀបធៀបទេ!</p></div>`;
                    document.getElementById('t1-comparisonTableContainer').innerHTML = ""; 
                } else {
                    let cHtml = ""; availablePeriods.forEach(m => { let pct = Math.min((cleanNum(histMap[m].Average) / 50) * 100, 100); cHtml += `<div class="trend-bar-wrapper"><div style="font-size:9px; font-weight:bold; color:#475569; margin-bottom:2px;">${cleanNum(histMap[m].Average).toFixed(2)}</div><div class="trend-bar" style="height:${pct}%;background:${getBarCol(pct)}"></div><div style="font-size:9px; font-weight:bold; color:#1e293b; margin-top:5px; text-align:center; line-height:1.2;">${m.replace('ប្រឡង','ប្រឡង<br>').replace('ប្រចាំ','ប្រចាំ<br>')}</div></div>`; });
                    document.getElementById('t1-chartArea').innerHTML = `<div class="border border-slate-200 rounded-xl p-4 pb-0 bg-white"><p class="text-[11px] font-black text-slate-500 mb-2 text-center uppercase tracking-widest">📈 ក្រាបប្រៀបធៀបមធ្យមភាគទូទៅ</p><div class="trend-chart">${cHtml}</div></div>`;

                    let tb = `<table class="c-table mt-4 border border-slate-300"><thead><tr class="bg-slate-100"><th class="w-8 border-r border-slate-300">ល.រ</th><th class="col-left w-32 border-r border-slate-300">មុខវិជ្ជា (គោល)</th><th class="w-16 border-r border-slate-300">អតិបរមា</th>`;
                    availablePeriods.forEach(m => { let shortName = m.replace('ប្រឡងឆមាស','ប្រ.ឆ').replace('ប្រចាំឆមាស','ឆមាស'); tb+=`<th class="border-r border-slate-300" style="font-size:10px;">${shortName}</th>`; });
                    tb += `</tr></thead><tbody>`;
                    
                    SUBJECTS_10.forEach((sub, i) => {
                        tb += `<tr><td class="border-r border-slate-200">${i+1}</td><td class="col-left font-bold text-slate-800 border-r border-slate-200">${sub}</td>`;
                        let maxS = 50; if(dbMap[sub] && gConf[dbMap[sub]]) maxS = cleanNum(gConf[dbMap[sub]]);
                        tb += `<td class="text-slate-400 font-bold border-r border-slate-200">${maxS}</td>`;
                        
                        availablePeriods.forEach(m => {
                            let d = histMap[m];
                            if(d && d[sub] && !isNaN(cleanNum(d[sub]))) {
                                let sc = cleanNum(d[sub]); let pct = Math.min((sc/maxS)*100, 100); let g = getGrd(pct);
                                tb += `<td class="font-black border-r border-slate-200 ${getGrdCol(g)} text-[11px]">${sc} <span class="text-[9px] text-slate-400 font-bold">(${g})</span></td>`;
                            } else tb += `<td class="text-slate-300 border-r border-slate-200">-</td>`;
                        });
                        tb += `</tr>`;
                    });
                    tb += `</tbody></table>`;
                    document.getElementById('t1-comparisonTableContainer').innerHTML = tb;
                }
                
                document.getElementById('t1-p2-signatures').innerHTML = getStampHTML(dbS.date_solar, dbS.date_lunar, tInfo);

                document.getElementById('results-container').classList.remove('hidden');
                document.getElementById('t1-actions').classList.remove('hidden');
                document.getElementById('t1-actions').classList.add('flex');
                hideLoading();
            } catch (e) { hideLoading(); Swal.fire('បរាជ័យ!', e.message, 'error'); }
        }

        // 🌟 Telegram Link ប្រើ Deep Link ទៅ Bot ដោយមិនបាច់វាយឈ្មោះ
        function linkTelegram(type) {
            if(!currentStudentInfo) return Swal.fire('បញ្ជាក់', 'សូមស្វែងរកសិស្សជាមុនសិន!', 'warning');
            
            // Generate Payload for the Telegram Bot start parameter
            // Format: type_studentID (e.g. parent_424000123)
            let payload = `${type}_${currentStudentInfo.id}`;
            let botUrl = `https://t.me/${TELEGRAM_BOT_USERNAME}?start=${payload}`;
            
            Swal.fire({
                title: 'ភ្ជាប់ Telegram',
                text: 'ប្រព័ន្ធនឹងបើកកម្មវិធី Telegram របស់អ្នក ហើយបញ្ជូនទៅកាន់ Bot របស់សាលាដើម្បីភ្ជាប់លេខសម្គាល់ដោយស្វ័យប្រវត្តិ។ សូមចុចប៊ូតុង START នៅក្នុង Telegram!',
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'បើក Telegram',
                cancelButtonText: 'បោះបង់'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.open(botUrl, '_blank');
                }
            });
        }
    </script>
</body>
</html>
