<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>бһ•бҹ’бһ‘бһ¶бҹҶбһ„бһ”бһүбҹ’бһҮбһ¶ Admin - Telegram Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            font-family: 'Battambang', sans-serif; 
            background-color: var(--tg-theme-secondary-bg-color, #f3f4f6); 
            color: var(--tg-theme-text-color, #1f2937); 
        }
        .tg-bg { background-color: var(--tg-theme-bg-color, #ffffff); }
        .tg-button { background-color: var(--tg-theme-button-color, #3b82f6); color: var(--tg-theme-button-text-color, #ffffff); }
        .tg-input { background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #1f2937); border-color: var(--tg-theme-hint-color, #d1d5db); }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-md mx-auto space-y-6">
        <!-- Header -->
        <div class="text-center mt-2 mb-6">
            <h1 class="text-2xl font-bold text-blue-600 mb-1">бһ•бҹ’бһ‘бһ¶бҹҶбһ„бһ”бһүбҹ’бһҮбһ¶бһҹбһ¶бһӣбһ¶бһҡбҹҖбһ“</h1>
            <p class="text-sm opacity-70">бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҖбһ¶бһҡбһ•бҹ’бһүбһҫбһҹбһ¶бһҡ бһ“бһ·бһ„бһ–бһ·бһ“бҹ’бһ‘бһ»бһ‘бҹ…бһҖбһ¶бһ“бҹӢбһҹбһ·бһҹбҹ’бһҹ</p>
        </div>

        <!-- Broadcast Score Section -->
        <div class="tg-bg rounded-2xl shadow-sm p-5 border border-gray-100">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <span class="text-xl mr-2">рҹ“Ҡ</span> бһ•бҹ’бһүбһҫбһ–бһ·бһ“бҹ’бһ‘бһ»бһ”бҹ’бһҡбһ…бһ¶бҹҶбһҒбҹӮ
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 opacity-80">бһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһҒбҹӮбҹ–</label>
                    <select id="monthSelect" class="tg-input w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="бһҳбһҖбһҡбһ¶">бһҳбһҖбһҡбһ¶</option>
                        <option value="бһҖбһ»бһҳбҹ’бһ—бҹҲ">бһҖбһ»бһҳбҹ’бһ—бҹҲ</option>
                        <option value="бһҳбһёбһ“бһ¶">бһҳбһёбһ“бһ¶</option>
                        <option value="бһҳбҹҒбһҹбһ¶">бһҳбҹҒбһҹбһ¶</option>
                        <option value="бһ§бһҹбһ—бһ¶">бһ§бһҹбһ—бһ¶</option>
                        <option value="бһҳбһ·бһҗбһ»бһ“бһ¶">бһҳбһ·бһҗбһ»бһ“бһ¶</option>
                        <option value="бһҖбһҖбҹ’бһҖбһҠбһ¶">бһҖбһҖбҹ’бһҖбһҠбһ¶</option>
                        <option value="бһҹбһёбһ бһ¶">бһҹбһёбһ бһ¶</option>
                        <option value="бһҖбһүбҹ’бһүбһ¶">бһҖбһүбҹ’бһүбһ¶</option>
                        <option value="бһҸбһ»бһӣбһ¶">бһҸбһ»бһӣбһ¶</option>
                        <option value="бһңбһ·бһ…бҹ’бһҶбһ·бһҖбһ¶">бһңбһ·бһ…бҹ’бһҶбһ·бһҖбһ¶</option>
                        <option value="бһ’бҹ’бһ“бһј">бһ’бҹ’бһ“бһј</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 opacity-80">бһҶбҹ’бһ“бһ¶бҹҶбһҹбһ·бһҖбҹ’бһҹбһ¶бҹ–</label>
                    <input type="text" id="yearInput" value="2025-2026" class="tg-input w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="broadcastScore()" id="btnBroadcastScore" class="tg-button w-full font-bold py-3 px-4 rounded-xl flex justify-center items-center shadow-sm transition transform hover:scale-[1.02] active:scale-95">
                    рҹҡҖ бһ”бһ¶бһүбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»бһҮбһјбһ“бһҹбһ·бһҹбҹ’бһҹбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢ
                </button>
            </div>
        </div>

        <!-- Broadcast Message Section -->
        <div class="tg-bg rounded-2xl shadow-sm p-5 border border-gray-100">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <span class="text-xl mr-2">рҹ“ў</span> бһ•бҹ’бһүбһҫбһҹбһ¶бһҡбһ‘бһјбһ‘бҹ…
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 opacity-80">бһҒбҹ’бһӣбһ№бһҳбһҹбһ¶бһҡбһҹбһ¶бһҡбҹ–</label>
                    <textarea id="broadcastText" rows="4" placeholder="бһҹбһјбһҳбһҹбһҡбһҹбҹҒбһҡбһҹбһ¶бһҡбһ“бҹ…бһ‘бһёбһ“бҹҒбҹҮ..." class="tg-input w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <button onclick="broadcastMessage()" id="btnBroadcastMsg" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl flex justify-center items-center shadow-sm transition transform hover:scale-[1.02] active:scale-95">
                    бһ•бҹ’бһүбһҫбһҹбһ¶бһҡбһ‘бҹ…бһҖбһ¶бһ“бҹӢбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһ“бһ¶
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();

        // рҹҹў бһ”бһ¶бһ“бһҠбһ¶бһҖбҹӢбһ”бһүбҹ’бһ…бһјбһӣ Link Vercel бһҡбһ”бһҹбҹӢбһӣбҹ„бһҖбһӮбҹ’бһҡбһјбһҠбҹ„бһҷбһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ· рҹҹў
        const API_URL = "https://school-telegram-bot-seven.vercel.app/api/admin";

        async function broadcastScore() {
            let month = document.getElementById('monthSelect').value;
            let year = document.getElementById('yearInput').value;

            Swal.fire({
                title: 'бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҖбһ¶бһҡбһ•бҹ’бһүбһҫ',
                html: `бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһ“бһ№бһ„бһҮбһјбһ“бһҠбҹҶбһҺбһ№бһ„бһҹбһ·бһҹбҹ’бһҹбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһІбҹ’бһҷбһ…бһјбһӣбһҳбһҫбһӣбһ–бһ·бһ“бҹ’бһ‘бһ»бһҒбҹӮ <b>${month}</b> бһҶбҹ’бһ“бһ¶бҹҶ <b>${year}</b>бҹ” бһҸбһҫбһӣбҹ„бһҖбһӮбҹ’бһҡбһјбһ–бһ·бһҸбһҮбһ¶бһ…бһ„бҹӢбһ”бһ“бҹ’бһҸбһҳбҹӮбһ“бһ‘бҹҒ?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'бһ”бһ“бҹ’бһҸ',
                cancelButtonText: 'бһ”бҹ„бҹҮбһ”бһ„бҹӢ'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    let btn = document.getElementById('btnBroadcastScore');
                    let originalText = btn.innerHTML;
                    btn.innerHTML = "бһҖбҹҶбһ–бһ»бһ„бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡ... вҸі"; 
                    btn.disabled = true;

                    try {
                        let res = await fetch(API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ action: "broadcast_score", month: month, year: year })
                        });
                        let data = await res.json();
                        
                        if(data.success) {
                            Swal.fire('бһҮбҹ„бһӮбһҮбҹҗбһҷ', `бһ”бһ¶бһ“бһҮбһјбһ“бһҠбҹҶбһҺбһ№бһ„бһ–бһ·бһ“бҹ’бһ‘бһ»бһ‘бҹ…бһҖбһ¶бһ“бҹӢ ${data.count} бһӮбһҺбһ“бһёбһҡбһҪбһ…бһҡбһ¶бһӣбҹӢбҹ”`, 'success');
                        } else {
                            Swal.fire('бһ”бһҡбһ¶бһҮбҹҗбһҷ', data.message || 'бһҳбһ¶бһ“бһ”бһүбҹ’бһ бһ¶бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһ—бҹ’бһҮбһ¶бһ”бҹӢ', 'error');
                        }
                    } catch(e) { 
                        Swal.fire('Error', 'бһ”бһҡбһ¶бһҮбҹҗбһҷбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҸбһ—бҹ’бһҮбһ¶бһ”бҹӢбһ‘бҹ…бһҖбһ¶бһ“бҹӢ Server бһҹбһјбһҳбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣ Link Vercel', 'error'); 
                    }
                    
                    btn.innerHTML = originalText; 
                    btn.disabled = false;
                }
            });
        }

        async function broadcastMessage() {
            let text = document.getElementById('broadcastText').value.trim();
            if(!text) return Swal.fire('бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢ', 'бһҹбһјбһҳбһҹбһҡбһҹбҹҒбһҡбһҹбһ¶бһҡбһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“!', 'warning');

            Swal.fire({
                title: 'бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһјбһ“бһҹбһ¶бһҡ',
                text: 'бһҹбһ¶бһҡбһ“бҹҒбҹҮбһ“бһ№бһ„бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһүбҹӢбһ”бһүбҹ’бһҮбһјбһ“бһ‘бҹ…бһҠбһӣбҹӢбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһ“бһ¶бһҖбҹ’бһ“бһ»бһ„ Telegramбҹ”',
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonText: 'бһ•бҹ’бһүбһҫ', 
                cancelButtonText: 'бһ”бҹ„бҹҮбһ”бһ„бҹӢ'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    let btn = document.getElementById('btnBroadcastMsg');
                    let originalText = btn.innerHTML;
                    btn.innerHTML = "бһҖбҹҶбһ–бһ»бһ„бһ”бһүбҹ’бһҮбһјбһ“... вҸі"; 
                    btn.disabled = true;

                    try {
                        let res = await fetch(API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ action: "broadcast_message", messageText: text })
                        });
                        let data = await res.json();
                        
                        if(data.success) {
                            Swal.fire('бһҮбҹ„бһӮбһҮбҹҗбһҷ', `бһҹбһ¶бһҡбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһ¶бһүбҹӢбһ‘бҹ…бһҖбһ¶бһ“бҹӢ ${data.count} бһӮбһҺбһ“бһёбһҡбһҪбһ…бһҡбһ¶бһӣбҹӢбҹ”`, 'success');
                            document.getElementById('broadcastText').value = '';
                        } else {
                            Swal.fire('бһ”бһүбҹ’бһ бһ¶', data.message || 'бһҳбһ·бһ“бһўбһ¶бһ…бһ”бһүбҹ’бһҮбһјбһ“бһ”бһ¶бһ“', 'error');
                        }
                    } catch(e) { 
                        Swal.fire('Error', 'бһ”бһҡбһ¶бһҮбҹҗбһҷбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҸбһ—бҹ’бһҮбһ¶бһ”бҹӢбһ‘бҹ…бһҖбһ¶бһ“бҹӢ Server бһҹбһјбһҳбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣ Link Vercel', 'error'); 
                    }
                    
                    btn.innerHTML = originalText; 
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
