<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ប្រព័ន្ធប្រឡងគណិតវិទ្យា</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Battambang', sans-serif; background-color: #f3f4f6; }
        .math-font { font-family: 'Cambria Math', 'Times New Roman', Times, serif; font-size: 1.15rem; letter-spacing: 0.5px; }
        .hidden { display: none !important; }
        .sticky-header { position: sticky; top: 0; z-index: 40; backdrop-filter: blur(8px); }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <div class="max-w-4xl w-full mx-auto flex-grow flex flex-col md:py-8 py-0">
        <!-- ផ្នែកទី១៖ ព័ត៌មានសិស្ស (Login Section) -->
        <div id="loginSection" class="bg-white md:rounded-2xl shadow-xl overflow-hidden my-auto">
            <div class="bg-blue-700 text-white p-6 md:p-8 text-center">
                <h1 class="text-2xl md:text-3xl font-bold mb-2">ប្រព័ន្ធប្រឡងគណិតវិទ្យា</h1>
                <p class="opacity-90">សមីការដឺក្រេទី២ និង សមីការរង្វង់</p>
            </div>
            
            <div class="p-6 md:p-12 max-w-md mx-auto">
                <div class="text-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800">ផ្ទៀងផ្ទាត់ព័ត៌មានសិស្ស</h2>
                </div>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">អត្តលេខសិស្ស ឬ ឈ្មោះពេញ</label>
                        <input type="text" id="loginInput" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition" placeholder="ឧទាហរណ៍: 4250000551 ឬ កង រិទ្ធិកា">
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">ថ្ងៃខែឆ្នាំកំណើត</label>
                        <div class="grid grid-cols-3 gap-2">
                            <!-- Dropdown ថ្ងៃខែឆ្នាំ -->
                            <select id="dobDay" required class="px-2 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none bg-white text-center cursor-pointer"></select>
                            <select id="dobMonth" required class="px-2 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none bg-white text-center cursor-pointer"></select>
                            <select id="dobYear" required class="px-2 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none bg-white text-center cursor-pointer"></select>
                        </div>
                    </div>

                    <div id="loginError" class="hidden text-red-600 bg-red-50 p-3 rounded-lg border border-red-200 text-sm font-bold text-center"></div>

                    <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 text-lg mt-2">
                        ចូលប្រឡង ⏱️
                    </button>
                </form>
            </div>
        </div>

        <!-- ផ្នែកទី២៖ កម្រងសំណួរ (Quiz Section) -->
        <div id="quizSection" class="hidden bg-white md:rounded-2xl shadow-xl overflow-hidden pb-10">
            <div class="sticky-header bg-white/95 border-b shadow-sm flex flex-col sm:flex-row justify-between items-center p-4 gap-3">
                <div class="flex items-center bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100">
                    <svg class="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span id="displayStudentName" class="font-bold text-blue-800 text-sm md:text-base"></span>
                </div>
                
                <div class="flex items-center justify-center bg-red-50 px-4 py-2 rounded-full border border-red-200 min-w-[120px]">
                    <span class="text-lg md:text-xl font-bold text-red-600 tracking-wider" id="timerDisplay">⏱️ រៀបចំម៉ោង...</span>
                </div>
            </div>
            
            <form id="quizForm" class="p-4 md:p-8 space-y-8 mt-2">
                <div id="quizContent"></div>
                <div class="border-t border-gray-200 pt-8 mt-8 flex justify-center">
                    <button type="button" onclick="confirmSubmit()" id="submitQuizBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-10 md:px-16 rounded-xl shadow-lg transition duration-300 text-lg flex items-center">
                        បញ្ជូនចម្លើយ 🏁
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal បញ្ជាក់ការ Submit -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-gray-800">តើអ្នកពិតជាចង់បញ្ជូនចម្លើយមែនទេ?</h2>
            <p id="unansweredWarning" class="text-gray-600 mb-6 text-sm"></p>
            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3">
                <button type="button" onclick="closeConfirmModal()" class="w-full sm:flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-lg transition">ត្រលប់វិញ</button>
                <button type="button" onclick="processSubmission()" class="w-full sm:flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition">បញ្ជូនចម្លើយ</button>
            </div>
        </div>
    </div>

    <!-- Modal លទ្ធផល -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4 backdrop-blur-md">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-gray-800">ការប្រឡងត្រូវបានបញ្ចប់!</h2>
            
            <div class="bg-gray-50 rounded-xl p-6 border border-gray-100 mb-6 mt-4">
                <div class="text-sm font-bold text-gray-500 mb-1">ពិន្ទុរបស់អ្នក</div>
                <div id="scoreDisplay" class="text-6xl font-extrabold text-blue-600 mb-2">0</div>
                <div class="text-gray-500 font-bold text-lg mb-4">/ <span id="totalDisplay">25</span> ពិន្ទុ</div>
            </div>
            
            <div id="submission-status" class="text-sm font-bold p-4 rounded-lg bg-yellow-50 text-yellow-700 border border-yellow-200">
                <div class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full mr-2 mb-[-2px]"></div>
                កំពុងរក្សាទុកទិន្នន័យទៅកាន់លោកគ្រូ... 
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ប្តូរ URL Google Script របស់អ្នកនៅទីនេះ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxox5LLMPOCN8kW4AF0WkOQXM6xKu2gzNG4eFUZ1l1lY9jbK-lpgdzXy2nRtR3EUGw4vA/exec"; 

        let currentStudent = { id: "", name: "" };
        let timeRemaining = 0;
        let timerInterval = null;
        let isSubmitted = false;
        let flatQuestionsData = []; 

        // ទិន្នន័យសំណួរ (២៥ សំណួរ)
        const quizData = [
            {
                section: "ផ្នែកទី១៖ លំហាត់សមីការដឺក្រេទី២ មានមួយអញ្ញាត",
                questions: [
                    { q: "១. ចូរដោះស្រាយសមីការ x² - 5x + 6 = 0", options: ["x = 2, x = 3", "x = -2, x = -3", "x = 1, x = 6", "x = -1, x = -6"] },
                    { q: "២. ចូរដោះស្រាយសមីការ 2x² - 7x + 3 = 0", options: ["x = 1/2, x = 3", "x = -1/2, x = -3", "x = 2, x = 3", "x = -2, x = 3"] },
                    { q: "៣. ចូរដោះស្រាយសមីការ x² + 4x - 5 = 0", options: ["x = 1, x = -5", "x = -1, x = 5", "x = 1, x = 5", "x = -1, x = -5"] },
                    { q: "៤. ចូរដោះស្រាយសមីការ 3x² - 10x + 8 = 0", options: ["x = 2, x = 4/3", "x = -2, x = -4/3", "x = 1, x = 8/3", "x = -1, x = 8/3"] },
                    { q: "៥. ចូរដោះស្រាយសមីការ x² - 2x - 8 = 0", options: ["x = 4, x = -2", "x = -4, x = 2", "x = 2, x = 4", "x = -2, x = -4"] },
                    { q: "៦. ចូរដោះស្រាយសមីការ -x² + 6x - 8 = 0", options: ["x = 2, x = 4", "x = -2, x = -4", "x = 2, x = -4", "x = -2, x = 4"] },
                    { q: "៧. ចូរដោះស្រាយសមីការ x² - 4x + 4 = 0", options: ["x = 2", "x = -2", "x = 4", "x = -4"] },
                    { q: "៨. ចូរដោះស្រាយសមីការ 4x² - 12x + 9 = 0", options: ["x = 3/2", "x = -3/2", "x = 2/3", "x = -2/3"] },
                    { q: "៩. ចូរដោះស្រាយសមីការ 9x² + 6x + 1 = 0", options: ["x = -1/3", "x = 1/3", "x = 3", "x = -3"] },
                    { q: "១០. ចូរដោះស្រាយសមីការ x² + 10x + 25 = 0", options: ["x = -5", "x = 5", "x = 10", "x = -10"] },
                    { q: "១១. ចូរដោះស្រាយសមីការ 16x² - 8x + 1 = 0", options: ["x = 1/4", "x = -1/4", "x = 4", "x = -4"] },
                    { q: "១២. ចូរដោះស្រាយសមីការ x² + x + 1 = 0", options: ["គ្មានឫសជាចំនួនពិត", "x = 1, x = -1", "x = 1", "x = -1"] },
                    { q: "១៣. ចូរដោះស្រាយសមីការ 2x² - 3x + 4 = 0", options: ["គ្មានឫសជាចំនួនពិត", "x = 1, x = 4", "x = 2, x = -2", "x = -1, x = 3"] },
                    { q: "១៤. ចូរដោះស្រាយសមីការ x² + 2x + 5 = 0", options: ["គ្មានឫសជាចំនួនពិត", "x = 1, x = -5", "x = 2, x = -2", "x = -1, x = 5"] },
                    { q: "១៥. ចូរដោះស្រាយសមីការ 3x² + x + 2 = 0", options: ["គ្មានឫសជាចំនួនពិត", "x = 1, x = 2", "x = -1, x = -2", "x = 2, x = -3"] }
                ]
            },
            {
                section: "ផ្នែកទី២៖ លំហាត់សមីការរង្វង់",
                questions: [
                    { q: "១៦. រកកាំ r នៃរង្វង់ដែលមានសមីការ x² + y² = 16 ។", options: ["r = 4", "r = 16", "r = 8", "r = 2"] },
                    { q: "១៧. ចូរសរសេរសមីការរង្វង់ដែលមានផ្ចិតគល់អ័ក្សកូអរដោនេ O(0,0) និងកាំ r = 5 ។", options: ["x² + y² = 25", "x² + y² = 5", "(x-5)² + (y-5)² = 25", "x² + y² = 10"] },
                    { q: "១៨. ចូរសរសេរសមីការរង្វង់ដែលមានផ្ចិត I(2, -3) និងកាំ r = 4 ។", options: ["(x-2)² + (y+3)² = 16", "(x+2)² + (y-3)² = 16", "(x-2)² + (y+3)² = 4", "(x+2)² + (y-3)² = 4"] },
                    { q: "១៩. រកកូអរដោនេផ្ចិត I និងកាំ r នៃរង្វង់ដែលមានសមីការ (x+1)² + (y-4)² = 9 ។", options: ["I(-1, 4), r = 3", "I(1, -4), r = 3", "I(-1, 4), r = 9", "I(1, -4), r = 9"] },
                    { q: "២០. រកកូអរដោនេផ្ចិត I និងកាំ r នៃរង្វង់ដែលមានសមីការ x² + y² - 4x + 6y - 12 = 0 ។", options: ["I(2, -3), r = 5", "I(-2, 3), r = 5", "I(2, -3), r = 25", "I(-2, 3), r = 25"] },
                    { q: "២១. រកកូអរដោនេផ្ចិត I និងកាំ r នៃរង្វង់ដែលមានសមីការ x² + y² + 2x - 8y + 8 = 0 ។", options: ["I(-1, 4), r = 3", "I(1, -4), r = 3", "I(-1, 4), r = 9", "I(1, -4), r = 9"] },
                    { q: "២២. រកកូអរដោនេផ្ចិត I និងកាំ r នៃរង្វង់ដែលមានសមីការ 2x² + 2y² - 8x + 12y + 2 = 0 ។", options: ["I(2, -3), r = 2√3", "I(-2, 3), r = 2√3", "I(4, -6), r = 12", "I(2, -3), r = 12"] },
                    { q: "២៣. ចូរសរសេរសមីការរង្វង់ដែលមានអង្កត់ផ្ចិតជាអង្កត់ AB ដោយស្គាល់ចំណុចចុង A(1,2) និង B(5,6) ។", options: ["(x-3)² + (y-4)² = 8", "(x-4)² + (y-4)² = 16", "(x-3)² + (y-4)² = 32", "(x+3)² + (y+4)² = 8"] },
                    { q: "២៤. ចូរសរសេរសមីការរង្វង់ដែលមានផ្ចិត I(3,2) ហើយប៉ះនឹងអ័ក្សអាប់ស៊ីស (Ox) ។", options: ["(x-3)² + (y-2)² = 4", "(x-3)² + (y-2)² = 9", "(x+3)² + (y+2)² = 4", "(x-2)² + (y-3)² = 4"] },
                    { q: "២៥. ចូរសរសេរសមីការរង្វង់ដែលឆ្លងកាត់បីចំណុច A(0,0), B(4,0) និង C(0,6) ។", options: ["(x-2)² + (y-3)² = 13", "(x-4)² + (y-6)² = 52", "(x+2)² + (y+3)² = 13", "x² + y² = 13"] }
                ]
            }
        ];

        // ជួសជុលបញ្ហា Dropdown ថ្ងៃខែ ឲ្យលោតលេខច្បាស់លាស់ ១០០%
        document.addEventListener("DOMContentLoaded", function() {
            // បំពេញថ្ងៃ (១ ដល់ ៣១)
            let dHtml = '<option value="" disabled selected>ថ្ងៃ</option>';
            for(let i=1; i<=31; i++) dHtml += `<option value="${i}">${i}</option>`;
            document.getElementById('dobDay').innerHTML = dHtml;

            // បំពេញខែ (១ ដល់ ១២)
            let mHtml = '<option value="" disabled selected>ខែ</option>';
            for(let i=1; i<=12; i++) mHtml += `<option value="${i}">${i}</option>`;
            document.getElementById('dobMonth').innerHTML = mHtml;

            // បំពេញឆ្នាំ (១០ ឆ្នាំមុន ដល់ ២៥ ឆ្នាំមុន)
            let yHtml = '<option value="" disabled selected>ឆ្នាំ</option>';
            let curYr = new Date().getFullYear();
            for(let i=curYr-25; i<=curYr-5; i++) yHtml += `<option value="${i}">${i}</option>`;
            document.getElementById('dobYear').innerHTML = yHtml;
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            const quizContainer = document.getElementById('quizContent');
            let globalIndex = 0;

            quizData.forEach((section) => {
                const secDiv = document.createElement('div');
                secDiv.className = "mb-8";
                secDiv.innerHTML = `<h2 class="text-xl font-bold text-blue-800 border-b-2 border-blue-200 pb-2 mb-6">${section.section}</h2>`;
                quizContainer.appendChild(secDiv);

                section.questions.forEach((q) => {
                    flatQuestionsData.push({ id: globalIndex, correctAnswer: q.options[0] });

                    const qDiv = document.createElement('div');
                    qDiv.className = "mb-6 bg-gray-50 p-4 md:p-6 rounded-xl border border-gray-100 shadow-sm";
                    
                    const qText = document.createElement('h3');
                    qText.className = "text-lg font-bold mb-4 text-gray-800 math-font";
                    qText.innerText = q.q;
                    qDiv.appendChild(qText);

                    const shuffledOptions = shuffleArray([...q.options]);
                    const optContainer = document.createElement('div');
                    optContainer.className = "grid grid-cols-1 md:grid-cols-2 gap-3";

                    shuffledOptions.forEach((optText) => {
                        const label = document.createElement('label');
                        label.className = "flex items-center p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-blue-50 transition bg-white option-label";
                        
                        const input = document.createElement('input');
                        input.type = "radio";
                        input.name = `question_${globalIndex}`;
                        input.value = optText; 
                        input.className = "w-4 h-4 text-blue-600 form-radio mr-3 focus:ring-blue-500";
                        
                        const span = document.createElement('span');
                        span.innerText = optText;
                        span.className = "text-gray-700 font-medium math-font mt-1";

                        label.appendChild(input); label.appendChild(span); optContainer.appendChild(label);

                        input.addEventListener('change', () => {
                            const allLabels = optContainer.querySelectorAll('.option-label');
                            allLabels.forEach(l => l.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-50', 'border-blue-500'));
                            label.classList.add('ring-2', 'ring-blue-500', 'bg-blue-50', 'border-blue-500');
                        });
                    });

                    qDiv.appendChild(optContainer); secDiv.appendChild(qDiv); globalIndex++;
                });
            });
            document.getElementById('totalDisplay').innerText = flatQuestionsData.length;
        }

        // មុខងារ Login ទាក់ទងទៅ Google Script
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const loginInput = document.getElementById('loginInput').value.trim();
            const d = document.getElementById('dobDay').value;
            const m = document.getElementById('dobMonth').value;
            const y = document.getElementById('dobYear').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            btn.innerHTML = "កំពុងផ្ទៀងផ្ទាត់... ⏳";
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    action: "login",
                    id: loginInput,
                    dobParts: { d: d, m: m, y: y }
                })
            })
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = "ចូលប្រឡង ⏱️";
                btn.disabled = false;
                
                if(data.success) {
                    currentStudent.id = data.id || loginInput;
                    currentStudent.name = data.name;
                    
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('quizSection').classList.remove('hidden');
                    
                    let timeMins = data.timeLimit || 60;
                    document.getElementById('displayStudentName').innerText = `${currentStudent.name} (${timeMins} នាទី)`;
                    
                    timeRemaining = timeMins * 60;
                    initQuiz();
                    startTimer();
                    window.scrollTo(0, 0);
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.classList.remove('hidden');
                }
            })
            .catch(err => {
                btn.innerHTML = "ចូលប្រឡង ⏱️";
                btn.disabled = false;
                errorDiv.innerText = "មានបញ្ហាបណ្តាញអ៊ីនធឺណិត ឬ URL Google Script ខុស!";
                errorDiv.classList.remove('hidden');
            });
        });

        function startTimer() {
            updateTimerUI();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("អស់ម៉ោង! ប្រព័ន្ធបញ្ជូនចម្លើយដោយស្វ័យប្រវត្តិ។");
                    closeConfirmModal();
                    processSubmission();
                }
            }, 1000);
        }

        function updateTimerUI() {
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            let display = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            const timerEl = document.getElementById('timerDisplay');
            timerEl.innerText = `⏱️ ${display}`;
            if(timeRemaining < 300) timerEl.classList.add('animate-pulse');
        }

        function confirmSubmit() {
            if(isSubmitted) return;
            let unanswered = 0;
            for (let i = 0; i < flatQuestionsData.length; i++) {
                if (!document.querySelector(`input[name="question_${i}"]:checked`)) unanswered++;
            }
            const warnEl = document.getElementById('unansweredWarning');
            if (unanswered > 0) warnEl.innerHTML = `អ្នកនៅសល់ <span class="text-red-600 font-bold text-lg">${unanswered}</span> សំណួរទៀត។ តើពិតជាចង់បញ្ជូនមែនទេ?`;
            else warnEl.innerHTML = "<span class="text-green-600">អ្នកបានឆ្លើយគ្រប់សំណួរទាំងអស់។</span>";
            
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        function closeConfirmModal() { document.getElementById('confirmModal').classList.add('hidden'); }

        function processSubmission() {
            if(isSubmitted) return;
            isSubmitted = true;
            closeConfirmModal();
            clearInterval(timerInterval); 

            let correctCount = 0, wrongCount = 0, skippedCount = 0;
            const total = flatQuestionsData.length;
            
            for (let i = 0; i < total; i++) {
                const selected = document.querySelector(`input[name="question_${i}"]:checked`);
                if (!selected) skippedCount++;
                else if (selected.value === flatQuestionsData[i].correctAnswer) correctCount++;
                else wrongCount++;

                document.getElementsByName(`question_${i}`).forEach(r => r.disabled = true);
            }

            document.getElementById('quizSection').classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('resultModal').classList.remove('hidden');
            document.getElementById('scoreDisplay').innerText = correctCount;

            const payload = {
                action: "submit",
                studentId: currentStudent.id,
                studentName: currentStudent.name,
                finalScore: correctCount,
                correctCount: correctCount,
                wrongCount: wrongCount,
                skippedCount: skippedCount,
                deviceInfo: navigator.userAgent,
                details: `ពិន្ទុ: ${correctCount}/${total}`
            };

            const statusDiv = document.getElementById('submission-status');
            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                statusDiv.className = "text-sm font-bold p-4 rounded-lg bg-green-50 text-green-700 border border-green-200";
                statusDiv.innerHTML = "✅ ទិន្នន័យត្រូវបានបញ្ជូនទៅកាន់លោកគ្រូជោគជ័យ។ អាចចាកចេញពីប្រព័ន្ធបាន។";
            })
            .catch(err => {
                statusDiv.className = "text-sm font-bold p-4 rounded-lg bg-blue-50 text-blue-700 border border-blue-200";
                statusDiv.innerHTML = "✅ បានបញ្ជូនចម្លើយរួចរាល់។ អ្នកអាចបិទទំព័រនេះបាន។";
            });
        }
    </script>
</body>
</html>
