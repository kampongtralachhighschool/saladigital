<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>វិទ្យាល័យហ៊ុនសែនកំពង់ត្រឡាច - ប្រព័ន្ធគ្រប់គ្រងពិន្ទុពេញលេញ</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root { --primary: #0d6efd; --bg: #f4f6f9; }
    body { background-color: var(--bg); font-family: 'Kantumruy Pro', sans-serif; }
    .auth-card { max-width: 420px; margin: 60px auto; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: none; overflow: hidden; }
    .auth-header { background: linear-gradient(135deg, #0d6efd, #0dcaf0); padding: 30px; color: white; text-align: center; }
    .hidden { display: none !important; }
    .table-container { max-height: 65vh; overflow-y: auto; background: white; border-radius: 12px; border: 1px solid #ddd; }
    .table thead th { position: sticky; top: 0; background: #212529; color: white; z-index: 10; font-size: 0.85rem; padding: 12px; }
    .score-input { width: 75px; text-align: center; font-weight: bold; border: 2px solid #eee; border-radius: 6px; }
    .score-input:focus { border-color: var(--primary); outline: none; background: #eef6ff; transform: scale(1.05); }
    .score-input:disabled { background-color: #ffebee; color: #d32f2f; }
    .nav-pills .nav-link { font-weight: 600; border-radius: 8px; margin-right: 5px; }
    .nav-pills .nav-link.active { box-shadow: 0 4px 10px rgba(13,110,253,0.3); }
    .floating-save { position: sticky; bottom: 15px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100; }
  </style>
</head>
<body>

  <!-- =============================== -->
  <!-- ផ្នែក AUTH                      -->
  <!-- =============================== -->
  <div id="authContainer" class="container">
    <div id="loginForm" class="card auth-card">
      <div class="auth-header">
        <img src="https://i.ibb.co/XZ1mpn5R/Logo-04.png" width="80" class="mb-2">
        <h4 class="fw-bold mb-0 text-white">ចូលប្រព័ន្ធគ្រប់គ្រង</h4>
      </div>
      <div class="card-body p-4">
        <div class="mb-3"><label class="small fw-bold">អ៊ីមែល (Email)</label><input type="email" id="loginEmail" class="form-control" placeholder="example@gmail.com"></div>
        <div class="mb-4"><label class="small fw-bold">លេខសម្ងាត់</label><input type="password" id="loginPass" class="form-control" placeholder="******"></div>
        <button class="btn btn-primary w-100 fw-bold py-2 mb-3" onclick="handleLogin()">ចូលប្រើប្រាស់</button>
        <div class="text-center small">
            មិនទាន់មានគណនី? <a href="#" class="text-decoration-none fw-bold" onclick="toggleAuth('register')">ចុះឈ្មោះថ្មី</a>
        </div>
      </div>
    </div>

    <div id="registerForm" class="card auth-card hidden">
        <div class="auth-header bg-success"><h4 class="fw-bold mb-0 text-white">ចុះឈ្មោះអ្នកប្រើថ្មី</h4></div>
        <div class="card-body p-4">
          <div class="mb-2"><label class="small fw-bold">ឈ្មោះពេញ</label><input type="text" id="regName" class="form-control"></div>
          <div class="mb-2"><label class="small fw-bold">អ៊ីមែល</label><input type="email" id="regEmail" class="form-control"></div>
          <div class="mb-3"><label class="small fw-bold">លេខសម្ងាត់</label><input type="password" id="regPass" class="form-control"></div>
          <button class="btn btn-success w-100 fw-bold py-2 mb-2" onclick="handleRegister()">យល់ព្រមចុះឈ្មោះ</button>
          <div class="text-center small"><a href="#" class="text-decoration-none" onclick="toggleAuth('login')">ត្រឡប់ក្រោយ</a></div>
        </div>
    </div>
  </div>

  <!-- =============================== -->
  <!-- ផ្នែក APP                       -->
  <!-- =============================== -->
  <div id="appSection" class="container-fluid mt-3 hidden">
    <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded-4 shadow-sm border mb-3">
      <h5 class="mb-0 text-primary fw-bold"><i class="fa-solid fa-school me-2"></i>ប្រព័ន្ធពិន្ទុ <span id="userBadge" class="badge bg-primary ms-2"></span></h5>
      <button class="btn btn-outline-danger btn-sm fw-bold rounded-pill" onclick="handleLogout()">ចាកចេញ</button>
    </div>

    <ul class="nav nav-pills mb-3" id="pills-tab">
      <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#tab-input"><i class="fa-solid fa-pen-to-square"></i> បញ្ចូលពិន្ទុ</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-report" onclick="fetchSummary()"><i class="fa-solid fa-table"></i> តារាងសង្ខេប</a></li>
      <li class="nav-item d-none" id="adminMenu"><a class="nav-link text-danger border border-danger" data-bs-toggle="pill" href="#tab-admin"><i class="fa-solid fa-user-lock"></i> កំណត់អវត្តមាន</a></li>
    </ul>

    <div class="tab-content">
      <!-- ផ្ទាំងបញ្ចូលពិន្ទុ -->
      <div class="tab-pane fade show active" id="tab-input">
        <div class="card p-3 shadow-sm border-0 rounded-4">
          <div class="row g-2 mb-3 bg-light p-3 rounded-3 border">
            <div class="col-md-2"><label class="small fw-bold">ឆ្នាំសិក្សា</label><select id="yearSelect" class="form-select fw-bold"></select></div>
            <div class="col-md-2"><label class="small fw-bold">ឆមាស</label><select id="semesterSelect" class="form-select fw-bold"><option>ឆមាសទី១</option><option>ឆមាសទី២</option></select></div>
            <div class="col-md-2"><label class="small fw-bold">ខែ</label><select id="monthSelect" class="form-select fw-bold"></select></div>
            <div class="col-md-2"><label class="small fw-bold">ភាគរយ</label><select id="percentSelect" class="form-select fw-bold text-danger" onchange="updateMaxDisplay()"><option value="100">១០០%</option><option value="70">៧០%</option></select></div>
            <div class="col-md-1"><label class="small fw-bold">បន្ទប់</label><select id="roomSelect" class="form-select fw-bold"></select></div>
            <div class="col-md-2"><label class="small fw-bold">មុខវិជ្ជា</label><select id="subjectSelect" class="form-select fw-bold text-primary"></select></div>
            <div class="col-md-1"><label class="d-block">.</label><button class="btn btn-primary w-100 fw-bold" onclick="loadStudentsForScoring()"><i class="fa-solid fa-sync"></i></button></div>
          </div>
          <div class="table-responsive table-container">
            <table class="table table-hover align-middle">
              <thead><tr><th width="60">តុ</th><th width="120">អត្តលេខ</th><th>ឈ្មោះសិស្ស</th><th width="100">ពិន្ទុ</th></tr></thead>
              <tbody id="inputTableBody"></tbody>
            </table>
          </div>
          <div class="floating-save text-end d-none" id="saveArea">
            <button class="btn btn-primary px-5 fw-bold rounded-pill shadow" onclick="saveScores()">រក្សាទុកពិន្ទុ</button>
          </div>
        </div>
      </div>

      <!-- ផ្ទាំងតារាងសង្ខេប -->
      <div class="tab-pane fade" id="tab-report">
        <div class="card p-3 shadow-sm border-0 rounded-4">
          <div class="table-responsive table-container border">
            <table class="table summary-table" id="excelTable">
              <thead><tr class="excel-header"><th>ល.ប</th><th>អត្តលេខ</th><th>ឈ្មោះសិស្ស</th><th>ថ្នាក់</th><th>ខ្មែរ</th><th>គណិត</th><th>រូប</th><th>គីមី</th><th>ជីវ</th><th>ប្រវត្តិ</th><th>ភូមិ</th><th>សីលធម៌</th><th>អង់គ្លេស</th><th>តែង</th><th>សរសេរ</th></tr></thead>
              <tbody id="summaryTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ផ្ទាំង ADMIN (Absence) -->
      <div class="tab-pane fade" id="tab-admin">
        <div class="card p-3 shadow-sm border-0 rounded-4 border-danger">
          <div class="row g-2 mb-3">
            <div class="col-md-3"><select id="adminRoomSelect" class="form-select fw-bold" onchange="loadAdminStudents()"></select></div>
            <div class="col-md-5"><input type="text" id="adminSearch" class="form-control" placeholder="ស្វែងរកឈ្មោះ..." onkeyup="searchAdminTable()"></div>
            <div class="col-md-4 text-end">
              <button class="btn btn-danger fw-bold btn-sm" onclick="applyBulkAbsence('A')">ដាក់ A អ្នករើស</button>
              <button class="btn btn-warning fw-bold btn-sm" onclick="applyBulkAbsence('P')">ដាក់ P អ្នករើស</button>
            </div>
          </div>
          <div class="table-responsive table-container">
            <table class="table table-hover align-middle">
              <thead class="table-danger"><tr><th width="50"><input type="checkbox" id="checkAllAdmin" onclick="toggleAllCheckboxes()"></th><th width="60">តុ</th><th>អត្តលេខ</th><th>ឈ្មោះសិស្ស</th><th>សកម្មភាព</th></tr></thead>
              <tbody id="adminTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- 1. CONFIG & SETUP ---
    const SB_URL = "https://jmyfcgtvwlbtzfxgmyai.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpteWZjZ3R2d2xidHpmeGdteWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzEzODcsImV4cCI6MjA5MTE0NzM4N30.9CD_yAFGBTylqPjivqSHoyTYvL_b1PP27WUi2yL9CbQ";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });

    // បង្កើត ឆ្នាំសិក្សា ១០ឆ្នាំ និង ខែ ១២
    function populateDropdowns() {
        const yearSel = document.getElementById('yearSelect');
        const monthSel = document.getElementById('monthSelect');
        const months = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];
        
        let startYear = 2024;
        for(let i=0; i<11; i++) {
            let yearRange = `${startYear + i}-${startYear + i + 1}`;
            yearSel.innerHTML += `<option value="${yearRange}">${yearRange}</option>`;
        }
        months.forEach(m => monthSel.innerHTML += `<option value="${m}">${m}</option>`);
    }
    populateDropdowns();

    // --- 2. AUTH LOGIC ---
    function toggleAuth(type) {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById(type + 'Form').classList.remove('hidden');
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value.trim();
      const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
      if (error) return Swal.fire('Error', 'អុីមែល ឬលេខសម្ងាត់មិនត្រឹមត្រូវ', 'error');

      const { data: profile } = await _sb.from('profiles').select('*').eq('id', data.user.id).single();
      if(profile.status === 'Pending') {
         Swal.fire('រង់ចាំ', 'គណនីមិនទាន់ត្រូវបានអនុម័ត', 'warning'); await _sb.auth.signOut();
      } else {
        currentUser = profile;
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('userBadge').innerText = profile.full_name;
        if(profile.role === 'Admin') document.getElementById('adminMenu').classList.remove('d-none');
        initApp();
      }
    }

    async function handleRegister() {
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const name = document.getElementById('regName').value;
        const { data, error } = await _sb.auth.signUp({ email, password: pass });
        if(error) return Swal.fire('Error', error.message, 'error');
        await _sb.from('profiles').insert([{ id: data.user.id, username: email.split('@')[0], full_name: name, email, status: 'Pending', role: 'User' }]);
        Swal.fire('ជោគជ័យ', 'សូមរង់ចាំ Admin អនុម័ត', 'success'); toggleAuth('login');
    }

    async function handleLogout() { await _sb.auth.signOut(); location.reload(); }

    // --- 3. CORE LOGIC ---
    async function initApp() {
      const { data: stdData } = await _sb.from('students').select('room_number').order('room_number');
      const rooms = [...new Set(stdData.map(s => s.room_number))];
      const roomOpts = rooms.map(r => `<option value="${r}">${r}</option>`).join('');
      document.getElementById('roomSelect').innerHTML = roomOpts;
      document.getElementById('adminRoomSelect').innerHTML = '<option value="">-- រើសបន្ទប់ --</option>' + roomOpts;

      const { data: subData } = await _sb.from('subject_configs').select('subject_name');
      const subs = [...new Set(subData.map(s => s.subject_name))];
      document.getElementById('subjectSelect').innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    async function loadStudentsForScoring() {
      const room = document.getElementById('roomSelect').value;
      const subject = document.getElementById('subjectSelect').value;
      const year = document.getElementById('yearSelect').value;
      const month = document.getElementById('monthSelect').value;
      const tbody = document.getElementById('inputTableBody');
      tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4"><i class="fas fa-spinner fa-spin"></i></td></tr>';

      const { data: students } = await _sb.from('students').select('*').eq('room_number', room).order('desk_number');
      const { data: config } = await _sb.from('subject_configs').select('max_score').eq('subject_name', subject).single();
      const { data: existing } = await _sb.from('scores').select('*').eq('subject_name', subject).eq('academic_year', year).eq('month_name', month);

      tbody.innerHTML = '';
      students.forEach(stu => {
        const scoreVal = existing.find(s => s.student_id === stu.student_id)?.score_value || '';
        const isLocked = (scoreVal === 'A' || scoreVal === 'P');
        tbody.innerHTML += `
          <tr class="stu-row" data-id="${stu.student_id}" data-name="${stu.full_name}" data-class="${stu.class_name}">
            <td class="text-center">${stu.desk_number}</td>
            <td class="small text-muted">${stu.student_id}</td>
            <td><div class="fw-bold text-primary">${stu.full_name}</div><div class="small">Max: <span class="max-label">${config.max_score}</span></div></td>
            <td><input type="text" class="form-control score-input mx-auto" value="${scoreVal}" data-max="${config.max_score}" oninput="validateInput(this)" ${isLocked?'disabled':''}></td>
          </tr>`;
      });
      document.getElementById('saveArea').classList.remove('d-none');
      updateMaxDisplay(); setupKeyboardNav();
    }

    function validateInput(input) {
      let val = input.value.toUpperCase();
      const max = parseFloat(input.dataset.max) * parseInt(document.getElementById('percentSelect').value) / 100;
      if (val === 'A' || val === 'P' || val === '') return;
      if (parseFloat(val.replace(/[^0-9.]/g, '')) > max) { input.value = ''; Toast.fire({icon:'error', title:'លើសពិន្ទុ!'}); }
    }

    function updateMaxDisplay() {
      const p = parseInt(document.getElementById('percentSelect').value);
      document.querySelectorAll('.stu-row').forEach(row => {
        const input = row.querySelector('.score-input');
        row.querySelector('.max-label').innerText = (parseFloat(input.dataset.max) * p / 100).toFixed(1).replace('.0','');
      });
    }

    async function saveScores() {
      const payload = [];
      document.querySelectorAll('.stu-row').forEach(row => {
        const score = row.querySelector('.score-input').value;
        if(score) payload.push({
          student_id: row.dataset.id, subject_name: document.getElementById('subjectSelect').value,
          score_value: score, academic_year: document.getElementById('yearSelect').value,
          semester: document.getElementById('semesterSelect').value, month_name: document.getElementById('monthSelect').value,
          score_percentage: document.getElementById('percentSelect').value, input_by: currentUser.username
        });
      });
      const { error } = await _sb.from('scores').upsert(payload, { onConflict: 'student_id,subject_name,academic_year,semester,month_name' });
      if(error) Swal.fire('Error', error.message, 'error'); else Swal.fire('ជោគជ័យ', 'រក្សាទុកពិន្ទុរួចរាល់', 'success');
    }

    async function fetchSummary() {
      const { data } = await _sb.from('school_score_summary').select('*').eq('room_number', document.getElementById('roomSelect').value).eq('month_name', document.getElementById('monthSelect').value);
      document.getElementById('summaryTableBody').innerHTML = data.map(r => `
        <tr><td>${r.room_number}</td><td>${r.student_id}</td><td class="text-start">${r.full_name}</td><td>${r.class_name}</td><td>${r.khmer||''}</td><td>${r.math||''}</td><td>${r.physics||''}</td><td>${r.chemistry||''}</td><td>${r.biology||''}</td><td>${r.history||''}</td><td>${r.geography||''}</td><td>${r.ethics||''}</td><td>${r.english||''}</td><td>${r.composition||''}</td><td>${r.dictation||''}</td></tr>
      `).join('');
    }

    // --- 4. ADMIN ABSENCE LOGIC ---
    async function loadAdminStudents() {
      const room = document.getElementById('adminRoomSelect').value;
      const tbody = document.getElementById('adminTableBody');
      if(!room) return tbody.innerHTML = '';
      const { data: students } = await _sb.from('students').select('*').eq('room_number', room).order('desk_number');
      tbody.innerHTML = students.map(stu => `
        <tr class="admin-stu-row">
          <td><input type="checkbox" class="admin-check" data-id="${stu.student_id}"></td>
          <td class="text-center">${stu.desk_number}</td>
          <td class="small text-muted">${stu.student_id}</td>
          <td class="fw-bold">${stu.full_name}</td>
          <td><button class="btn btn-sm btn-outline-primary fw-bold">លម្អិត</button></td>
        </tr>
      `).join('');
    }

    async function applyBulkAbsence(val) {
        const checks = document.querySelectorAll('.admin-check:checked');
        if(checks.length === 0) return Toast.fire({icon:'warning', title:'សូមជ្រើសរើសសិស្ស!'});
        
        const year = document.getElementById('yearSelect').value;
        const sem = document.getElementById('semesterSelect').value;
        const month = document.getElementById('monthSelect').value;
        const { data: configs } = await _sb.from('subject_configs').select('subject_name');
        const subjects = [...new Set(configs.map(c => c.subject_name))];

        const payload = [];
        checks.forEach(chk => {
            const sid = chk.dataset.id;
            subjects.forEach(sub => {
                payload.push({ student_id: sid, subject_name: sub, score_value: val, academic_year: year, semester: sem, month_name: month, input_by: currentUser.username });
            });
        });

        Swal.showLoading();
        const { error } = await _sb.from('scores').upsert(payload, { onConflict: 'student_id,subject_name,academic_year,semester,month_name' });
        Swal.close();
        if(error) Swal.fire('Error', error.message, 'error'); else Swal.fire('ជោគជ័យ', 'បានដាក់ '+val+' ជូនសិស្សចំនួន '+checks.length+' នាក់ រួចរាល់!', 'success');
    }

    function toggleAllCheckboxes() {
        const isChecked = document.getElementById('checkAllAdmin').checked;
        document.querySelectorAll('.admin-check').forEach(c => c.checked = isChecked);
    }

    function searchAdminTable() {
      let filter = document.getElementById("adminSearch").value.toUpperCase();
      document.querySelectorAll(".admin-stu-row").forEach(row => { row.style.display = row.innerText.toUpperCase().includes(filter) ? "" : "none"; });
    }

    function setupKeyboardNav() {
      const inputs = Array.from(document.querySelectorAll('.score-input:not(:disabled)'));
      inputs.forEach((input, i) => {
        input.onkeydown = (e) => {
          if (e.key === 'Enter' || e.key === 'ArrowDown') { e.preventDefault(); if(inputs[i+1]) inputs[i+1].focus(); }
          if (e.key === 'ArrowUp') { e.preventDefault(); if(inputs[i-1]) inputs[i-1].focus(); }
        };
      });
    }
  </script>
</body>
</html>
