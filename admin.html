        // ==========================================
        async function supaFetchAll(endpoint) {
            let allData =[];
            let offset = 0;
            const limit = 1000;
            let keepFetching = true;
            const separator = endpoint.includes('?') ? '&' : '?';

            while (keepFetching) {
                const url = `${SUPABASE_URL}/rest/v1/${endpoint}${separator}limit=${limit}&offset=${offset}`;
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error("Network Error");
                const data = await res.json();
                
                if (data.length > 0) {
                    allData = allData.concat(data);
                    offset += limit;
                } else {
                    keepFetching = false;
                }
                
                // бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҖбһ„бҹӢбһ“бҹҒбҹҮбһ‘бһ¶бһүбһ”бһ¶бһ“бһҸбһ·бһ…бһҮбһ¶бһ„ limit бһҳбһ¶бһ“бһ“бҹҗбһҷбһҗбһ¶бһңбһ¶бһҠбһӣбҹӢбһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷбһ бһҫбһҷ
                if (data.length < limit) {
                    keepFetching = false;
                }
            }
            return allData;
        }

                // бһ”бһјбһҖбһ”бһүбҹ’бһ…бһјбһӣбһҗбҹ’бһ“бһ¶бһҖбҹӢбһҠбҹӮбһӣбһҳбһ¶бһ“бһҖбҹ’бһ“бһ»бһ„ Database бһ•бҹ’бһ‘бһ¶бһӣбҹӢ бһ“бһ·бһ„бһҗбҹ’бһ“бһ¶бһҖбҹӢбһ–бһё Config бһ…бһјбһӣбһӮбҹ’бһ“бһ¶ бһҖбһ»бҹҶбһІбҹ’бһҷбһ”бһ¶бһҸбҹӢ
                let currentDataClasses = [...new Set(cData.map(s => s.OriginalGrade))];

                // бһҷбһҫбһ„бһҷбһҖбһҸбҹӮбһҗбҹ’бһ“бһ¶бһҖбҹӢбһҺбһ¶бһҠбҹӮбһӣбһҳбһ¶бһ“бһҹбһ·бһҹбҹ’бһҹбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһҖбҹ’бһ“бһ»бһ„бһҒбҹӮбһ“бҹ„бҹҮ бһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ»бҹҶбһІбҹ’бһҷбһ…бҹҒбһүбһҖбҹ’бһҡбһҠбһ¶бһҹбһ‘бһ‘бҹҒбһҡ
                let activeClasses = Array.from(mergedClassesMap.values())

                let cLunar = sampleS.DateLunar || '';

                let uniqueSchoolStus = new Map();

        function buildHonorHTML(cData, activeClasses, pLabel, cSolar, cLunar) {
            let html = "";
            activeClasses.forEach((clsOriginal) => {
                let clsKey = cleanKey(clsOriginal);
                let clsData = cData.filter(s => cleanKey(s.Grade) === clsKey);
                
                // бһ”бҹ’бһҡбһҫ parseRank бһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ»бҹҶбһІбҹ’бһҷ Error бһ”бһҫ rank бһҮбһ¶бһӣбҹҒбһҒбһҒбҹ’бһҳбҹӮбһҡ бһ бһҫбһҷбһҷбһҖбһҸбҹ’бһҡбһ№бһҳбһӣбҹҒбһҒбҹҘбһ…бһ»бҹҮбһҖбҹ’бһҡбҹ„бһҳ
                let topStus = clsData.filter(s => {
                    let numRank = parseRank(s.Rank);
                    return numRank > 0 && numRank <= 5;
                });
                
                // бһҸбһҳбҹ’бһҡбҹҖбһ”бһҸбһ¶бһҳбһ…бҹҶбһҺбһ¶бһҸбҹӢбһҗбҹ’бһ“бһ¶бһҖбҹӢбһІбҹ’бһҷбһ”бһ¶бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһҳбһ»бһ“бһ“бһ№бһ„бһ”бһ„бҹ’бһ бһ¶бһү
                topStus.sort((a,b) => parseRank(a.Rank) - parseRank(b.Rank));
                
                let tInfo = teacherMap[clsKey] || {name:''};

                const generateCard = (student, isTop) => {
                    const widthClass = isTop ? 'width: 320px;' : 'width: 280px;'; 
                    const nameSize = isTop ? 'font-size: 24px;' : 'font-size: 20px;'; 
                    const heightClass = isTop ? 'padding: 30px 20px;' : 'padding: 20px 20px;'; 
                    
                    let numRank = parseRank(student.Rank);
                    const khmerRank = toKhmerNum(numRank);
                    
                    let bgGradient, borderColor, iconColor;
                    
                    if (numRank === 1) {
                        bgGradient = 'background: #fef08a; background-image: linear-gradient(to right, #fef08a, #facc15, #fef08a);';
                        borderColor = 'border-color: #ca8a04;'; iconColor = '#ca8a04';
                    } else if (numRank === 2) {
                        bgGradient = 'background: #f1f5f9; background-image: linear-gradient(to right, #f1f5f9, #cbd5e1, #f1f5f9);';
                        borderColor = 'border-color: #475569;'; iconColor = '#475569';
                    } else if (numRank === 3) {
                        bgGradient = 'background: #ffedd5; background-image: linear-gradient(to right, #ffedd5, #fdba74, #ffedd5);';
                        borderColor = 'border-color: #ea580c;'; iconColor = '#c2410c';
                    } else {
                        bgGradient = 'background: #eff6ff; background-image: linear-gradient(to right, #eff6ff, #bfdbfe, #eff6ff);';
                        borderColor = 'border-color: #3b82f6;'; iconColor = '#2563eb';
                    }

                    return `
                        <div style="position: relative; ${widthClass} margin: 0; display: flex; flex-direction: column; align-items: center;">
                            <div class="premium-plaque" style="${bgGradient} border: 2px solid; ${borderColor} width: 100%; ${heightClass} display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 12px; box-shadow: inset 0 0 0 3px rgba(255,255,255,0.7), 0 4px 6px rgba(0,0,0,0.1);">
                                <h2 class="moul-font" style="${nameSize} color: #dc2626; text-align: center; width: 100%; position: relative; z-index: 10; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; gap: 8px; margin: 0;">
                                    <i class="fa-solid ${numRank===1?'fa-trophy':(numRank<=3?'fa-medal':'fa-award')}" style="color: ${iconColor};"></i> ${student.Name}
                                </h2>
                            </div>
                            <div class="badge-pill" style="position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: white; border: 1px solid; ${borderColor} border-radius: 9999px; padding: 4px 16px; font-size: 14px; font-weight: bold; color: #1e3a8a; white-space: nowrap; z-index: 20; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.15);">
                                <span>бһӣбҹҒбһҒ <span class="moul-font" style="color: #dc2626; font-size: 16px; margin-left: 4px;">${khmerRank}</span></span>
                                <span style="width: 1.5px; height: 12px; background: #cbd5e1;"></span>
                                <span>бһ“бһ·бһ‘бҹ’бһ‘бҹҒбһҹ <span class="moul-font" style="color: #dc2626; font-size: 16px; margin-left: 4px;">${student.Grade_Result}</span></span>
                            </div>
                        </div>
                    `;
                };

                html += `
                <div class="print-area portrait-page bg-pattern" style="padding: 15mm 15mm;">
                    <div class="page-border"></div>
                    <div class="page-border-inner"></div>
                    
                    <div style="position: relative; z-index: 50; padding: 20px;">
                        
                        <div style="text-align: center; color: #1e3a8a; font-size: 14px; font-weight: 900; line-height: 1.6; margin-bottom: 20px;">
                            <p>бһҳбһ“бҹ’бһ‘бһёбһҡбһўбһ”бҹӢбһҡбҹҶ бһҷбһ»бһңбһҮбһ“ бһ“бһ·бһ„бһҖбһёбһЎбһ¶ бһҒбҹҒбһҸбҹ’бһҸбһҖбҹҶбһ–бһ„бҹӢбһҶбҹ’бһ“бһ¶бҹҶбһ„</p>
                            <p>бһҖбһ¶бһҡбһ·бһҷбһ¶бһӣбҹҗбһҷбһўбһ”бҹӢбһҡбҹҶ бһҷбһ»бһңбһҮбһ“ бһ“бһ·бһ„бһҖбһёбһЎбһ¶ бһҹбҹ’бһҡбһ»бһҖбһҖбҹҶбһ–бһ„бҹӢбһҸбҹ’бһҡбһЎбһ¶бһ…</p>
                            <p>бһңбһ·бһ‘бҹ’бһҷбһ¶бһӣбҹҗбһҷ бһ бҹҠбһ»бһ“ бһҹбҹӮбһ“ бһҖбҹҶбһ–бһ„бҹӢбһҸбҹ’бһҡбһЎбһ¶бһ…</p>
                        </div>
                        
                        <h1 class="moul-font text-center text-red-600" style="font-size: 22px; margin: 30px 0 10px 0;">бһҸбһ¶бһҡбһ¶бһ„бһҖбһ·бһҸбҹ’бһҸбһ·бһҷбһҹ ${pLabel}</h1>
                        <h2 class="moul-font text-center text-blue-900" style="font-size: 18px; margin-bottom: 30px;">бһҗбҹ’бһ“бһ¶бһҖбҹӢбһ‘бһё ${clsOriginal} бһҶбҹ’бһ“бһ¶бҹҶбһҹбһ·бһҖбҹ’бһҹбһ¶ бҹўбҹ бҹўбҹҘ-бҹўбҹ бҹўбҹҰ</h2>
                        
                        <!-- бһ”бҹ’бһҡбһҫ Flex-wrap бһҠбһҫбһҳбҹ’бһ”бһёбһ”бһҸбҹӢбһ”бҹӮбһ“бһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ· (row-gap: 1cm) бһ‘бҹ„бҹҮбһӣбҹҒбһҒбҹҘбһҹбҹ’бһ‘бһҪбһ“бһҳбһ¶бһ“бҹЎбҹ бһ“бһ¶бһҖбҹӢбһҖбҹҸбһӣбҹ„бһҸбһ…бһјбһӣбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢ -->
                        <div class="w-full flex flex-wrap items-center justify-center gap-x-8" style="row-gap: 1cm; padding-top: 20px; position: relative; z-index: 10; min-height: 400px;">
                            ${topStus.length > 0 ? topStus.map(s => generateCard(s, parseRank(s.Rank) === 1)).join('') : `<p class="text-slate-400 font-bold text-lg mt-10">бһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһҳбһ¶бһ“бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҹбһ·бһҹбҹ’бһҹбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҒбҹӮбһ“бҹҒбҹҮбһ‘бҹҒ</p>`}

                </div><div class="page-separator no-print"></div>`;
            });
            return html;
        }

        // ==========================================
        // рҹ§© MODULE 3: RANKING TABLE
        // ==========================================
        function buildRankingHTML(cData, activeClasses, pLabel, cSolar, cLunar) {
            let html = "";
            activeClasses.forEach((clsOriginal) => {
                let clsKey = cleanKey(clsOriginal);
                let clsData = cData.filter(s => cleanKey(s.Grade) === clsKey);
                if(clsData.length === 0) return; // бһҳбһ·бһ“бһ”бһ„бҹ’бһ бһ¶бһүбһ‘бҹҶбһ–бҹҗбһҡбһ‘бһ‘бҹҒ
                
                clsData.sort((a,b) => parseRank(a.Rank) - parseRank(b.Rank));

                let activeSubs = SUBJECTS_15.filter(sub => clsData.some(s => s[sub] !== undefined && s[sub] !== null && String(s[sub]).trim() !== '')); 
                let tInfo = teacherMap[clsKey] || {name:''};

                html += `
                <div class="print-area portrait-page">
                    ${getHeaderHTML(`бһҸбһ¶бһҡбһ¶бһ„бһ…бҹҶбһҺбһ¶бһҸбҹӢбһҗбҹ’бһ“бһ¶бһҖбҹӢбһҹбһ·бһҹбҹ’бһҹ${pLabel}`, `бһҗбҹ’бһ“бһ¶бһҖбҹӢбһ‘бһё ${clsOriginal} | бһҹбһ·бһҹбҹ’бһҹбһҹбһҡбһ»бһ”бҹ– ${clsData.length} бһ“бһ¶бһҖбҹӢ`)}
                    <table class="c-table"><thead><tr>
                        <th style="width: 4%;">бһӣ.бһҡ</th>
                        <th class="col-left" style="width: 15%;">бһҲбҹ’бһҳбҹ„бҹҮ</th>
                        <th style="width: 4%;">бһ—бҹҒбһ‘</th>`;
                
                activeSubs.forEach(sub => html += `<th class="sub-col">${sub.substring(0,4)}</th>`);
                
                html += `<th style="width: 6%;">бһҳбһ’бҹ’бһҷбһҳ</th><th style="width: 6%;">бһ“бһ·бһ‘бҹ’бһ‘бҹҒбһҹ</th><th style="width: 7%;"><span style="color: #dc2626 !important;">бһ…бҹҶбһҺбһ¶бһҸбҹӢбһҗбҹ’бһ“бһ¶бһҖбҹӢ</span></th></tr></thead><tbody>`;

                clsData.forEach((s, i) => {
                    let displayAvg = s.Semester_Average || s.Average;
                    html += `<tr>
                        <td class="text-black">${i+1}</td>
                        <td class="col-left text-[11px] whitespace-nowrap">${s.Name}</td>
                        <td class="text-slate-500">${s.Gender}</td>`;
                    
                    activeSubs.forEach(sub => html += `<td>${s[sub]||'-'}</td>`);
                    
                    html += `<td class="text-blue-700 font-bold">${Number(displayAvg).toFixed(2)}</td>
                             <td class="font-black ${getGrdClass(s.Grade_Result)}">${s.Grade_Result}</td>
                             <td style="color: #dc2626 !important; font-weight: 900;">${s.Rank||'-'}</td></tr>`;
                });
                html += `</tbody></table>
                    ${getSignaturesHTML(tInfo, cSolar, cLunar)}
                </div><div class="page-separator no-print"></div>`;
            });
            return html;
        }

        // ==========================================
        // рҹ§© MODULE 4: GRADE 'A' REPORT
        // ==========================================
        function buildGradeAHTML(cData, pLabel, cSolar, cLunar) {

                <table class="c-table mt-4" id="table-export"><thead><tr class="bg-slate-800 text-white"><th>бһӣ.бһҡ</th><th class="col-left">бһўбһҸбҹ’бһҸбһӣбҹҒбһҒ</th><th class="col-left">бһҲбҹ’бһҳбҹ„бҹҮбһҹбһ·бһҹбҹ’бһҹ</th><th>бһ—бҹҒбһ‘</th><th>бһҗбҹ’бһ„бҹғбһҒбҹӮбһҶбҹ’бһ“бһ¶бҹҶбһҖбҹҶбһҺбһҫбһҸ</th><th>бһҗбҹ’бһ“бһ¶бһҖбҹӢ</th><th>бһҳбһ’бҹ’бһҷбһҳбһ—бһ¶бһӮ</th><th>бһӣбҹҒбһҒбһҹбһ¶бһӣбһ¶</th><th>бһ“бһ·бһ‘бҹ’бһ‘бҹҒбһҹ</th></tr></thead><tbody>`;
            
            aStudents.forEach((s, i) => {
                let displayAvg = s.Semester_Average || s.Average;
                html += `<tr><td>${i+1}</td><td class="col-left">${s.ID}</td><td class="col-left font-bold text-[13px]">${s.Name}</td><td>${s.Gender}</td><td>${s.DOB}</td><td class="font-bold text-indigo-700">${s.OriginalGrade}</td><td class="text-blue-700 font-black">${Number(displayAvg).toFixed(2)}</td><td class="text-red-600 font-black">${s.School_Rank||'-'}</td><td class="text-red-600 font-black text-lg">A</td></tr>`;
            });
            
            html += `</tbody></table>
            <div style="display:flex; justify-content:space-between; width:100%; margin-top:20px; padding: 0 40px; position: relative; z-index: 50;">
                <div style="text-align:center; width:250px; position:relative; min-height: 120px; margin-top: 38px;">
                     <p class="font-bold text-[12px] mb-2">бһ”бһ¶бһ“бһғбһҫбһү бһ“бһ·бһ„бһҜбһҖбһ—бһ¶бһ–</p>
                     <p class="moul-font text-[12px] text-blue-900 m-0 relative z-20">бһ“бһ¶бһҷбһҖбһҹбһ¶бһӣбһ¶</p>
                     <img src="${getDriveImgUrl(PRINCIPAL_STAMP_URL)}" class="stamp-main" style="top: -15px;" onerror="this.style.display='none'">
                </div>
                <div style="text-align:center; width:250px;">
                     <p class="font-bold text-[12px] text-gray-700 m-0 leading-tight">${cLunar || '...........................................'}</p>
                     <p class="font-bold text-[12px] text-gray-700 m-0 leading-tight">${cSolar || 'бһҖбҹҶбһ–бһ„бҹӢбһҸбҹ’бһҡбһЎбһ¶бһ…, бһҗбҹ’бһ„бҹғбһ‘бһё.......бһҒбҹӮ.......бһҶбҹ’бһ“бһ¶бҹҶбҹўбҹ бҹў...'}</p>
                     <p class="moul-font text-[12px] text-blue-900 mt-2">${adminInfo.role}</p>
                     <img src="${adminInfo.sign}" style="height:50px; mix-blend-mode:multiply; margin: 0 auto;" onerror="this.style.display='none'">
                     <p class="moul-font text-[12px] text-blue-900">${adminInfo.name}</p>
                </div>
            </div>
            </div><div class="page-separator no-print"></div>`;

            // Certificates
            aStudents.forEach(s => {
                html += `
                <div class="print-area landscape-page cert-landscape">
                    <div style="text-align: center; width: 100%; margin-top: 10px;">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/MoEYS_Cambodia_Logo.svg/1024px-MoEYS_Cambodia_Logo.svg.png" style="width: 80px; margin: 0 auto 10px auto;">
                        <h2 class="moul-font text-blue-900 drop-shadow-sm" style="font-size: 24px;">бһңбһ·бһ‘бҹ’бһҷбһ¶бһӣбҹҗбһҷ бһ бҹҠбһ»бһ“ бһҹбҹӮбһ“ бһҖбҹҶбһ–бһ„бҹӢбһҸбҹ’бһҡбһЎбһ¶бһ…</h2>
                    </div>
                    
                    <div style="margin-top: 25px; width: 100%; text-align: center;">
                        <h1 class="moul-font text-red-600" style="font-size: 46px; text-shadow: 2px 2px 0px rgba(253,224,71,0.5); margin-bottom: 15px;">бһңбһ·бһүбҹ’бһүбһ¶бһ”бһ“бһ”бһҸбҹ’бһҡбһҹбһҡбһҹбһҫбһҡ</h1>
                        <h3 class="moul-font text-blue-900" style="font-size: 20px; margin-bottom: 25px;">бһ“бһ¶бһҷбһҖбһңбһ·бһ‘бҹ’бһҷбһ¶бһӣбҹҗбһҷ бһ бҹҠбһ»бһ“ бһҹбҹӮбһ“ бһҖбҹҶбһ–бһ„бҹӢбһҸбҹ’бһҡбһЎбһ¶бһ…</h3>
                    </div>

                    <div style="text-align: center; font-size: 18px; line-height: 2.2; font-weight: 900; color: #1e293b; padding: 0 40px;">
                        бһҹбһјбһҳбһҖбҹ„бһҸбһҹбһҡбһҹбһҫбһҡ бһ“бһ·бһ„бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҒбҹ’бһ–бһҹбҹӢбһ…бҹҶбһ–бҹ„бҹҮ бһҷбһ»бһңбһҹбһ·бһҹбҹ’бһҹбһҲбҹ’бһҳбҹ„бҹҮ <span class="moul-font text-red-600 text-2xl mx-2">${s.Name}</span> бһ—бҹҒбһ‘ <span class="text-xl mx-1">${s.Gender}</span><br>
                        бһҹбһ·бһҹбҹ’бһҹбһҗбҹ’бһ“бһ¶бһҖбҹӢбһ‘бһё <span class="text-xl text-blue-700 mx-1">${s.OriginalGrade}</span> бһҠбҹӮбһӣбһ”бһ¶бһ“бһҒбһ·бһҸбһҒбҹҶбһ”бҹ’бһҡбһ№бһ„бһ”бҹ’бһҡбҹӮбһ„бһҷбһҖбһ…бһ·бһҸбҹ’бһҸбһ‘бһ»бһҖбһҠбһ¶бһҖбҹӢбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҡбҹҖбһ“бһҹбһјбһҸбҹ’бһҡ бһ”бҹ’бһҡбһҖбһ”бһҠбҹ„бһҷбһңбһ·бһ“бҹҗбһҷ<br>
                        бһҹбһёбһӣбһ’бһҳбҹҢ бһ“бһ·бһ„бһҘбһҡбһ·бһҷбһ¶бһ”бһҗбһӣбҹ’бһўбһ”бҹ’бһҡбһҹбһҫбһҡ бһҡбһ бһјбһҸбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһӣбһ‘бҹ’бһ’бһ•бһӣ <span class="text-red-600 text-2xl mx-1">бһ“бһ·бһ‘бҹ’бһ‘бҹҒбһҹ A</span> бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһ”бҹ’бһҡбһЎбһ„${pLabel}<br>
                        бһҶбҹ’бһ“бһ¶бҹҶбһҹбһ·бһҖбҹ’бһҹбһ¶ бҹўбҹ бҹўбҹҘ-бҹўбҹ бҹўбҹҰбҹ”
                    </div>

                    <div style="position: absolute; bottom: 30px; right: 50px; text-align: center; width: 250px; z-index: 50;">

                        <p class="font-bold text-[12px] text-gray-700 mb-6 leading-tight">${cSolar || 'бһҖбҹҶбһ–бһ„бҹӢбһҸбҹ’бһҡбһЎбһ¶бһ…, бһҗбҹ’бһ„бҹғбһ‘бһё.......бһҒбҹӮ.......бһҶбҹ’бһ“бһ¶бҹҶбҹўбҹ бҹў...'}</p>
                        <p class="moul-font text-[14px] text-blue-900 m-0 relative z-20">бһ“бһ¶бһҷбһҖбһҹбһ¶бһӣбһ¶</p>
                        <img src="${getDriveImgUrl(PRINCIPAL_STAMP_URL)}" class="stamp-main" style="top: -20px; transform: translateX(calc(-50% + 0.3cm));" onerror="this.style.display='none'">
                    </div>

                    <div style="position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center; font-weight: 900; font-size: 14px; color: #1e3a8a;">
                        бһҹбһјбһҳбһҮбһјбһ“бһ–бһҡбһұбҹ’бһҷбһ”бҹ’бһўбһјбһ“бһ”бһ“бҹ’бһҸбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҹбһ·бһҖбҹ’бһҹбһ¶ бһ“бһ·бһ„бһҖбҹ’бһӣбһ¶бһҷбһҮбһ¶бһ‘бҹҶбһ–бһ¶бҹҶбһ„бһҹбҹ’бһ“бһ„бһ«бһҹбҹ’бһҹбһёбһҠбҹҸбһ”бҹ’бһҡбһ–бҹғбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢ<br>бһӮбҹ’бһҡбһҪбһҹбһ¶бһҡ бһ“бһ·бһ„бһҹбһ„бҹ’бһӮбһҳбһҮбһ¶бһҸбһ·бҹ”
                    </div>
                </div><div class="page-separator no-print"></div>`;
            });
            
            return html;
        }

        function exportToExcel() {
            let table = document.getElementById("table-export");
            let wb = XLSX.utils.table_to_book(table, {sheet:"Sheet1"});
            XLSX.writeFile(wb, "бһ”бһүбҹ’бһҮбһёбһҹбһ·бһҹбҹ’бһҹбһ“бһ·бһ‘бҹ’бһ‘бҹҒбһҹA.xlsx");
        }
