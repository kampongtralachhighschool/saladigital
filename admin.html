        async function supaFetch(endpoint) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { headers });
            if (!res.ok) throw new Error("Network Error");
            return await res.json();
        }

        async function ensureConfigLoaded() {
            if (Object.keys(configMap).length > 0) return;
            showLoading("កំពុងទាញទិន្នន័យមូលដ្ឋានសាលា...");
            try {
                let confRes = await supaFetch(`config_max_scores?select=*`);
                confRes.forEach(c => { if(c.grade_level) configMap[cleanKey(c.grade_level)] = c; });

                let teachRes = await supaFetch(`teacher_info?select=*`);
                let clsSet = new Set();
                teachRes.forEach(t => { 
                    if(t.homeroom_class) {
                        let cKey = cleanKey(t.homeroom_class);
                        teacherMap[cKey] = { name: t.teacher_name || '', sign: getDriveImgUrl(t.signature_link) }; 
                        clsSet.add(t.homeroom_class.trim());
                    }
                    if(String(t.teacher_id).trim() === '168') {
                        adminTeacherInfo = { name: t.teacher_name, sign: getDriveImgUrl(t.signature_link) };
                    }
                });
                
                let allClassNames = Array.from(clsSet).sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
                document.getElementById('classSelect').innerHTML = allClassNames.map(c => `<option value="${c}">${c}</option>`).join('');
                hideLoading();
            } catch(e) { hideLoading(); Swal.fire('Error', e.message, 'error'); }
        }

        function mapDbToLegacy(row) {
            let res = { 
                ID: row.student_id, Name: row.student_name, Gender: row.gender, 
                OriginalGrade: row.grade,
                Grade: row.grade, 
                DOB: row.dob||'', DateSolar: row.date_solar||'', DateLunar: row.date_lunar||'', 
                Total: parseFloat(row.total_score || row.exam_total_score || row.semester_total_score) || 0, 
                Average: parseFloat(row.average || row.semester_average || row.annual_average || row.exam_average) || 0, 
                Monthly_Average: parseFloat(row.monthly_average) || 0,
                Exam_Total: parseFloat(row.exam_total_score) || 0,
                Exam_Average: parseFloat(row.exam_average) || 0,
                Semester_Average: parseFloat(row.semester_average) || 0,
                Rank: row.class_rank || '',  
                School_Rank: row.school_rank || '', 
                Grade_Result: row.grade_result || row.final_result || 'F' 
            };
            SUBJECTS_15.forEach(sub => { res[sub] = row[dbMap[sub]]; });
            return res;
        }

        async function fetchAndRender(type, specificClass = null) {
            await ensureConfigLoaded();
            let period = document.getElementById('monthSelect').value;
            showLoading(`កំពុងទាញទិន្នន័យសម្រាប់ ${period}...`);
            
            let table = period.includes("ប្រចាំឆមាស") ? "semester_scores" : (period === "ប្រចាំឆ្នាំ" ? "annual_scores" : "student_scores");
            let pCol = period.includes("ប្រចាំឆមាស") ? "semester_name" : (period === "ប្រចាំឆ្នាំ" ? "academic_year" : "month_name");
            let reqPeriod = period === "ប្រចាំឆ្នាំ" ? new Date().getFullYear().toString() : period;
            let pLabel = getPeriodLabel(period);

            const styleTag = document.getElementById('print-orientation-style');
            if (type === 'gradeA') styleTag.innerHTML = "@media print { @page { size: A4 landscape; margin: 0; } }";
            else styleTag.innerHTML = "@media print { @page { size: A4 portrait; margin: 0; } }";

            try {
                // ទាញយកសិស្សទាំងមូលក្នុងខែ/ឆមាសនោះដោយគ្មាន Filter ថ្នាក់ ដើម្បីបាន Total School ត្រឹមត្រូវ
                let url = `${table}?${pCol}=eq.${encodeURIComponent(reqPeriod)}&limit=5000`;
                let rawData = await supaFetch(url);
                let cData = rawData.map(r => mapDbToLegacy(r));

                if(cData.length === 0) { hideLoading(); return Swal.fire('ទទេ!', 'មិនមានទិន្នន័យក្នុងខែនេះទេ!', 'info'); }

                // សម្រាប់តារាងកិត្តិយស និង ចំណាត់ថ្នាក់៖ ទាញឈ្មោះថ្នាក់ពី configMap ដើម្បីកុំឲ្យបាត់
                let allClassesFromConfig = Object.keys(configMap).sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
                
                let sampleS = cData[0];
                let cSolar = sampleS.DateSolar || '';
                let cLunar = sampleS.DateLunar || '';
                let isSemesterFinal = period.includes("ប្រចាំឆមាស"); 
                
                if (isSemesterFinal && (!cSolar || !cLunar)) {
                    let fallbackPeriod = period.replace("ប្រចាំ", "ប្រឡង"); 
                    try {
                        let fallbackData = await supaFetch(`student_scores?month_name=eq.${encodeURIComponent(fallbackPeriod)}&limit=1`);
                        if (fallbackData && fallbackData.length > 0) {
                            cSolar = fallbackData[0].date_solar || cSolar;
                            cLunar = fallbackData[0].date_lunar || cLunar;
                        }
                    } catch(e) { console.log("Fallback Date Error:", e); }
                }

                let totalSchoolStudents = cData.length;
                let totalSchoolFemale = cData.filter(s => s.Gender === 'ស្រី' || s.Gender === 'F').length;

                document.getElementById('btn-export-excel').classList.add('hidden');
                let html = "";

                if (type === 'tracking') {
                    if(!specificClass) return; // ការពារ
                    html = buildTrackingHTML(cData, specificClass, pLabel, isSemesterFinal, totalSchoolStudents, totalSchoolFemale, cSolar, cLunar);
                }
                else if (type === 'honor') html = buildHonorHTML(cData, allClassesFromConfig, pLabel, cSolar, cLunar);
                else if (type === 'ranking') html = buildRankingHTML(cData, allClassesFromConfig, pLabel, cSolar, cLunar);
                else if (type === 'gradeA') html = buildGradeAHTML(cData, pLabel, cSolar, cLunar);

                let renderArea = document.getElementById('render-container');
                renderArea.innerHTML = html;
                renderArea.classList.remove('hidden');
                document.getElementById('print-action-bar').classList.remove('hidden');
                document.getElementById('print-action-bar').classList.add('flex');
                hideLoading();

            } catch(e) { hideLoading(); Swal.fire('Error', e.message, 'error'); }
        }

                        <div class="summary-item"><p class="s-title text-[11px] text-slate-500 mb-1">និទ្ទេសរួម</p><p class="s-value font-black ${getGrdClass(s.Grade_Result)} text-[14px]">${s.Grade_Result}</p></div>
                    </div>`;
                    tFooter = `<tr class="bg-slate-100 border-t-2 border-slate-300"><td colspan="2" class="text-right font-bold py-2 pr-4">ពិន្ទុសរុបប្រឡងឆមាស</td><td class="font-bold text-slate-500">${maxTot}</td><td class="font-black text-blue-700 text-sm">${examTotalRounded}</td><td colspan="3"></td></tr>`;
                } else {
                    summaryBoxHtml = `
                    <div class="summary-box" style="padding: 10px 0;">
                        <div class="summary-item"><p class="s-title text-[11px] text-slate-500 mb-1">ពិន្ទុសរុប</p><p class="s-value font-black text-blue-700 text-[15px]">${regularTotalRounded}</p></div>
                        <div class="summary-item"><p class="s-title text-[11px] text-slate-500 mb-1">មធ្យមភាគ</p><p class="s-value font-black text-blue-700 text-[15px]">${Number(s.Average).toFixed(2)}</p></div>
                        <div class="summary-item"><p class="s-title text-[11px] text-slate-500 mb-1">ចំណាត់ថ្នាក់ថ្នាក់</p><p class="s-value font-black text-red-600 text-[15px]">${s.Rank||'-'}</p>${rankTextClass}</div>
                        <div class="summary-item"><p class="s-title text-[11px] text-slate-500 mb-1">ចំណាត់ថ្នាក់សាលា</p><p class="s-value font-black text-red-600 text-[15px]">${s.School_Rank||'-'}</p>${rankTextSchool}</div>
                        <div class="summary-item"><p class="s-title text-[11px] text-slate-500 mb-1">និទ្ទេសរួម</p><p class="s-value font-black ${getGrdClass(s.Grade_Result)} text-[15px]">${s.Grade_Result}</p></div>
                    </div>`;
                    tFooter = `<tr class="bg-slate-100 border-t-2 border-slate-300"><td colspan="2" class="text-right font-bold py-2 pr-4">ពិន្ទុសរុប</td><td class="font-bold text-slate-500">${maxTot}</td><td class="font-black text-blue-700 text-sm">${regularTotalRounded}</td><td colspan="3"></td></tr>`;
                }

                html += `
                <div class="print-area portrait-page">
                    ${getHeaderHTML(`តារាងលទ្ធផលសិក្សារបស់សិស្ស${pLabel}`, '')}
                    <div class="student-info-box">
                        <div><p>គោត្តនាម-នាម ៖ <span class="moul-font text-blue-800">${s.Name}</span></p><p>ថ្ងៃខែឆ្នាំកំណើត ៖ <span>${s.DOB || '...'}</span></p><p>អត្តលេខ ៖ <span>${s.ID}</span></p></div>
                        <div style="text-align:right;"><p>ភេទ ៖ <span>${s.Gender}</span></p><p>ថ្នាក់ទី ៖ <span>${s.OriginalGrade}</span></p><p>ឆ្នាំសិក្សា ៖ <span>២០២៥-២០២៦</span></p></div>
                    </div>
                    ${summaryBoxHtml}
                    <table class="c-table"><thead><tr><th>ល.រ</th><th class="col-left">មុខវិជ្ជា</th><th>អតិបរមា</th><th>ពិន្ទុ</th><th><span class="text-red-600">ចំណាត់ថ្នាក់</span></th><th>ភាគរយ</th><th>និទ្ទេស</th></tr></thead><tbody>${tRows}</tbody>
                    <tfoot>${tFooter}</tfoot></table>
                    <div class="mt-3 p-3 bg-blue-50 border-l-4 border-blue-500 rounded text-[10px] leading-relaxed text-blue-900"><span class="font-black underline">ការវាយតម្លៃរបស់គ្រូបន្ទុកថ្នាក់៖</span> ${aiText}</div>
                    ${getSignaturesHTML(tInfo, cSolar, cLunar)}
                </div>
                <div class="page-separator no-print"></div>`;
            });
            return html;
        }

        // ==========================================
        // 🧩 MODULE 2: PREMIUM HONOR ROLL (FLEX-WRAP)
        // ==========================================
        function buildHonorHTML(cData, allClassesFromConfig, pLabel, cSolar, cLunar) {
            let html = "";
            allClassesFromConfig.forEach((clsKey) => {
                // រកទិន្នន័យដោយប្រើ cleanKey ដើម្បីឲ្យត្រូវជាមួយឈ្មោះថ្នាក់
                let clsData = cData.filter(s => cleanKey(s.Grade) === clsKey);
                if(clsData.length === 0) return;

                clsData.sort((a,b) => (parseInt(a.Rank)||999) - (parseInt(b.Rank)||999));
                
                // ចាប់យកត្រឹមលេខ៥ តែបើស្ទួនលេខ៥ វានឹងរាប់បញ្ចូលទាំងអស់
                let topStus = clsData.filter(s => parseInt(s.Rank) > 0 && parseInt(s.Rank) <= 5);
                if(topStus.length === 0) return;
                
                let tInfo = teacherMap[clsKey] || {name:''};
                let displayClass = clsData[0].OriginalGrade || clsKey;

                const generateCard = (student, isTop) => {
                    const widthClass = isTop ? 'w-[320px]' : 'w-[280px]'; 
                    const nameSize = isTop ? 'text-[24px]' : 'text-[20px]'; 
                    const heightClass = isTop ? 'py-8' : 'py-6'; 
                    const khmerRank = toKhmerNum(student.Rank);
                    
                    let bgGradient, borderColor, iconHtml;
                    let numRank = parseInt(student.Rank);
                    
                    if (numRank === 1) {
                        bgGradient = 'bg-gradient-to-r from-yellow-100 via-yellow-400 to-yellow-100';
                        borderColor = 'border-yellow-600';
                        iconHtml = '<i class="fa-solid fa-trophy text-yellow-600"></i>';
                    } else if (numRank === 2) {
                        bgGradient = 'bg-gradient-to-r from-slate-100 via-slate-300 to-slate-100';
                        borderColor = 'border-slate-500';
                        iconHtml = '<i class="fa-solid fa-medal text-slate-600"></i>';
                    } else if (numRank === 3) {
                        bgGradient = 'bg-gradient-to-r from-orange-100 via-orange-300 to-orange-100';
                        borderColor = 'border-orange-600';
                        iconHtml = '<i class="fa-solid fa-medal text-orange-600"></i>';
                    } else {
                        bgGradient = 'bg-gradient-to-r from-blue-50 via-blue-200 to-blue-50';
                        borderColor = 'border-blue-400';
                        iconHtml = '<i class="fa-solid fa-award text-blue-500"></i>';
                    }

                    return `
                        <div class="relative ${widthClass} mx-2 mt-6 flex flex-col items-center">
                            <div class="premium-plaque ${bgGradient} border-[2px] ${borderColor} w-full ${heightClass} px-6 flex items-center justify-center relative overflow-hidden">
                                <div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/50 to-white/0 pointer-events-none"></div>
                                <h2 class="moul-font ${nameSize} text-red-600 text-center w-full truncate relative z-10 flex items-center justify-center gap-3" style="text-shadow: 1px 1px 0px rgba(255,255,255,0.8);">
                                    ${iconHtml} ${student.Name}
                                </h2>
                            </div>
                            <div class="badge-pill absolute -top-5 left-1/2 transform -translate-x-1/2 bg-white border ${borderColor} rounded-full px-5 py-1.5 text-[14px] font-bold text-blue-900 whitespace-nowrap z-20 flex items-center justify-center gap-3">
                                <span>លេខ <span class="text-red-600 moul-font text-[16px] ml-1">${khmerRank}</span></span>
                                <span class="w-[1.5px] h-3 bg-slate-300"></span>
                                <span>និទ្ទេស <span class="text-red-600 moul-font text-[16px] ml-1">${student.Grade_Result}</span></span>
                            </div>
                        </div>
                    `;
                };

                html += `
                <div class="print-area portrait-page bg-pattern" style="padding: 15mm 15mm;">
                    <div class="page-border"></div>
                    <div class="page-border-inner"></div>
                    
                    <div style="position: relative; z-index: 50; padding: 20px;">
                        ${getHeaderHTML(`🏆 តារាងកិត្តិយស 🏆`, `ថ្នាក់ទី ${displayClass} | ${pLabel}`)}
                        
                        <!-- ប្រើ Flex-wrap ដើម្បីបត់បែនស្វ័យប្រវត្តិ (gap-y-[1cm] ឃ្លាតបញ្ឈរ 1cm) -->
                        <div class="w-full flex flex-wrap items-center justify-center gap-x-8 gap-y-[1cm] py-8 relative z-10">
                            ${topStus.map(s => generateCard(s, parseInt(s.Rank) === 1)).join('')}
                        </div>

                        <div style="margin-top: 30px;">
                            ${getSignaturesHTML(tInfo, cSolar, cLunar)}
                        </div>
                    </div>
                </div><div class="page-separator no-print"></div>`;
            });
            return html;
        }

        // ==========================================
        // 🧩 MODULE 3: RANKING TABLE
        // ==========================================
        function buildRankingHTML(cData, allClassesFromConfig, pLabel, cSolar, cLunar) {
            let html = "";
            allClassesFromConfig.forEach((clsKey) => {
                let clsData = cData.filter(s => cleanKey(s.Grade) === clsKey);
                if(clsData.length === 0) return;
                clsData.sort((a,b) => (parseInt(a.Rank)||999) - (parseInt(b.Rank)||999));

                let displayClass = clsData[0].OriginalGrade || clsKey;
                let activeSubs = SUBJECTS_15.filter(sub => clsData.some(s => s[sub] !== undefined && s[sub] !== null && String(s[sub]).trim() !== '')); 
                let tInfo = teacherMap[clsKey] || {name:''};

                html += `
                <div class="print-area portrait-page">
                    ${getHeaderHTML(`តារាងចំណាត់ថ្នាក់សិស្ស${pLabel}`, `ថ្នាក់ទី ${displayClass} | សិស្សសរុប៖ ${clsData.length} នាក់`)}
                    <table class="c-table"><thead><tr>
                        <th style="width: 4%;">ល.រ</th>
                        <th class="col-left" style="width: 15%;">ឈ្មោះ</th>
                        <th style="width: 4%;">ភេទ</th>`;
                
                activeSubs.forEach(sub => html += `<th class="sub-col">${sub.substring(0,4)}</th>`);
                
                html += `<th style="width: 6%;">មធ្យម</th><th style="width: 6%;">និទ្ទេស</th><th style="width: 7%;"><span class="text-red-600">ចំណាត់ថ្នាក់</span></th></tr></thead><tbody>`;

                clsData.forEach((s, i) => {
                    let displayAvg = s.Semester_Average || s.Average;
                    html += `<tr>
                        <td class="text-black">${i+1}</td>
                        <td class="col-left text-[11px] whitespace-nowrap">${s.Name}</td>
                        <td class="text-slate-500">${s.Gender}</td>`;
                    
                    activeSubs.forEach(sub => html += `<td>${s[sub]||'-'}</td>`);
                    
                    html += `<td class="text-blue-700 font-bold">${Number(displayAvg).toFixed(2)}</td>
                             <td class="font-black ${getGrdClass(s.Grade_Result)}">${s.Grade_Result}</td>
                             <td class="font-black text-red-600">${s.Rank||'-'}</td></tr>`;
                });
                html += `</tbody></table>
                    ${getSignaturesHTML(tInfo, cSolar, cLunar)}
                </div><div class="page-separator no-print"></div>`;
            });
            return html;
        }

        // ==========================================
        // 🧩 MODULE 4: GRADE 'A' REPORT
        // ==========================================
        function buildGradeAHTML(cData, pLabel, cSolar, cLunar) {
            let aStudents = cData.filter(s => String(s.Grade_Result).trim().toUpperCase() === 'A' || s.Average >= 90);
            if(aStudents.length === 0) {
                Swal.fire('គ្មានទិន្នន័យ', 'មិនមានសិស្សនិទ្ទេស A ក្នុងខែនេះទេ!', 'info');
                return "";
            }

            aStudents.sort((a,b) => (parseInt(a.School_Rank) || 9999) - (parseInt(b.School_Rank) || 9999));
            
            window.excelDataForExport = aStudents; 
            document.getElementById('btn-export-excel').classList.remove('hidden');

            let adminInfo = adminTeacherInfo || {name: 'ការិយាល័យសិក្សាធិការ', role: 'អ្នករៀបចំរបាយការណ៍', sign: ''};

            let html = `
            <div class="print-area landscape-page">
                ${getHeaderHTML(`បញ្ជីរាយនាមសិស្សានុសិស្សទទួលបាននិទ្ទេស A ${pLabel}`, `ទូទាំងសាលា | សរុប៖ ${aStudents.length} នាក់`)}
                <table class="c-table mt-4" id="table-export"><thead><tr class="bg-slate-800 text-white"><th>ល.រ</th><th class="col-left">អត្តលេខ</th><th class="col-left">ឈ្មោះសិស្ស</th><th>ភេទ</th><th>ថ្ងៃខែឆ្នាំកំណើត</th><th>ថ្នាក់</th><th>មធ្យមភាគ</th><th>លេខសាលា</th><th>និទ្ទេស</th></tr></thead><tbody>`;
            
            aStudents.forEach((s, i) => {
                let displayAvg = s.Semester_Average || s.Average;
                html += `<tr><td>${i+1}</td><td class="col-left">${s.ID}</td><td class="col-left font-bold text-[13px]">${s.Name}</td><td>${s.Gender}</td><td>${s.DOB}</td><td class="font-bold text-indigo-700">${s.OriginalGrade}</td><td class="text-blue-700 font-black">${Number(displayAvg).toFixed(2)}</td><td class="text-red-600 font-black">${s.School_Rank||'-'}</td><td class="text-red-600 font-black text-lg">A</td></tr>`;
            });
            
            html += `</tbody></table>
            <div style="display:flex; justify-content:space-between; width:100%; margin-top:20px; padding: 0 40px; position: relative; z-index: 50;">
                <div style="text-align:center; width:250px; position:relative; min-height: 120px; margin-top: 38px;">
                     <p class="font-bold text-[12px] mb-2">បានឃើញ និងឯកភាព</p>
                     <p class="moul-font text-[12px] text-blue-900 m-0 relative z-20">នាយកសាលា</p>
                     <img src="${getDriveImgUrl(PRINCIPAL_STAMP_URL)}" class="stamp-main" style="top: -15px;" onerror="this.style.display='none'">
                </div>
                <div style="text-align:center; width:250px;">
                     <p class="font-bold text-[12px] text-gray-700 m-0 leading-tight">${cLunar || '...........................................'}</p>
                     <p class="font-bold text-[12px] text-gray-700 m-0 leading-tight">${cSolar || 'កំពង់ត្រឡាច, ថ្ងៃទី.......ខែ.......ឆ្នាំ២០២...'}</p>
                     <p class="moul-font text-[12px] text-blue-900 mt-2">${adminInfo.role}</p>
                     <img src="${adminInfo.sign}" style="height:50px; mix-blend-mode:multiply; margin: 0 auto;" onerror="this.style.display='none'">
                     <p class="moul-font text-[12px] text-blue-900">${adminInfo.name}</p>
                </div>
            </div>
            </div><div class="page-separator no-print"></div>`;

            // Certificates
            aStudents.forEach(s => {
                html += `
                <div class="print-area landscape-page cert-landscape">
                    <div style="text-align: center; width: 100%; margin-top: 10px;">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/MoEYS_Cambodia_Logo.svg/1024px-MoEYS_Cambodia_Logo.svg.png" style="width: 80px; margin: 0 auto 10px auto;">
                        <h2 class="moul-font text-blue-900 drop-shadow-sm" style="font-size: 24px;">វិទ្យាល័យ ហ៊ុន សែន កំពង់ត្រឡាច</h2>
                    </div>
                    
                    <div style="margin-top: 25px; width: 100%; text-align: center;">
                        <h1 class="moul-font text-red-600" style="font-size: 46px; text-shadow: 2px 2px 0px rgba(253,224,71,0.5); margin-bottom: 15px;">វិញ្ញាបនបត្រសរសើរ</h1>
                        <h3 class="moul-font text-blue-900" style="font-size: 20px; margin-bottom: 25px;">នាយកវិទ្យាល័យ ហ៊ុន សែន កំពង់ត្រឡាច</h3>
                    </div>

                    <div style="text-align: center; font-size: 18px; line-height: 2.2; font-weight: 900; color: #1e293b; padding: 0 40px;">
                        សូមកោតសរសើរ និងវាយតម្លៃខ្ពស់ចំពោះ យុវសិស្សឈ្មោះ <span class="moul-font text-red-600 text-2xl mx-2">${s.Name}</span> ភេទ <span class="text-xl mx-1">${s.Gender}</span><br>
                        សិស្សថ្នាក់ទី <span class="text-xl text-blue-700 mx-1">${s.OriginalGrade}</span> ដែលបានខិតខំប្រឹងប្រែងយកចិត្តទុកដាក់ក្នុងការរៀនសូត្រ ប្រកបដោយវិន័យ<br>
                        សីលធម៌ និងឥរិយាបថល្អប្រសើរ រហូតទទួលបានលទ្ធផល <span class="text-red-600 text-2xl mx-1">និទ្ទេស A</span> ក្នុងការប្រឡង${pLabel}<br>
                        ឆ្នាំសិក្សា ២០២៥-២០២៦។
                    </div>

                    <div style="position: absolute; bottom: 30px; right: 50px; text-align: center; width: 250px; z-index: 50;">
                        <p class="font-bold text-[12px] text-gray-700 m-0 leading-tight">${cLunar || '...........................................'}</p>
                        <p class="font-bold text-[12px] text-gray-700 mb-6 leading-tight">${cSolar || 'កំពង់ត្រឡាច, ថ្ងៃទី.......ខែ.......ឆ្នាំ២០២...'}</p>
                        <p class="moul-font text-[14px] text-blue-900 m-0 relative z-20">នាយកសាលា</p>
                        <img src="${getDriveImgUrl(PRINCIPAL_STAMP_URL)}" class="stamp-main" style="top: -20px; transform: translateX(calc(-50% + 0.3cm));" onerror="this.style.display='none'">
                    </div>

                    <div style="position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center; font-weight: 900; font-size: 14px; color: #1e3a8a;">
                        សូមជូនពរឱ្យប្អូនបន្តទទួលបានជោគជ័យក្នុងការសិក្សា និងក្លាយជាទំពាំងស្នងឫស្សីដ៏ប្រពៃសម្រាប់<br>គ្រួសារ និងសង្គមជាតិ។
                    </div>
                </div><div class="page-separator no-print"></div>`;
            });
            
            return html;
        }

        function exportToExcel() {
            let table = document.getElementById("table-export");
            let wb = XLSX.utils.table_to_book(table, {sheet:"Sheet1"});
            XLSX.writeFile(wb, "បញ្ជីសិស្សនិទ្ទេសA.xlsx");
        }
    </script>
</body>
</html>
