<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website ថ្មី — Reankh AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #4f46e5;
      --brand-2: #7c3aed;
      --accent: #06b6d4;
      --ink: #1e293b;
      --muted: #64748b;
      --bg-card: rgba(255, 255, 255, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans Khmer', 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--ink);
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 45%, #06b6d4 100%);
      position: relative;
      overflow: hidden;
    }

    /* ផ្ទៃខាងក្រោយ blob ចលនា */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.45;
      animation: float 14s ease-in-out infinite;
    }
    .blob.b1 { width: 340px; height: 340px; background: #f0abfc; top: -80px; left: -60px; }
    .blob.b2 { width: 300px; height: 300px; background: #67e8f9; bottom: -90px; right: -50px; animation-delay: -5s; }
    .blob.b3 { width: 240px; height: 240px; background: #fde68a; top: 40%; right: 20%; animation-delay: -9s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.12); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 28px;
      padding: 40px 32px 32px;
      box-shadow: 0 30px 60px -15px rgba(30, 27, 75, 0.4);
      text-align: center;
      animation: rise 0.7s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 84px;
      height: 84px;
      margin: 0 auto 22px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 12px 28px -6px rgba(79, 70, 229, 0.6);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .icon svg { width: 44px; height: 44px; stroke: #fff; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 14px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.msg {
      font-size: 1.02rem;
      line-height: 1.95;
      color: var(--ink);
      margin-bottom: 24px;
    }
    p.msg b { color: var(--brand-2); }

    .link-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      margin-bottom: 18px;
    }
    .link-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.95rem;
      color: var(--brand);
      font-weight: 600;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      min-width: 0;
    }
    .copy-btn {
      flex-shrink: 0;
      border: none;
      cursor: pointer;
      background: #eef2ff;
      color: var(--brand);
      font-weight: 600;
      font-family: 'Noto Sans Khmer', sans-serif;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: var(--brand); color: #fff; }
    .copy-btn.done { background: #10b981; color: #fff; }

    .go-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      text-decoration: none;
      color: #fff;
      font-size: 1.12rem;
      font-weight: 700;
      font-family: 'Noto Sans Khmer', sans-serif;
      padding: 17px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 14px 30px -8px rgba(79, 70, 229, 0.65);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .go-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 38px -8px rgba(79, 70, 229, 0.75); }
    .go-btn:active { transform: translateY(-1px); }
    .go-btn svg { width: 22px; height: 22px; stroke: #fff; }

    .divider {
      margin: 26px 0 18px;
      border: none;
      border-top: 1px dashed #cbd5e1;
    }

    .contact {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.9;
    }
    .tg-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
      text-decoration: none;
      color: #fff;
      background: #229ED9;
      padding: 9px 16px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 20px -6px rgba(34, 158, 217, 0.6);
    }
    .tg-link:hover { transform: translateY(-2px); }
    .tg-link svg { width: 18px; height: 18px; fill: #fff; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: #fff;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 0.92rem;
      opacity: 0;
      transition: all 0.35s cubic-bezier(.2,.8,.2,1);
      z-index: 50;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .card { padding: 32px 22px 26px; border-radius: 24px; }
      h1 { font-size: 1.3rem; }
      p.msg { font-size: 0.97rem; }
      .icon { width: 72px; height: 72px; }
    }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <main class="card">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6" />
      </svg>
    </div>

    <h1>សូមស្វាគមន៍មកកាន់ Website ថ្មី</h1>

    <p class="msg">
      សូមអភ័យទោស! ដើម្បីឲ្យមាន<b>ភាពងាយស្រួល</b> និង<b>សុវត្ថិភាព</b>ជាងមុន
      សូមចូលប្រើប្រាស់លើ Website ថ្មីនេះវិញ។<br />
      សូម Copy ឬ ចុចប៊ូតុងខាងក្រោម។
    </p>

    <div class="link-box">
      <input id="siteUrl" type="text" value="https://ai.reankh.org/" readonly />
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy</button>
    </div>

    <a class="go-btn" href="https://ai.reankh.org/">
      ចូលប្រើ Website ថ្មី
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6" />
      </svg>
    </a>

    <hr class="divider" />

    <div class="contact">
      រាល់បញ្ហាសូមទាក់ទងមក Telegram
      <br />
      <a class="tg-link" href="https://t.me/mrhonmom" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
        017476664 · @mrhonmom
      </a>
    </div>
  </main>

  <div class="toast" id="toast">✓ បានចម្លង Link រួចរាល់!</div>

  <script>
    function copyLink() {
      var url = document.getElementById('siteUrl').value;
      var btn = document.getElementById('copyBtn');
      var done = function () {
        btn.textContent = '✓ Copied';
        btn.classList.add('done');
        showToast();
        setTimeout(function () {
          btn.textContent = 'Copy';
          btn.classList.remove('done');
        }, 2000);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(done).catch(fallback);
      } else {
        fallback();
      }
      function fallback() {
        var input = document.getElementById('siteUrl');
        input.select();
        input.setSelectionRange(0, 99999);
        try { document.execCommand('copy'); } catch (e) {}
        done();
      }
    }

    function showToast() {
      var t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 2200);
    }
  </script>
</body>
</html>
