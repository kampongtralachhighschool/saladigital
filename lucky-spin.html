<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .writing-vertical {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }
        .inner-shadow {
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        /* Custom scrollbar for admin table */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.8); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 1); 
        }
    </style>
</head>
<body class="min-h-screen bg-[#0f0728] font-sans relative overflow-x-hidden text-white">
    <!-- Background styling -->
    <div class="fixed inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#2e1065] via-[#0f0728] to-black -z-10"></div>
    <!-- Decorative Stars/Dots -->
    <div class="fixed top-10 left-10 w-2 h-2 bg-white rounded-full opacity-50 shadow-[0_0_10px_white] -z-10"></div>
    <div class="fixed top-40 right-20 w-3 h-3 bg-yellow-200 rounded-full opacity-60 shadow-[0_0_15px_yellow] -z-10"></div>
    <div class="fixed bottom-40 left-1/4 w-2 h-2 bg-blue-200 rounded-full opacity-50 shadow-[0_0_10px_blue] -z-10"></div>

    <!-- Top Navigation Bar -->
    <div class="bg-black/20 backdrop-blur-md border-b border-white/5 p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="text-white font-bold text-xl flex items-center gap-2 drop-shadow-md">
           <div class="bg-gradient-to-tr from-yellow-400 to-orange-600 p-1 rounded-md">
              <i data-lucide="star" fill="white" class="w-5 h-5 text-white"></i>
           </div>
           Lucky Spin
        </div>
        
        <div class="flex bg-black/40 rounded-full p-1 border border-white/10">
          <button id="btn-nav-user" onclick="switchView('user')" class="px-5 py-1.5 rounded-full text-sm font-medium transition flex items-center gap-2 bg-gradient-to-r from-orange-500 to-red-600 text-white shadow-lg">
             ផ្ទាំងអ្នកលេង
          </button>
          <button id="btn-nav-admin" onclick="switchView('admin')" class="px-5 py-1.5 rounded-full text-sm font-medium transition flex items-center gap-2 text-gray-400 hover:text-white">
             Admin Panel
          </button>
        </div>
    </div>

    <div class="relative z-10 container mx-auto">
        <!-- LOGIN SECTION -->
        <div id="login-section" class="flex flex-col items-center justify-center min-h-[80vh] px-4">
            <div class="bg-[#1a103c]/80 backdrop-blur-md p-8 rounded-3xl shadow-[0_0_40px_rgba(139,92,246,0.3)] border border-purple-500/30 w-full max-w-md">
              <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-yellow-400 to-orange-500 mb-4 shadow-lg shadow-orange-500/50">
                  <i data-lucide="award" class="w-8 h-8 text-white"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">សូមស្វាគមន៍</h2>
                <p class="text-purple-300">បញ្ចូលព័ត៌មានខាងក្រោមដើម្បីលេងកម្សាន្ត</p>
              </div>
      
              <form onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                  <label class="block text-sm font-medium text-purple-200 mb-1">ឈ្មោះអ្នកលេង</label>
                  <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="w-5 h-5 text-purple-400"></i>
                    </div>
                    <input type="text" id="player-name" required class="w-full pl-10 pr-4 py-3 bg-purple-950/50 border border-purple-500/50 rounded-xl text-white placeholder-purple-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition" placeholder="ឧ. សុខ សាន្ត">
                  </div>
                </div>
      
                <div>
                  <label class="block text-sm font-medium text-purple-200 mb-1">លេខកូដសម្ងាត់</label>
                  <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="key" class="w-5 h-5 text-purple-400"></i>
                    </div>
                    <input type="text" id="player-code" required class="w-full pl-10 pr-4 py-3 bg-purple-950/50 border border-purple-500/50 rounded-xl text-white placeholder-purple-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition" placeholder="វាយលេខកូដនៅទីនេះ">
                  </div>
                  <p class="text-xs text-yellow-400/80 mt-2 flex justify-end">តម្រុយ៖ លេខកូដសាកល្បងគឺ 2026</p>
                </div>
      
                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-orange-500 to-yellow-500 hover:from-orange-400 hover:to-yellow-400 text-white rounded-xl font-bold text-lg shadow-[0_0_20px_rgba(234,179,8,0.4)] transition transform hover:-translate-y-0.5 flex justify-center items-center gap-2">
                  <i data-lucide="log-in" class="w-5 h-5"></i> ចូលរួមបង្វិល
                </button>
              </form>
            </div>
        </div>

        <!-- USER SPIN SECTION -->
        <div id="user-section" class="hidden flex-col items-center justify-center min-h-[85vh] px-4 py-6 overflow-hidden">
            <div class="text-center mb-12 relative">
                <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-yellow-500 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] mb-2 uppercase tracking-wide">
                  កងមហាសំណាង
                </h1>
                <p class="text-purple-200 text-lg">សួស្តី <span id="display-player-name" class="font-bold text-yellow-400"></span>, សូមជូនពរឲ្យសំណាងល្អ!</p>
            </div>

            <div class="relative w-[320px] h-[320px] md:w-[450px] md:h-[450px]">
                <!-- Outer Glowing Ring -->
                <div class="absolute -inset-4 bg-gradient-to-tr from-yellow-600 via-yellow-300 to-yellow-600 rounded-full blur-[10px] opacity-70 animate-pulse"></div>
                
                <!-- Pointer -->
                <div class="absolute -top-10 left-1/2 -translate-x-1/2 z-30 drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]">
                  <div class="relative flex justify-center">
                    <i data-lucide="star" fill="#ef4444" stroke="#fef08a" stroke-width="1.5" class="w-[60px] h-[60px] text-red-500"></i>
                    <div class="absolute bottom-1 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[15px] border-t-red-500"></div>
                  </div>
                </div>
      
                <!-- The Wheel -->
                <div class="relative w-full h-full rounded-full border-[10px] border-[#fde047] shadow-[inset_0_0_20px_rgba(0,0,0,0.5),_0_0_20px_rgba(253,224,71,0.6)] overflow-hidden bg-slate-800 p-1">
                  <div id="wheel-container" class="w-full h-full rounded-full relative">
                    <!-- Wheel slices generated via JS -->
                  </div>
                  
                  <!-- Center Button -->
                  <button onclick="spinWheel()" id="center-spin-btn" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 md:w-24 md:h-24 bg-[#1e1b4b] rounded-full shadow-[0_0_15px_rgba(0,0,0,0.6)] flex items-center justify-center border-[6px] border-[#facc15] z-20 hover:scale-105 active:scale-95 transition-transform disabled:hover:scale-100 disabled:opacity-90">
                    <div class="w-full h-full rounded-full bg-gradient-to-br from-yellow-300 via-yellow-500 to-yellow-600 flex items-center justify-center inner-shadow">
                        <i data-lucide="clover" fill="#422006" class="w-10 h-10 text-yellow-950"></i>
                    </div>
                  </button>
                </div>
            </div>

            <!-- Spin Action Button -->
            <button id="main-spin-btn" onclick="spinWheel()" class="mt-14 px-10 py-4 rounded-full text-xl font-bold text-white shadow-[0_0_20px_rgba(239,68,68,0.5)] transition-all flex items-center gap-3 border-2 border-red-400 bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 hover:scale-105 active:scale-95 hover:shadow-[0_0_30px_rgba(239,68,68,0.8)]">
                <i id="spin-btn-icon" data-lucide="play" fill="currentColor"></i> 
                <span id="spin-btn-text">ចុចដើម្បីបង្វិល</span>
            </button>
      
            <!-- Logout Action -->
            <button onclick="handleLogout()" class="mt-8 text-purple-300 hover:text-white text-sm underline opacity-70">
                ចាកចេញ
            </button>
        </div>

        <!-- ADMIN SECTION -->
        <div id="admin-section" class="hidden p-4 md:p-8 max-w-5xl mx-auto bg-slate-900/90 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-700 mt-8 mb-12">
            <div class="flex flex-wrap justify-between items-center mb-8 border-b border-slate-700 pb-4 gap-4">
                <h2 class="text-2xl font-bold flex items-center gap-2 text-white">
                  <i data-lucide="settings" class="text-blue-400"></i> ការកំណត់រង្វាន់ (Admin Panel)
                </h2>
                <button onclick="resetAllQuantities()" class="flex items-center gap-2 bg-red-900/50 text-red-400 border border-red-500/50 px-4 py-2 rounded-lg hover:bg-red-900 hover:text-white transition">
                  <i data-lucide="rotate-ccw" class="w-4 h-4"></i> កំណត់ស្តុកឡើងវិញ
                </button>
            </div>
        
            <div class="overflow-x-auto rounded-xl border border-slate-700">
                <table class="w-full text-left border-collapse">
                  <thead>
                    <tr class="bg-slate-800 text-slate-300">
                      <th class="p-4 font-semibold">ពណ៌</th>
                      <th class="p-4 font-semibold">Icon</th>
                      <th class="p-4 font-semibold">ឈ្មោះរង្វាន់</th>
                      <th class="p-4 font-semibold">ចំនួនសរុប</th>
                      <th class="p-4 font-semibold">នៅសល់</th>
                      <th class="p-4 font-semibold text-center">សកម្មភាព</th>
                    </tr>
                  </thead>
                  <tbody id="admin-table-body" class="divide-y divide-slate-700/50 text-slate-200">
                    <!-- Admin table rows generated via JS -->
                  </tbody>
                </table>
            </div>
        
            <button onclick="addPrize()" class="mt-6 flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-500 transition w-full justify-center md:w-auto shadow-lg shadow-blue-900/50">
                <i data-lucide="plus" class="w-5 h-5"></i> បន្ថែមរង្វាន់ថ្មី
            </button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="result-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="bg-slate-900 border border-purple-500/30 rounded-3xl shadow-[0_0_50px_rgba(139,92,246,0.3)] p-8 max-w-sm w-full text-center transform scale-95 transition-transform duration-300" id="modal-content-box">
            
            <div id="modal-icon-container" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <!-- Icon injected via JS -->
            </div>
            
            <h2 id="modal-title" class="text-3xl font-bold text-white mb-2"></h2>
            <p id="modal-message" class="text-purple-300 text-lg mb-6"></p>
            
            <div id="modal-prize-box" class="hidden flex-col items-center justify-center gap-3 text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 mb-8 p-6 bg-yellow-900/20 rounded-2xl border border-yellow-500/30">
                <span id="modal-prize-icon" class="text-yellow-400 drop-shadow-md flex items-center justify-center"></span>
                <span id="modal-prize-name"></span>
            </div>

            <button onclick="closeModal()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-xl font-bold text-lg hover:from-purple-500 hover:to-indigo-500 shadow-lg transition active:scale-95">
                បិទផ្ទាំងនេះ
            </button>
        </div>
    </div>

    <script>
        // === Data & State ===
        const iconList = ['smartphone', 'dollar-sign', 'shirt', 'frown', 'gift'];

        let prizes = [
            { id: 1, name: 'iPhone 17 Pro', icon: 'smartphone', color: '#b91c1c', totalQty: 1, remainQty: 1 },
            { id: 2, name: 'រង្វាន់ 10$', icon: 'dollar-sign', color: '#1d4ed8', totalQty: 5, remainQty: 5 },
            { id: 3, name: 'អាវយឺត', icon: 'shirt', color: '#15803d', totalQty: 20, remainQty: 20 },
            { id: 4, name: 'សូមព្យាយាម', icon: 'frown', color: '#eab308', totalQty: 100, remainQty: 100 },
            { id: 5, name: 'រង្វាន់ 5$', icon: 'dollar-sign', color: '#7e22ce', totalQty: 10, remainQty: 10 },
            { id: 6, name: 'សូមព្យាយាម', icon: 'frown', color: '#0f766e', totalQty: 100, remainQty: 100 },
            { id: 7, name: 'កាដូពិសេស', icon: 'gift', color: '#be123c', totalQty: 5, remainQty: 5 },
            { id: 8, name: 'សូមព្យាយាម', icon: 'frown', color: '#4338ca', totalQty: 100, remainQty: 100 },
        ];

        let isLoggedIn = false;
        let view = 'user';
        let isSpinning = false;
        let rotation = 0;
        let playerName = '';

        // Initialize Icons
        lucide.createIcons();
        renderWheel();
        renderAdminTable();

        // === View Switching ===
        function switchView(newView) {
            view = newView;
            const btnNavUser = document.getElementById('btn-nav-user');
            const btnNavAdmin = document.getElementById('btn-nav-admin');

            // Update Nav Buttons
            if(view === 'user') {
                btnNavUser.className = "px-5 py-1.5 rounded-full text-sm font-medium transition flex items-center gap-2 bg-gradient-to-r from-orange-500 to-red-600 text-white shadow-lg";
                btnNavAdmin.className = "px-5 py-1.5 rounded-full text-sm font-medium transition flex items-center gap-2 text-gray-400 hover:text-white";
                
                document.getElementById('admin-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('block');
                
                if (isLoggedIn) {
                    document.getElementById('user-section').classList.remove('hidden');
                    document.getElementById('user-section').classList.add('flex');
                    document.getElementById('login-section').classList.add('hidden');
                } else {
                    document.getElementById('login-section').classList.remove('hidden');
                    document.getElementById('login-section').classList.add('flex');
                    document.getElementById('user-section').classList.add('hidden');
                }
            } else {
                btnNavAdmin.className = "px-5 py-1.5 rounded-full text-sm font-medium transition flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg";
                btnNavUser.className = "px-5 py-1.5 rounded-full text-sm font-medium transition flex items-center gap-2 text-gray-400 hover:text-white";
                
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('user-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('admin-section').classList.add('block');
            }
        }

        // === Authentication ===
        function handleLogin(e) {
            e.preventDefault();
            const nameInput = document.getElementById('player-name').value;
            const codeInput = document.getElementById('player-code').value;

            if (!nameInput.trim()) {
                alert('សូមបញ្ចូលឈ្មោះរបស់អ្នក!');
                return;
            }
            if (codeInput !== '2026') {
                alert('លេខកូដមិនត្រឹមត្រូវទេ! (តម្រុយ: 2026)');
                return;
            }

            playerName = nameInput.trim();
            document.getElementById('display-player-name').innerText = playerName;
            isLoggedIn = true;
            switchView('user'); // Re-trigger view update
        }

        function handleLogout() {
            isLoggedIn = false;
            playerName = '';
            document.getElementById('player-name').value = '';
            document.getElementById('player-code').value = '';
            switchView('user');
        }

        // === Admin Functions ===
        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';

            prizes.forEach(prize => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/50 transition";
                
                const selectOptions = iconList.map(icon => 
                    `<option value="${icon}" ${prize.icon === icon ? 'selected' : ''}>${icon}</option>`
                ).join('');

                const remainClass = prize.remainQty === 0 ? "bg-red-900/50 text-red-400" : "bg-green-900/50 text-green-400";

                tr.innerHTML = `
                    <td class="p-3">
                        <div class="flex items-center justify-center w-10 h-10 rounded-full overflow-hidden border-2 border-slate-600 relative">
                            <input type="color" value="${prize.color}" onchange="updatePrize(${prize.id}, 'color', this.value)" class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer border-0 p-0">
                        </div>
                    </td>
                    <td class="p-3">
                        <select onchange="updatePrize(${prize.id}, 'icon', this.value)" class="bg-slate-800 border border-slate-600 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                            ${selectOptions}
                        </select>
                    </td>
                    <td class="p-3">
                        <input type="text" value="${prize.name}" onchange="updatePrize(${prize.id}, 'name', this.value)" class="bg-slate-800 border border-slate-600 rounded p-2 w-full text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </td>
                    <td class="p-3">
                        <input type="number" min="0" value="${prize.totalQty}" onchange="updatePrize(${prize.id}, 'totalQty', this.value)" class="bg-slate-800 border border-slate-600 rounded p-2 w-20 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </td>
                    <td class="p-3 text-center">
                        <span class="inline-block px-3 py-1 rounded-full text-sm font-bold ${remainClass}">
                            ${prize.remainQty}
                        </span>
                    </td>
                    <td class="p-3 text-center">
                        <button onclick="removePrize(${prize.id})" class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-900/30 rounded-lg transition">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
            renderWheel(); // Update wheel just in case
        }

        function updatePrize(id, field, value) {
            prizes = prizes.map(p => {
                if (p.id === id) {
                    let updated = { ...p, [field]: value };
                    if (field === 'totalQty') {
                        updated.remainQty = Number(value);
                        updated.totalQty = Number(value);
                    }
                    return updated;
                }
                return p;
            });
            renderAdminTable();
        }

        function addPrize() {
            if (prizes.length >= 12) {
                alert('មិនអាចបន្ថែមលើសពី ១២ រង្វាន់បានទេ!');
                return;
            }
            const newId = prizes.length > 0 ? Math.max(...prizes.map(p => p.id)) + 1 : 1;
            const randomColor = `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
            prizes.push({ id: newId, name: 'រង្វាន់ថ្មី', icon: 'gift', color: randomColor, totalQty: 10, remainQty: 10 });
            renderAdminTable();
        }

        function removePrize(id) {
            if (prizes.length <= 4) {
                alert('ត្រូវមានរង្វាន់យ៉ាងតិច ៤!');
                return;
            }
            prizes = prizes.filter(p => p.id !== id);
            renderAdminTable();
        }

        function resetAllQuantities() {
            if(window.confirm('កំណត់ចំនួនរង្វាន់ទាំងអស់ឡើងវិញមែនទេ?')) {
                prizes = prizes.map(p => ({ ...p, remainQty: Number(p.totalQty) }));
                renderAdminTable();
            }
        }

        // === Spin Logic ===
        function renderWheel() {
            const container = document.getElementById('wheel-container');
            const sliceDegree = 360 / prizes.length;
            
            // 1. Build Gradient
            let gradientParts = prizes.map((p, i) => {
                const startAngle = i * sliceDegree;
                const endAngle = startAngle + sliceDegree;
                return `${p.color} ${startAngle}deg ${endAngle}deg`;
            });
            container.style.background = `conic-gradient(${gradientParts.join(', ')})`;
            
            // 2. Build Slices
            let slicesHTML = '';
            prizes.forEach((p, i) => {
                const rotationDegree = (i * sliceDegree) + (sliceDegree / 2);
                slicesHTML += `
                    <div class="absolute w-full h-full top-0 left-0" style="transform: rotate(${rotationDegree}deg)">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 h-1/2 w-24 pt-4 md:pt-8 flex flex-col items-center justify-start gap-2">
                            <div class="text-white drop-shadow-md">
                                <i data-lucide="${p.icon}" class="w-6 h-6"></i>
                            </div>
                            <div class="text-white font-bold text-xs md:text-sm drop-shadow-[0_1px_2px_rgba(0,0,0,0.8)] text-center w-full px-1 writing-vertical">
                                ${p.name}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = slicesHTML;
            
            // 3. Keep current rotation
            container.style.transform = `rotate(${rotation}deg)`;
            lucide.createIcons();
        }

        function setSpinningState(isSpin) {
            isSpinning = isSpin;
            const mainBtn = document.getElementById('main-spin-btn');
            const centerBtn = document.getElementById('center-spin-btn');
            const btnText = document.getElementById('spin-btn-text');
            const btnIcon = document.getElementById('spin-btn-icon');

            if (isSpin) {
                centerBtn.disabled = true;
                mainBtn.disabled = true;
                mainBtn.className = "mt-14 px-10 py-4 rounded-full text-xl font-bold text-white transition-all flex items-center gap-3 border-2 bg-gray-600 border-gray-500 cursor-not-allowed scale-95 opacity-80";
                btnText.innerText = "កំពុងវិល...";
                // Make icon spin
                btnIcon.setAttribute('data-lucide', 'rotate-ccw');
                btnIcon.classList.add('animate-spin');
            } else {
                centerBtn.disabled = false;
                mainBtn.disabled = false;
                mainBtn.className = "mt-14 px-10 py-4 rounded-full text-xl font-bold text-white shadow-[0_0_20px_rgba(239,68,68,0.5)] transition-all flex items-center gap-3 border-2 border-red-400 bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 hover:scale-105 active:scale-95 hover:shadow-[0_0_30px_rgba(239,68,68,0.8)]";
                btnText.innerText = "ចុចដើម្បីបង្វិល";
                btnIcon.setAttribute('data-lucide', 'play');
                btnIcon.classList.remove('animate-spin');
            }
            lucide.createIcons();
        }

        function spinWheel() {
            if (isSpinning) return;

            const availablePrizes = prizes.filter(p => p.remainQty > 0);
            if (availablePrizes.length === 0) {
                alert('រង្វាន់ត្រូវបានចាប់អស់ហើយ!');
                return;
            }

            // Weighted Random
            const totalWeight = availablePrizes.reduce((sum, p) => sum + p.remainQty, 0);
            let randomNum = Math.random() * totalWeight;
            let selectedPrize = null;

            for (let p of availablePrizes) {
                if (randomNum < p.remainQty) {
                    selectedPrize = p;
                    break;
                }
                randomNum -= p.remainQty;
            }

            // Calculate rotation
            const prizeIndex = prizes.findIndex(p => p.id === selectedPrize.id);
            const sliceDegree = 360 / prizes.length;
            const sliceCenterAngle = (prizeIndex * sliceDegree) + (sliceDegree / 2);
            
            const extraSpins = 360 * 6; // 6 full spins
            const currentMod = rotation % 360;
            const targetRotation = rotation + extraSpins + (360 - sliceCenterAngle) - currentMod;

            setSpinningState(true);
            rotation = targetRotation;

            const container = document.getElementById('wheel-container');
            container.style.transition = 'transform 6s cubic-bezier(0.2, 0.8, 0.1, 1)';
            container.style.transform = `rotate(${rotation}deg)`;

            // Wait for animation to finish
            setTimeout(() => {
                // Deduct stock
                prizes = prizes.map(p => 
                    p.id === selectedPrize.id ? { ...p, remainQty: p.remainQty - 1 } : p
                );
                
                showModal(selectedPrize);
                setSpinningState(false);
                renderAdminTable(); // Update remain count in admin table behind the scenes
            }, 6000); // 6 seconds
        }

        // === Modal Logic ===
        function showModal(winner) {
            const modal = document.getElementById('result-modal');
            const contentBox = document.getElementById('modal-content-box');
            const iconContainer = document.getElementById('modal-icon-container');
            const title = document.getElementById('modal-title');
            const message = document.getElementById('modal-message');
            const prizeBox = document.getElementById('modal-prize-box');
            const prizeIcon = document.getElementById('modal-prize-icon');
            const prizeName = document.getElementById('modal-prize-name');

            const isLose = winner.name.includes('សូមព្យាយាម');

            if (isLose) {
                iconContainer.className = "w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner";
                iconContainer.innerHTML = `<i data-lucide="frown" class="w-[50px] h-[50px] text-yellow-500"></i>`;
                title.innerText = 'សោកស្ដាយ!';
                message.innerText = 'សូមព្យាយាមម្ដងទៀតនៅពេលក្រោយ។';
                prizeBox.classList.remove('flex');
                prizeBox.classList.add('hidden');
            } else {
                iconContainer.className = "w-24 h-24 bg-gradient-to-tr from-green-400 to-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(16,185,129,0.5)]";
                iconContainer.innerHTML = `<i data-lucide="check-circle" class="w-[50px] h-[50px] text-white"></i>`;
                title.innerText = 'អបអរសាទរ!';
                message.innerText = 'អ្នកបានឈ្នះរង្វាន់៖';
                
                prizeBox.classList.remove('hidden');
                prizeBox.classList.add('flex');
                prizeIcon.innerHTML = `<i data-lucide="${winner.icon}" class="w-8 h-8"></i>`;
                prizeName.innerText = winner.name;
            }

            modal.classList.remove('hidden');
            // Trigger animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                contentBox.classList.remove('scale-95');
                contentBox.classList.add('scale-100');
                lucide.createIcons();
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('result-modal');
            const contentBox = document.getElementById('modal-content-box');
            
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            contentBox.classList.remove('scale-100');
            contentBox.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

    </script>
</body>
